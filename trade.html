<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>떨사오팔 트레이딩 센터</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Noto Sans KR', sans-serif; font-size: 0.85rem; color: #333; }
        .card { border-radius: 12px; margin-bottom: 20px; border: 1px solid #e1e4e8; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow: hidden; }
        .card-header { background-color: #ffffff; border-bottom: 2px solid #1a237e; font-weight: 700; font-size: 1rem; color: #1a237e; padding: 14px 16px; }
        
        .table-responsive { overflow-x: auto; }
        .table-excel { border-collapse: separate; border-spacing: 0; width: 100%; white-space: nowrap; background: #ffffff; }
        .table-excel th, .table-excel td { border-bottom: 1px solid #dee2e6; border-right: 1px solid #dee2e6; padding: 10px 8px; text-align: center; vertical-align: middle; }
        .table-excel th { background-color: #f8f9fa; font-weight: 700; color: #495057; border-top: 1px solid #dee2e6; }
        .table-excel tbody tr:nth-child(even) { background-color: #fafbfc; }
        .table-excel tbody tr:hover { background-color: #eef2f5; transition: background-color 0.2s; cursor: pointer; }
        .table-excel .total-row { background-color: #ffffff; font-weight: 700; color: #000; border-top: 2px solid #1a237e; border-bottom: 2px solid #1a237e; }
        
        .sticky-col { position: sticky; left: 0; background-color: #ffffff; z-index: 2; border-right: 2px solid #ced4da !important; font-weight: 700; }
        .table-excel th.sticky-col { background-color: #f8f9fa; z-index: 3; }
        .table-excel tbody tr:nth-child(even) .sticky-col { background-color: #fafbfc; }
        .table-excel tbody tr:hover .sticky-col { background-color: #eef2f5; }

        .scroll-box { max-height: 250px; overflow-y: auto; }
        .scroll-box thead th { position: sticky; top: 0; z-index: 2; }
        .chart-scroll-box { overflow-x: auto; overflow-y: hidden; }

        .text-profit { color: #1565c0 !important; font-weight: 700; } 
        .text-loss { color: #d32f2f !important; font-weight: 700; }
        .text-success { color: #2e7d32 !important; font-weight: 700; } 
        
        .form-control, .form-select { border-radius: 6px; border: 1px solid #ced4da; }
        .btn-primary { background-color: #1a237e; border-color: #1a237e; }
        .btn-primary:hover { background-color: #121858; border-color: #121858; }
        
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { font-weight: 700; font-size: 0.85rem; color: #666; text-decoration: none; transition: color 0.2s; }
        .nav-links a:hover { color: #1a237e; text-decoration: underline; }
        
        .btn-action { padding: 1px 5px !important; font-size: 0.65rem !important; margin: 0 1px; }
        #priceChangeBadge { font-size: 0.75rem; vertical-align: middle; margin-left: 2px; }
        .top-card { height: 100%; }
        .settings-card-header { min-height: 58px; padding: 10px 16px; }
        .settings-header-tools {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        .settings-header-tools .btn {
            font-size: 0.72rem;
            padding: 3px 10px;
            line-height: 1.15;
        }
        .price-card-header {
            gap: 8px;
            flex-wrap: nowrap;
            align-items: center;
        }
        .price-card-summary {
            min-width: 0;
            flex: 1 1 auto;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 8px;
            flex-wrap: wrap;
        }
        .price-card-title-line {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            line-height: 1.1;
            flex-wrap: wrap;
        }
        .price-card-change-line {
            min-height: 0;
            margin-top: 0;
            line-height: 1.1;
            display: flex;
            align-items: center;
        }
        .main-trend-card {
            margin-top: 0 !important;
        }
        .main-trend-card .card-body {
            padding: 12px 14px 14px;
        }
        .main-trend-toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }
        .main-trend-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            width: 100%;
        }
        .main-trend-buttons .btn {
            min-width: 54px;
            padding: 4px 10px;
            border-radius: 999px;
            border-color: #cfd6e4;
            color: #5b6578;
            background-color: #ffffff;
            font-size: 0.68rem;
            font-weight: 700;
            line-height: 1.15;
            box-shadow: none;
        }
        .main-trend-buttons .btn:hover,
        .main-trend-buttons .btn:focus {
            border-color: #1a237e;
            color: #1a237e;
            background-color: #f5f7ff;
        }
        .main-trend-buttons .btn.btn-primary {
            border-color: #1a237e;
            background-color: #1a237e;
            color: #ffffff;
        }
        .main-trend-shell {
            width: 100%;
            height: 208px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 10px 10px 6px;
            border: 1px solid #edf0f5;
            border-radius: 12px;
            background: linear-gradient(180deg, #fbfcff 0%, #f6f8fc 100%);
            overflow: hidden;
        }
        #mainTrendChart {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
        .main-trend-state {
            position: absolute;
            left: 12px;
            top: 12px;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 600;
            color: #5f6b7a;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(207, 214, 228, 0.95);
            box-shadow: 0 4px 10px rgba(26, 35, 126, 0.06);
            backdrop-filter: blur(4px);
        }
        .main-trend-state.loading {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 7px 12px;
        }
        .main-trend-state::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #aeb7c6;
            flex: 0 0 auto;
        }
        .main-trend-state.loading::before {
            width: 9px;
            height: 9px;
            background: #1a237e;
            box-shadow: 0 0 0 0 rgba(26, 35, 126, 0.25);
            animation: pulseDot 1.2s ease-in-out infinite;
        }
        .main-trend-shell.is-loading canvas {
            opacity: 0.3;
        }
        .main-trend-shell.is-fallback canvas {
            opacity: 0.92;
        }
        @keyframes pulseDot {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(26, 35, 126, 0.25); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(26, 35, 126, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(26, 35, 126, 0); }
        }
        @media (max-width: 767px) {
            .settings-card-header {
                align-items: flex-start !important;
                gap: 8px;
            }
            .settings-header-tools {
                width: 100%;
                justify-content: flex-end;
            }
            .price-card-header {
                gap: 8px;
                align-items: flex-start;
                padding: 6px 12px !important;
            }
            .price-card-summary {
                flex: 1 1 100%;
                margin-right: 0 !important;
                gap: 4px;
            }
            #priceChangeBadge {
                margin-left: 2px;
            }
            .main-trend-card .card-body {
                padding: 10px 12px 12px;
            }
            .main-trend-toolbar {
                margin-bottom: 6px;
            }
            .main-trend-buttons {
                gap: 6px;
                justify-content: flex-start;
            }
            .main-trend-buttons .btn {
                min-width: 50px;
                padding: 4px 9px;
            }
            .main-trend-shell {
                height: 188px;
                padding: 8px 8px 4px;
            }
            .main-trend-state {
                left: 10px;
                top: 10px;
                font-size: 0.65rem;
            }
            .main-trend-state.loading {
                left: 50%;
                top: 50%;
            }
        }
        #settingsSummary {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-align: center;
        }
        #summaryText {
            display: block;
            white-space: pre-line;
            line-height: 1.35;
        }
        .reset-prompt {
            background: #f8f9fc;
            border: 1px solid #dbe2ef;
            border-radius: 10px;
            padding: 12px;
        }
        .reset-prompt-label {
            font-size: 0.76rem;
            font-weight: 700;
            color: #1a237e;
            margin-bottom: 8px;
        }
        .reset-prompt-note {
            font-size: 0.72rem;
            color: #6c757d;
            margin-top: 6px;
        }
        .reset-prompt-error {
            font-size: 0.72rem;
            color: #d32f2f;
            font-weight: 700;
            min-height: 18px;
            margin-top: 6px;
        }
        .reset-prompt-success {
            font-size: 0.72rem;
            color: #2e7d32;
            font-weight: 700;
            min-height: 18px;
            margin-top: 6px;
        }
        .dashboard-header-tools {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        .dashboard-header-tools .btn {
            font-size: 0.72rem;
            padding: 4px 10px;
            line-height: 1.15;
        }
        .extra-seed-panel {
            margin: 12px 12px 0;
            padding: 12px;
            background: #f8f9fc;
            border: 1px solid #dbe2ef;
            border-radius: 10px;
        }
        .extra-seed-meta {
            font-size: 0.76rem;
            font-weight: 700;
            color: #1a237e;
            margin-bottom: 8px;
        }
        .extra-seed-error {
            min-height: 18px;
            margin-top: 6px;
            font-size: 0.72rem;
            color: #d32f2f;
            font-weight: 700;
        }
        </style>
</head>
<body>
    <div class="container mt-4 mb-5" style="max-width: 1100px;">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h4 class="fw-bold m-0" style="color: #1a237e; letter-spacing: -0.5px;">📈 떨사오팔 센터</h4>
            <div class="nav-links">
                <a href="https://trillionly.github.io/great/?t=1">그리드매매 시스템</a>
                <a href="https://trillionly.github.io/great/trillion.html">장투리밸런싱 시스템</a>
            </div>
        </div>
        
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <div class="card mb-0 top-card">
                    <div class="card-header d-flex justify-content-between align-items-center settings-card-header">
                        <span>매매 시스템 세팅</span>
                        <div class="settings-header-tools">
                            <span id="lockStatus" class="badge bg-danger d-none" style="font-size: 0.7rem;">잠금됨 (DB 동기화)</span>
                            <button id="unlockBtn" class="btn btn-outline-secondary btn-sm d-none" onclick="unlockSettings()">초기화</button>
                        </div>
                    </div>
                    <div class="card-body p-3">
                        <div id="settingsForm">
                            <div class="row g-2 align-items-end mb-2">
                                <div class="col-3">
                                    <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">운용 호기</label>
                                    <select id="setHogis" class="form-select form-select-sm"><option value="4">4분할</option><option value="6" selected>6분할</option><option value="10">10분할</option></select>
                                </div>
                                <div class="col-3">
                                    <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">기본시드($)</label>
                                    <input type="number" id="setSeed" class="form-control form-control-sm" value="66000">
                                </div>
                                <div class="col-3">
                                    <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">매도 목표</label>
                                    <input type="number" id="setTarget" class="form-control form-control-sm" value="0.7" step="0.1" min="0">
                                </div>
                                <div class="col-3">
                                    <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">손절(D-day)</label>
                                    <input type="number" id="setDday" class="form-control form-control-sm" value="45" step="1" min="1">
                                </div>
                            </div>
                            <button id="lockBtn" class="btn btn-primary btn-sm w-100 fw-bold mt-2" onclick="lockSettings()">새 매매 시작 (설정 확정)</button>
                        </div>
                        <div id="settingsSummary" class="d-none bg-light p-2 rounded text-center border mt-1">
                            <span id="summaryText" class="fw-bold" style="color: #1a237e;"></span>
                        </div>
                        <div id="resetPrompt" class="reset-prompt d-none mt-2">
                            <div class="reset-prompt-label">비번 숫자 6자리</div>
                            <div class="input-group input-group-sm">
                                <input type="password" id="resetPasswordInput" class="form-control" inputmode="numeric" maxlength="6" placeholder="숫자 6자리">
                                <button type="button" class="btn btn-primary" onclick="confirmUnlockPassword()">확인</button>
                                <button type="button" class="btn btn-outline-secondary" onclick="hideResetPrompt()">취소</button>
                            </div>
                            <div id="resetPasswordError" class="reset-prompt-error"></div>
                            <div id="resetPasswordSuccess" class="reset-prompt-success"></div>
                            <div class="reset-prompt-note">기본 비밀번호: 523628</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card mb-0 top-card">
                    <div class="card-header d-flex justify-content-between align-items-center price-card-header" style="min-height: 58px; padding: 6px 16px;">
                        <div class="price-card-summary" style="margin-right: 5px;">
                            <div class="price-card-title-line">
                                <span>실시간 시세</span>
                                <span id="dataSource" class="badge bg-secondary" style="font-size:0.6rem;">대기중</span>
                                <span id="priceChangeBadge"></span>
                            </div>
                        </div>
                    </div>
                    <div class="card-body p-3">
                        <div class="row g-2 align-items-center">
                            <div class="col-4 border-end px-2">
                                <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">종목 티커</label>
                                <div class="input-group input-group-sm">
                                    <input type="text" id="tickerInput" class="form-control text-center fw-bold text-uppercase" value="SOXL" placeholder="티커">
                                    <button class="btn btn-secondary" id="fetchBtn" style="min-width: 50px;" onclick="fetchTicker()">조회</button>
                                </div>
                            </div>
                            <div class="col-4 border-end px-2 text-center">
                                <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">현재가($)</label>
                                <input type="number" id="currentPrice" class="form-control form-control-sm text-center fw-bold" step="0.01" oninput="calcTodayBuyPrice()">
                            </div>
                            <div class="col-4 px-2 text-center">
                                <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">매수 타점(-0.1%)</label>
                                <div id="todayBuyPrice" class="fs-5 text-loss fw-bold mt-1">-</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card main-trend-card mb-3">
            <div class="card-body">
                <div class="main-trend-toolbar">
                    <div class="main-trend-buttons">
                        <button id="mainTrendBtn7" type="button" class="btn btn-outline-secondary" onclick="loadMainTrendChart(7)">7D</button>
                        <button id="mainTrendBtn30" type="button" class="btn btn-primary" onclick="loadMainTrendChart(30)">30D</button>
                        <button id="mainTrendBtn60" type="button" class="btn btn-outline-secondary" onclick="loadMainTrendChart(60)">60D</button>
                        <button id="mainTrendBtn180" type="button" class="btn btn-outline-secondary" onclick="loadMainTrendChart(180)">180D</button>
                    </div>
                </div>
                <div class="main-trend-shell">
                    <div id="mainTrendState" class="main-trend-state d-none"></div>
                    <canvas id="mainTrendChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">전체 누적 호기별 현황</div>
            <div class="card-body p-0">
                <div id="extraSeedPanel" class="extra-seed-panel d-none">
                    <div class="extra-seed-meta">추가 시드 입력</div>
                    <div class="row g-2">
                        <div class="col-sm-4">
                            <label class="form-label text-muted mb-1" style="font-size:0.75rem;">몇 호기</label>
                            <select id="extraSeedHogi" class="form-select form-select-sm"></select>
                        </div>
                        <div class="col-sm-4">
                            <label class="form-label text-muted mb-1" style="font-size:0.75rem;">얼마</label>
                            <input type="number" id="extraSeedAmount" class="form-control form-control-sm" min="0" step="0.01" placeholder="0.00">
                        </div>
                        <div class="col-sm-4 d-flex align-items-end gap-2">
                            <button type="button" class="btn btn-primary btn-sm w-100" onclick="saveExtraSeed()">저장</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="hideExtraSeedPrompt()">취소</button>
                        </div>
                    </div>
                    <div id="extraSeedError" class="extra-seed-error"></div>
                </div>
                <div class="table-responsive">
                    <table class="table-excel mb-0">
                        <thead>
                            <tr>
                                <th class="sticky-col">호기</th><th>투입시드</th><th>복리시드</th><th>보유수량</th>
                                <th>수익금</th><th>수익률</th><th>익절</th><th>손절</th>
                                <th>매수가(평단)</th><th class="text-profit">매도가(목표)</th><th>주문가능수량</th><th>D-day(손절)</th>
                            </tr>
                        </thead>
                        <tbody id="dashboardBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-7">
                <div class="card h-100 mb-0">
                    <div class="card-header">월별 자산 성장 추이 (원금 vs 평가금)</div>
                    <div class="card-body p-3 chart-scroll-box">
                        <div id="chartWrapper" style="height: 250px; min-width: 100%;">
                            <canvas id="monthlyChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card h-100 mb-0">
                    <div class="card-header">월별 마감 요약</div>
                    <div class="card-body p-0 scroll-box">
                        <table class="table-excel mb-0">
                            <thead>
                                <tr>
                                    <th style="width: 25%;">월별</th><th style="width: 30%;">누적시드</th><th style="width: 25%;">수익금</th><th style="width: 20%;">수익률</th>
                                </tr>
                            </thead>
                            <tbody id="monthlySummaryBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-header" id="formTitle">매매 기록 입력</div>
            <div class="card-body p-3">
                <input type="hidden" id="recordId">
                <div class="row g-2 mb-3">
                    <div class="col-4"><label class="form-label text-muted mb-1" style="font-size:0.75rem;">날짜</label><input type="date" id="dateInput" class="form-control form-control-sm"></div>
                    <div class="col-4"><label class="form-label text-muted mb-1" style="font-size:0.75rem;">호기 선택</label><select id="hogiInput" class="form-select form-select-sm" onchange="autoFillTrade()"></select></div>
                    <div class="col-4">
                        <label class="form-label text-muted mb-1" style="font-size:0.75rem;">매매/시드추가</label>
                        <select id="typeInput" class="form-select form-select-sm text-loss" onchange="handleTypeChange()">
                            <option value="매수" class="text-loss">매수</option><option value="매도" class="text-profit">매도</option><option value="시드추가" class="text-success">시드추가</option>
                        </select>
                    </div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-4"><label class="form-label text-muted mb-1" style="font-size:0.75rem;">수량</label><input type="number" id="qtyInput" class="form-control form-control-sm" placeholder="0"></div>
                    <div class="col-4"><label class="form-label text-muted mb-1" style="font-size:0.75rem;">단가/금액</label><input type="number" id="priceInput" class="form-control form-control-sm" placeholder="0.00" step="0.01"></div>
                    <div class="col-4"><label class="form-label text-muted mb-1" style="font-size:0.75rem;">비고</label><input type="text" id="memoInput" class="form-control form-control-sm" placeholder="선택사항"></div>
                </div>
                <div class="d-flex gap-2">
                    <button id="saveBtn" onclick="saveData()" class="btn btn-primary w-100 fw-bold">저장하기</button>
                    <button id="cancelBtn" onclick="resetForm()" class="btn btn-secondary d-none">수정 취소</button>
                </div>

        function formatSeedAmount(value) {
            const numeric = Number(value);
            return Number.isFinite(numeric) ? Math.round(numeric).toLocaleString() : '0';
        }

        function normalizeSeedValue(value) {
            const numeric = Number(value);
            if (!Number.isFinite(numeric) || numeric <= 0) return 66000;

        }

        function formatMainTrendLabel(timestamp) {
            const date = new Date(timestamp);
            if (Number.isNaN(date.getTime())) return '';
            return `${date.getMonth() + 1}/${date.getDate()}`;
        }

        function parseChartPrice(value) {
            if (value === null || value === undefined || value === '') return null;
            const price = typeof value === 'number' ? value : Number(value);
            return Number.isFinite(price) ? price : null;
        }

        function parseChartTimestamp(value) {
            if (value === null || value === undefined || value === '') return null;
            const timestamp = typeof value === 'number' ? value : Number(value);
            return Number.isFinite(timestamp) ? timestamp : null;
        }

        function getNewYorkDateParts(timestamp = Date.now()) {
            const formatter = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'America/New_York',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                hour12: false
            });
            const parts = formatter.formatToParts(new Date(timestamp));
            const map = {};
            parts.forEach(part => {
                if (part.type !== 'literal') map[part.type] = part.value;
            });
            return {
                dateKey: `${map.year}-${map.month}-${map.day}`,
                hour: Number(map.hour || '0')
            };
        }

        function finalizeMainChartPoints(points) {
            if (!Array.isArray(points) || points.length < 2) return null;

            const nowNy = getNewYorkDateParts();
            const filtered = points.filter(point => {
                const pointNy = getNewYorkDateParts(point.timestamp);
                if (pointNy.dateKey > nowNy.dateKey) return false;
                if (pointNy.dateKey === nowNy.dateKey && nowNy.hour < 16) return false;
                return true;
            });

            const safePoints = filtered.length >= 2 ? filtered : points;
            return {
                labels: safePoints.map(point => formatMainTrendLabel(point.timestamp)),
                prices: safePoints.map(point => point.price)
            };
        }

        function getMainChartTickLimit(days) {
            if (days <= 7) return 7;
            if (days <= 30) return 6;
            if (days <= 60) return 7;
            return 8;
        }

        function buildMainChartPlaceholder(days) {
            const pointCount = days <= 7 ? 7 : (days <= 30 ? 10 : (days <= 60 ? 12 : 16));
            const now = Date.now();
            const step = Math.max(1, Math.floor(days / Math.max(1, pointCount - 1)));
            const labels = [];
            const prices = [];

            for (let i = pointCount - 1; i >= 0; i--) {
                const timestamp = now - (i * step * 24 * 60 * 60 * 1000);
                labels.push(formatMainTrendLabel(timestamp));
            }

            for (let i = 0; i < pointCount; i++) {
                prices.push(100 + Math.sin(i / 2) * 2 + (i * 0.35));
            }

            return { labels, prices };
        }

        function parseYahooMainChartResponse(data) {
            const chart = data?.chart;
            const result = Array.isArray(chart?.result) ? chart.result[0] : null;
            const timestamps = Array.isArray(result?.timestamp) ? result.timestamp : null;
            const closes = Array.isArray(result?.indicators?.quote?.[0]?.close) ? result.indicators.quote[0].close : null;

            if (!timestamps || !closes) return null;

            const points = [];
            const len = Math.min(timestamps.length, closes.length);

            for (let i = 0; i < len; i++) {
                const price = parseChartPrice(closes[i]);
                const timestamp = parseChartTimestamp(timestamps[i]);
                if (price === null || timestamp === null) continue;
                points.push({ timestamp: timestamp * 1000, price });
            }

            return finalizeMainChartPoints(points);
        }

        function parseFinnhubMainChartResponse(data) {
            if (data?.s !== 'ok') return null;
            const closes = Array.isArray(data?.c) ? data.c : null;
            const timestamps = Array.isArray(data?.t) ? data.t : null;
            if (!closes || !timestamps) return null;

            const points = [];
            const len = Math.min(closes.length, timestamps.length);

            for (let i = 0; i < len; i++) {
                const price = parseChartPrice(closes[i]);
                const timestamp = parseChartTimestamp(timestamps[i]);
                if (price === null || timestamp === null) continue;
                points.push({ timestamp: timestamp * 1000, price });
            }

            return finalizeMainChartPoints(points);
        }

        async function fetchMainChartPricesFromYahoo(ticker, days, proxyBaseUrl) {
            const to = Math.floor(Date.now() / 1000);
            const from = to - (days * 24 * 60 * 60);
            const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=${from}&period2=${to}&interval=1d&includePrePost=false&events=div%2Csplits`;
            const response = await fetch(`${proxyBaseUrl}${encodeURIComponent(yahooUrl)}`);
            if (!response.ok) {
                throw new Error(`Yahoo request failed: ${response.status}`);
            }

            const data = await response.json();
            const parsed = parseYahooMainChartResponse(data);
            if (!parsed) {
                throw new Error('Yahoo chart data is empty');
            }

            return parsed;
        }

        }

        function confirmUnlockPassword() {
            const input = document.getElementById('resetPasswordInput');
            const errorBox = document.getElementById('resetPasswordError');
            const successBox = document.getElementById('resetPasswordSuccess');
            const password = (input.value || '').trim();

            errorBox.innerText = '';
            successBox.innerText = '';

            if (password !== DEFAULT_RESET_PASSWORD) {
                errorBox.innerText = '비밀번호가 틀렸습니다.';
                input.focus();
                input.select();
                return;
            }

            successBox.innerText = '확인되었습니다. 설정 수정 화면을 엽니다.';
            applyTemporarySettingsAccess();
            setTimeout(() => hideResetPrompt(false), 500);
        }

        function confirmUnlockPassword() {
            const input = document.getElementById('resetPasswordInput');
            const errorBox = document.getElementById('resetPasswordError');
            const successBox = document.getElementById('resetPasswordSuccess');
            const password = (input.value || '').trim();

            errorBox.innerText = '';
            successBox.innerText = '';

            if (password !== DEFAULT_RESET_PASSWORD) {

        }

        function updateHogiSelect() {
            const select = document.getElementById('hogiInput'); select.innerHTML = '';
            for(let i=1; i<=sysHogis; i++) { select.innerHTML += `<option value="${i}호기">${i}호기</option>`; }
            updateExtraSeedHogiOptions();
            autoFillTrade();
        }

        function ensureExtraSeedButton() {
            const dashboardTable = document.getElementById('dashboardBody');
            const dashboardCard = dashboardTable?.closest('.card');
            const header = dashboardCard?.querySelector('.card-header');
            if (!header || header.querySelector('.dashboard-header-tools')) return;

            header.classList.add('d-flex', 'justify-content-between', 'align-items-center');
            const tools = document.createElement('div');
            tools.className = 'dashboard-header-tools';
            tools.innerHTML = '<button type="button" class="btn btn-outline-secondary btn-sm" onclick="showExtraSeedPrompt()">추가 시드 입력</button>';
            header.appendChild(tools);
        }

        function updateExtraSeedHogiOptions() {
            const select = document.getElementById('extraSeedHogi');
            if (!select) return;
            select.innerHTML = '';
            for (let i = 1; i <= sysHogis; i++) {
                select.innerHTML += `<option value="${i}호기">${i}호기</option>`;
            }
        }

        function showExtraSeedPrompt() {
            ensureExtraSeedButton();
            updateExtraSeedHogiOptions();
            document.getElementById('extraSeedPanel').classList.remove('d-none');
            document.getElementById('extraSeedAmount').value = '';
            document.getElementById('extraSeedError').innerText = '';
            document.getElementById('extraSeedAmount').focus();
        }

        function hideExtraSeedPrompt() {
            document.getElementById('extraSeedPanel').classList.add('d-none');
            document.getElementById('extraSeedError').innerText = '';
        }

        function getTodayLocalDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = `${now.getMonth() + 1}`.padStart(2, '0');
            const day = `${now.getDate()}`.padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        async function saveExtraSeed() {
            const hogi = document.getElementById('extraSeedHogi').value;
            const amount = parseFloat(document.getElementById('extraSeedAmount').value);
            const errorBox = document.getElementById('extraSeedError');

            errorBox.innerText = '';
            if (!hogi) {
                errorBox.innerText = '호기를 선택해 주세요.';
                return;
            }
            if (!Number.isFinite(amount) || amount <= 0) {
                errorBox.innerText = '추가할 금액을 올바르게 입력해 주세요.';
                return;
            }

            const payload = {
                date: getTodayLocalDate(),
                hogi,
                trade_type: '시드추가',
                quantity: 1,
                price: amount,
                memo: '[추가시드입력]'
            };

            const { error } = await client.from(TABLE_NAME).insert([payload]);
            if (error) {
                errorBox.innerText = '추가 시드를 저장하지 못했습니다.';
                return;
            }

            hideExtraSeedPrompt();
            await loadData();
        }

        window.onload = async () => { 
            await loadSettings();
            await loadData();
            await fetchTicker();
            await loadMainTrendChart(currentMainChartRange);
            ensureExtraSeedButton();
        };

        async function loadData() {
            const { data } = await client.from(TABLE_NAME).select('*').order('date', { ascending: false }).order('created_at', { ascending: false });
            let chronoData = [...data].reverse();
            let stats = {};
            for(let i=1; i<=sysHogis; i++) stats[`${i}호기`] = { seed: SLOT_BASE_SEED, qty: 0, avgPrice: 0, profit: 0, win: 0, loss: 0, firstDate: null };

            chronoData.forEach(row => {
                let h = row.hogi; if(!stats[h]) return;
                let q = parseFloat(row.quantity); let p = parseFloat(row.price);
                row.realizedProfit = 0; row.profitRate = 0;

                if(row.trade_type === '매수') {
                    if(stats[h].qty === 0) stats[h].firstDate = row.date;
                    let totalCost = (stats[h].qty * stats[h].avgPrice) + (q * p);
                    stats[h].qty += q; stats[h].avgPrice = totalCost / stats[h].qty;
                } else if(row.trade_type === '매도') {
                    let realized = (p - stats[h].avgPrice) * q;
                    row.realizedProfit = realized;
                    if(stats[h].avgPrice > 0) { row.profitRate = (realized / (stats[h].avgPrice * q)) * 100; }
                    stats[h].profit += realized; stats[h].qty -= q;
                    if(stats[h].qty <= 0) { stats[h].qty = 0; stats[h].avgPrice = 0; stats[h].firstDate = null; }
                    if(realized > 0) stats[h].win++; else if(realized < 0) stats[h].loss++;
                } else if(row.trade_type === '시드추가') {
                    stats[h].seed += (q * p);
                }
            });

            globalData = chronoData.reverse(); globalStats = stats; 
            renderDashboard(); renderMonthlySummaryAndChart(); renderTradeLog(); autoFillTrade(); 
        }

        function renderDashboard() {
            const dashBody = document.getElementById('dashboardBody'); dashBody.innerHTML = '';
            let sumSeed = 0, sumCompound = 0, sumQty = 0, sumProfit = 0, sumWin = 0, sumLoss = 0;
            let today = new Date(); today.setHours(0,0,0,0);
            let curPrice = parseFloat(document.getElementById('currentPrice').value) || 0;

            for(let i=1; i<=sysHogis; i++) {
                let h = `${i}호기`; let s = globalStats[h];
                let compound = s.seed + s.profit; let rate = (s.profit / s.seed) * 100;
                sumSeed += s.seed; sumCompound += compound; sumQty += s.qty; sumProfit += s.profit; sumWin += s.win; sumLoss += s.loss;
                let targetPrice = s.avgPrice > 0 ? s.avgPrice * (1 + (sysTarget / 100)) : 0;
                let orderable = curPrice > 0 ? (compound / curPrice).toFixed(2) : '-';

                let dDayStr = '-';
                if(s.firstDate) {
                    let firstD = new Date(s.firstDate); firstD.setHours(0,0,0,0);
                    let targetD = new Date(firstD); let added = 0;
                    while(added < sysDday) { targetD.setDate(targetD.getDate() + 1); if(targetD.getDay() !== 0 && targetD.getDay() !== 6) added++; }
                    let diffDays = 0; let currentD = new Date(today); currentD.setHours(0,0,0,0);
                    let isPast = currentD > targetD; let tempD = new Date(isPast ? targetD : currentD); let endD = new Date(isPast ? currentD : targetD);
                    while(tempD < endD) { tempD.setDate(tempD.getDate() + 1); if(tempD.getDay() !== 0 && tempD.getDay() !== 6) diffDays++; }
                    let sign = isPast ? '+' : '-'; dDayStr = `${targetD.getMonth()+1}/${targetD.getDate()}(${sign}${diffDays}일)`;
                }

                dashBody.innerHTML += `<tr><td class="sticky-col">${h}</td><td>${s.seed.toLocaleString(undefined,{minimumFractionDigits:2})}</td><td>${compound.toLocaleString(undefined,{minimumFractionDigits:2})}</td><td>${s.qty}</td><td class="${s.profit > 0 ? 'text-profit' : (s.profit < 0 ? 'text-loss' : '')}">${s.profit.toLocaleString(undefined,{minimumFractionDigits:2})}</td><td>${rate.toFixed(1)}%</td><td>${s.win}</td><td>${s.loss}</td><td>${s.avgPrice > 0 ? s.avgPrice.toFixed(2) : '-'}</td><td class="text-profit">${targetPrice > 0 ? targetPrice.toFixed(2) : '-'}</td><td class="fw-bold text-success">${orderable}</td><td class="text-muted fw-bold">${dDayStr}</td></tr>`;
            }
            let totalRate = sumSeed > 0 ? (sumProfit / sumSeed) * 100 : 0;
            dashBody.insertAdjacentHTML('afterbegin', `<tr class="total-row"><td class="sticky-col">합계</td><td>${sumSeed.toLocaleString(undefined,{minimumFractionDigits:2})}</td><td>${sumCompound.toLocaleString(undefined,{minimumFractionDigits:2})}</td><td>${sumQty}</td><td class="${sumProfit > 0 ? 'text-profit' : (sumProfit < 0 ? 'text-loss' : '')}">${sumProfit.toLocaleString(undefined,{minimumFractionDigits:2})}</td><td>${totalRate.toFixed(1)}%</td><td class="text-profit">${sumWin}</td><td class="text-loss">${sumLoss}</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>`);
        }

        function renderMonthlySummaryAndChart() {
            let monthly = {}; let baseTotalSeed = sysSeed; let currentPrincipal = baseTotalSeed; let currentTotalProfit = 0;
            [...globalData].reverse().forEach(row => {
                let month = row.date.substring(0, 7); 
                if(!monthly[month]) { monthly[month] = { profit: 0, principal: currentPrincipal, evaluated: currentPrincipal + currentTotalProfit }; }
                if(row.trade_type === '매도' && row.realizedProfit) { monthly[month].profit += row.realizedProfit; currentTotalProfit += row.realizedProfit; } 
                else if(row.trade_type === '시드추가') { currentPrincipal += (row.quantity * row.price); }
                monthly[month].principal = currentPrincipal; monthly[month].evaluated = currentPrincipal + currentTotalProfit;
            });

            let sortedMonths = Object.keys(monthly).sort().reverse();
            let tbody = document.getElementById('monthlySummaryBody'); tbody.innerHTML = '';
            sortedMonths.forEach(m => {
                let mObj = monthly[m]; let yy = m.substring(2, 4); let mm = parseInt(m.substring(5, 7)); let displayMonth = `'${yy}.${mm}`; 
                let monthlyRate = mObj.principal > 0 ? (mObj.profit / mObj.principal) * 100 : 0;
                tbody.innerHTML += `<tr><td class="fw-bold">${displayMonth}</td><td>${mObj.principal.toLocaleString(undefined, {minimumFractionDigits:2})}</td><td class="${mObj.profit > 0 ? 'text-profit' : (mObj.profit < 0 ? 'text-loss' : '')} fw-bold">${mObj.profit.toLocaleString(undefined, {minimumFractionDigits:2})}</td><td class="fw-bold text-secondary">${monthlyRate.toFixed(1)}%</td></tr>`;
            });
            if(sortedMonths.length === 0) tbody.innerHTML = `<tr><td colspan="4" class="text-muted">기록 없음</td></tr>`;

            let chartLabels = [], chartPrincipal = [], chartEvaluated = [], chartMonthlyProfit = []; 
            Object.keys(monthly).sort().forEach(m => {
                chartLabels.push(`'${m.substring(2,4)}.${parseInt(m.substring(5,7))}`);
                chartPrincipal.push(monthly[m].principal); chartEvaluated.push(monthly[m].evaluated); chartMonthlyProfit.push(monthly[m].profit);
            });

            const chartWrapper = document.getElementById('chartWrapper');
            chartWrapper.style.minWidth = chartLabels.length > 6 ? `${chartLabels.length * 60}px` : '100%';

            const ctx = document.getElementById('monthlyChart').getContext('2d');
            if(myChart) myChart.destroy(); 
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [
                        { label: '누적 시드(원금)', data: chartPrincipal, borderColor: '#adb5bd', backgroundColor: 'rgba(173, 181, 189, 0.2)', borderWidth: 2, tension: 0.3, fill: true },
                        { label: '누적 평가금', data: chartEvaluated, borderColor: '#1a237e', backgroundColor: 'rgba(26, 35, 126, 0.1)', borderWidth: 3, tension: 0.3, fill: true }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { position: 'top', labels: { font: { family: "'Noto Sans KR', sans-serif", size: 11 } } },
                        tooltip: {
                            backgroundColor: 'rgba(26, 35, 126, 0.9)', titleFont: { size: 13 }, bodyFont: { size: 12 }, padding: 10,
                            callbacks: {
                                label: (c) => ` ${c.dataset.label}: $${c.parsed.y.toLocaleString(undefined, {minimumFractionDigits:2})}`,
                                afterBody: (items) => {
                                    if(items.length === 2) {
                                        let idx = items[0].dataIndex; let mProfit = chartMonthlyProfit[idx]; let cProfit = items[1].raw - items[0].raw;
                                        return `\n💰 해당월 수익: ${mProfit>=0?'+':''}$${mProfit.toLocaleString(undefined, {minimumFractionDigits:2})}\n📈 누적 수익금: ${cProfit>=0?'+':''}$${cProfit.toLocaleString(undefined, {minimumFractionDigits:2})}`;
                                    }
                                }
                            }
                        }
                    },
                    scales: { y: { beginAtZero: false, ticks: { font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } }
                }
            });
        }

        function renderTradeLog() {
            const tbody = document.getElementById('tradeLogBody'); tbody.innerHTML = '';
            globalData.forEach(row => {
                const amount = (row.quantity * row.price).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
                const typeClass = row.trade_type === '매수' ? 'text-loss' : row.trade_type === '매도' ? 'text-profit' : 'text-success';
                let profitStr = '-', rateStr = '-';
                if (row.trade_type === '매도' && row.realizedProfit !== undefined) {
                    let sign = row.realizedProfit > 0 ? '+' : '';
                    profitStr = `<span class="text-profit">${sign}${row.realizedProfit.toLocaleString(undefined, {minimumFractionDigits:2})}</span>`;
                    rateStr = `<span class="text-profit">${sign}${row.profitRate.toFixed(2)}%</span>`;
                }
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="sticky-col">${row.date.substring(5)}</td><td>${row.hogi}</td><td class="${typeClass}">${row.trade_type}</td><td>${row.quantity}</td><td>${row.price.toLocaleString(undefined, {minimumFractionDigits:2})}</td><td>${amount}</td><td>${profitStr}</td><td>${rateStr}</td><td class="small text-muted">${row.memo || ''}</td><td style="padding: 4px;"><button onclick="editData(${row.id})" class="btn btn-outline-secondary btn-action">수정</button><button onclick="deleteData(${row.id})" class="btn btn-outline-danger btn-action">삭제</button></td>`;
                tbody.appendChild(tr);
            });
        }

        function handleTypeChange() {
            const tInput = document.getElementById('typeInput'); const qInput = document.getElementById('qtyInput'); const pInput = document.getElementById('priceInput'); const memoInput = document.getElementById('memoInput');
            tInput.className = tInput.value === '매수' ? 'form-select form-select-sm text-loss' : tInput.value === '매도' ? 'form-select form-select-sm text-profit' : 'form-select form-select-sm text-success';
            if(tInput.value === '시드추가') { qInput.value = 1; pInput.value = ''; pInput.placeholder = "추가 금액($)"; if(memoInput.value === '') memoInput.value = '[시드증액]'; } 
            else { pInput.placeholder = "0.00"; const curPrice = document.getElementById('currentPrice').value; if(curPrice) pInput.value = curPrice; if(memoInput.value === '[시드증액]') memoInput.value = ''; }
        }

        function autoFillTrade() {
            const h = document.getElementById('hogiInput').value; const tInput = document.getElementById('typeInput'); const qInput = document.getElementById('qtyInput');
            if(tInput.value === '시드추가') return;
            if(globalStats[h] && globalStats[h].qty > 0) { tInput.value = '매도'; qInput.value = globalStats[h].qty; } else { tInput.value = '매수'; qInput.value = ''; }
            handleTypeChange(); 
        }

        async function saveData() {
            if(!isLocked) { alert("먼저 '새 매매 시작' 버튼을 눌러 설정을 확정해주세요."); return; }
            const id = document.getElementById('recordId').value; const date = document.getElementById('dateInput').value; const hogi = document.getElementById('hogiInput').value; const trade_type = document.getElementById('typeInput').value; const quantity = parseFloat(document.getElementById('qtyInput').value); const price = parseFloat(document.getElementById('priceInput').value); const memo = document.getElementById('memoInput').value;
            if(!quantity || !price) { alert("수량과 단가를 입력하세요."); return; }
            const payload = { date, hogi, trade_type, quantity, price, memo };
            if(id) { await client.from(TABLE_NAME).update(payload).eq('id', id); } else { await client.from(TABLE_NAME).insert([payload]); }
            resetForm(); loadData();
        }

        function editData(id) {
            const row = globalData.find(d => d.id === id); if(!row) return;
            document.getElementById('recordId').value = row.id; document.getElementById('dateInput').value = row.date; document.getElementById('hogiInput').value = row.hogi; document.getElementById('typeInput').value = row.trade_type; handleTypeChange(); document.getElementById('qtyInput').value = row.quantity; document.getElementById('priceInput').value = row.price; document.getElementById('memoInput').value = row.memo || '';
            document.getElementById('formTitle').innerText = "매매 기록 수정 중..."; document.getElementById('saveBtn').innerText = "수정 완료"; document.getElementById('cancelBtn').classList.remove('d-none'); window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        async function deleteData(id) { if(confirm("정말 이 기록을 삭제하시겠습니까?")) { await client.from(TABLE_NAME).delete().eq('id', id); loadData(); } }

        function resetForm() {
            document.getElementById('recordId').value = ''; document.getElementById('qtyInput').value = ''; document.getElementById('priceInput').value = ''; document.getElementById('memoInput').value = ''; document.getElementById('formTitle').innerText = "매매 기록 입력"; document.getElementById('saveBtn').innerText = "저장하기"; document.getElementById('cancelBtn').classList.add('d-none');
            if(document.getElementById('typeInput').value === '시드추가') document.getElementById('typeInput').value = '매수';
            autoFillTrade(); 
        }
    </script>

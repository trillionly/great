<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>떨사오팔 트레이딩 센터</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Noto Sans KR', sans-serif; font-size: 0.85rem; color: #333; }
        .card { border-radius: 12px; margin-bottom: 20px; border: 1px solid #e1e4e8; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow: hidden; }
        .card-header { background-color: #ffffff; border-bottom: 2px solid #1a237e; font-weight: 700; font-size: 1rem; color: #1a237e; padding: 14px 16px; }
        
        /* 테이블 스타일 */
        .table-responsive { overflow-x: auto; }
        .table-excel { border-collapse: separate; border-spacing: 0; width: 100%; white-space: nowrap; background: #ffffff; }
        .table-excel th, .table-excel td { border-bottom: 1px solid #dee2e6; border-right: 1px solid #dee2e6; padding: 10px 8px; text-align: center; vertical-align: middle; }
        .table-excel th { background-color: #f8f9fa; font-weight: 700; color: #495057; border-top: 1px solid #dee2e6; }
        .table-excel tbody tr:nth-child(even) { background-color: #fafbfc; }
        .table-excel tbody tr:hover { background-color: #eef2f5; transition: background-color 0.2s; cursor: pointer; }
        .table-excel .total-row { background-color: #ffffff; font-weight: 700; color: #000; border-top: 2px solid #1a237e; border-bottom: 2px solid #1a237e; }
        
        .sticky-col { position: sticky; left: 0; background-color: #ffffff; z-index: 2; border-right: 2px solid #ced4da !important; font-weight: 700; }
        .table-excel th.sticky-col { background-color: #f8f9fa; z-index: 3; }
        
        .scroll-box { max-height: 250px; overflow-y: auto; }
        .chart-scroll-box { overflow-x: auto; overflow-y: hidden; }

        .text-profit { color: #1565c0 !important; font-weight: 700; } 
        .text-loss { color: #d32f2f !important; font-weight: 700; }
        .text-success { color: #2e7d32 !important; font-weight: 700; } 
        
        /* 텍스트 링크 스타일 (둥근 버튼 제거, 마우스 오버 시 색상 변화) */
        .nav-links a { font-weight: 700; font-size: 0.8rem; color: #666; text-decoration: none; transition: color 0.2s; margin-left: 12px; }
        .nav-links a:hover { color: #1a237e; text-decoration: underline; }
        
        .form-control, .form-select { border-radius: 6px; border: 1px solid #ced4da; }
        .btn-primary { background-color: #1a237e; border-color: #1a237e; }
        .btn-action { padding: 1px 5px !important; font-size: 0.65rem !important; margin: 0 1px; }

        /* 변동률 뱃지 스타일 */
        #priceChangeBadge { font-size: 0.75rem; vertical-align: middle; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="container mt-4 mb-5" style="max-width: 1100px;">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h4 class="fw-bold m-0" style="color: #1a237e; letter-spacing: -0.5px;">📈 떨사오팔 센터</h4>
            <div class="nav-links">
                <a href="https://trillionly.github.io/great/?t=1">그리드매매 시스템</a>
                <a href="https://trillionly.github.io/great/trillion.html">장투리밸런싱 시스템</a>
            </div>
        </div>
        
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <div class="card h-100 mb-0">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>매매 시스템 세팅</span>
                        <span id="lockStatus" class="badge bg-danger d-none" style="font-size: 0.7rem;">잠금됨 (DB 동기화)</span>
                    </div>
                    <div class="card-body p-3">
                        <div id="settingsForm">
                            <div class="row g-2 align-items-end mb-2">
                                <div class="col-3">
                                    <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">운용 호기</label>
                                    <select id="setHogis" class="form-select form-select-sm"><option value="4">4분할</option><option value="6" selected>6분할</option><option value="10">10분할</option></select>
                                </div>
                                <div class="col-3">
                                    <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">기본시드($)</label>
                                    <input type="number" id="setSeed" class="form-control form-control-sm" value="11000">
                                </div>
                                <div class="col-3">
                                    <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">매도 목표</label>
                                    <select id="setTarget" class="form-select form-select-sm"><option value="0.5">0.5%</option><option value="0.7" selected>0.7%</option><option value="1.0">1.0%</option></select>
                                </div>
                                <div class="col-3">
                                    <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">손절(D-day)</label>
                                    <select id="setDday" class="form-select form-select-sm"><option value="15">15일</option><option value="30">30일</option><option value="45" selected>45일</option><option value="60">60일</option></select>
                                </div>
                            </div>
                            <button id="lockBtn" class="btn btn-primary btn-sm w-100 fw-bold mt-2" onclick="lockSettings()">새 매매 시작 (설정 확정)</button>
                        </div>
                        <div id="settingsSummary" class="d-none bg-light p-2 rounded text-center border mt-1">
                            <span id="summaryText" class="fw-bold me-3" style="color: #1a237e;"></span>
                            <button id="unlockBtn" class="btn btn-outline-secondary btn-sm" onclick="unlockSettings()" style="font-size:0.7rem;">초기화</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card h-100 mb-0">
                    <div class="card-header d-flex justify-content-between">
                        <span>Finnhub API 실시간 시세</span>
                        <span id="priceChangeBadge"></span>
                    </div>
                    <div class="card-body p-3">
                        <div class="row g-2 align-items-center h-100">
                            <div class="col-4 border-end px-2">
                                <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">종목 티커</label>
                                <div class="input-group input-group-sm">
                                    <input type="text" id="tickerInput" class="form-control text-center fw-bold text-uppercase" value="SOXL">
                                    <button class="btn btn-secondary" id="fetchBtn" onclick="fetchTicker()">조회</button>
                                </div>
                            </div>
                            <div class="col-4 border-end px-2 text-center">
                                <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">현재(LOC) 단가($)</label>
                                <input type="number" id="currentPrice" class="form-control form-control-sm text-center fw-bold" step="0.01" oninput="calcTodayBuyPrice()">
                            </div>
                            <div class="col-4 px-2 text-center">
                                <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">매수 타점(-0.1%)</label>
                                <div id="todayBuyPrice" class="fs-5 text-loss fw-bold mt-1">-</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">전체 누적 호기별 현황</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table-excel mb-0">
                        <thead>
                            <tr>
                                <th class="sticky-col">호기</th><th>투입시드</th><th>복리시드</th><th>보유수량</th>
                                <th>수익금</th><th>수익률</th><th>익절</th><th>손절</th>
                                <th>매수가(평단)</th><th class="text-profit">매도가(목표)</th><th>주문가능수량</th><th>D-day(손절)</th>
                            </tr>
                        </thead>
                        <tbody id="dashboardBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-7"><div class="card h-100 mb-0"><div class="card-header">월별 자산 성장 추이</div><div class="card-body p-3 chart-scroll-box"><div id="chartWrapper" style="height: 250px; min-width: 100%;"><canvas id="monthlyChart"></canvas></div></div></div></div>
            <div class="col-md-5"><div class="card h-100 mb-0"><div class="card-header">월별 마감 요약</div><div class="card-body p-0 scroll-box"><table class="table-excel mb-0"><thead><tr><th>월별</th><th>누적시드</th><th>수익금</th><th>수익률</th></tr></thead><tbody id="monthlySummaryBody"></tbody></table></div></div></div>
        </div>

        <div class="card mt-3">
            <div class="card-header" id="formTitle">매매 기록 입력</div>
            <div class="card-body p-3">
                <input type="hidden" id="recordId">
                <div class="row g-2 mb-3">
                    <div class="col-4"><label class="form-label text-muted mb-1" style="font-size:0.75rem;">날짜</label><input type="date" id="dateInput" class="form-control form-control-sm"></div>
                    <div class="col-4"><label class="form-label text-muted mb-1" style="font-size:0.75rem;">호기 선택</label><select id="hogiInput" class="form-select form-select-sm" onchange="autoFillTrade()"></select></div>
                    <div class="col-4"><label class="form-label text-muted mb-1" style="font-size:0.75rem;">매매/시드추가</label><select id="typeInput" class="form-select form-select-sm text-loss" onchange="handleTypeChange()"><option value="매수">매수</option><option value="매도">매도</option><option value="시드추가">시드추가</option></select></div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-4"><label class="form-label text-muted mb-1" style="font-size:0.75rem;">수량</label><input type="number" id="qtyInput" class="form-control form-control-sm"></div>
                    <div class="col-4"><label class="form-label text-muted mb-1" style="font-size:0.75rem;">단가/금액</label><input type="number" id="priceInput" class="form-control form-control-sm" step="0.01"></div>
                    <div class="col-4"><label class="form-label text-muted mb-1" style="font-size:0.75rem;">비고</label><input type="text" id="memoInput" class="form-control form-control-sm"></div>
                </div>
                <div class="d-flex gap-2">
                    <button id="saveBtn" onclick="saveData()" class="btn btn-primary w-100 fw-bold">저장하기</button>
                    <button id="cancelBtn" onclick="resetForm()" class="btn btn-secondary d-none">수정 취소</button>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header">최근 매매 기록 내역</div>
            <div class="card-body p-0">
                <div class="table-responsive scroll-box" style="max-height: 500px;">
                    <table class="table-excel mb-0"><thead><tr><th class="sticky-col">날짜</th><th>호기</th><th>구분</th><th>수량</th><th>단가</th><th>총액</th><th>수익금</th><th>수익률</th><th>비고</th><th>관리</th></tr></thead><tbody id="tradeLogBody"></tbody></table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qutualbddxsyrhwzaosf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dHVhbGJkZHhzeXJod3phb3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODA1MTEsImV4cCI6MjA4NzE1NjUxMX0.iDcwZg9bGFnbl0DJfU0ks4DZtdVJ24Rh_e2ooDP-dts';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const FINNHUB_KEY = 'd6om8dpr01qi5kh3g1cgd6om8dpr01qi5kh3g1d0';
        const TABLE_NAME = 'teol_sa_o_pal';
        const SETTINGS_TABLE = 'app_settings';

        let sysHogis = 6, sysSeed = 11000, sysTarget = 0.7, sysDday = 45;
        let isLocked = false, globalData = [], globalStats = {}, myChart = null;

        document.getElementById('dateInput').valueAsDate = new Date();

        // 핀허브 API 조회 + 변동률 계산 기능 추가
        async function fetchTicker() {
            const ticker = document.getElementById('tickerInput').value.toUpperCase();
            const btn = document.getElementById('fetchBtn');
            const badge = document.getElementById('priceChangeBadge');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'; btn.disabled = true;

            try {
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_KEY}`);
                const data = await response.json();
                
                if (data && data.c) {
                    const price = data.c; // 현재가
                    const prevClose = data.pc; // 전일 종가
                    const changePercent = ((price - prevClose) / prevClose * 100).toFixed(2);
                    const colorClass = changePercent > 0 ? 'text-danger' : (changePercent < 0 ? 'text-primary' : 'text-muted');
                    const sign = changePercent > 0 ? '▲' : (changePercent < 0 ? '▼' : '');

                    document.getElementById('currentPrice').value = price.toFixed(2);
                    badge.innerHTML = `<span class="${colorClass} fw-bold">${sign} ${Math.abs(changePercent)}%</span>`;
                    
                    if(document.getElementById('typeInput').value !== '시드추가') document.getElementById('priceInput').value = price.toFixed(2);
                    calcTodayBuyPrice();
                }
            } catch (e) { console.error(e); } finally { btn.innerHTML = "조회"; btn.disabled = false; }
        }

        // 기존 Supabase 및 UI 로직 (동일)
        async function loadSettings() {
            const { data } = await client.from(SETTINGS_TABLE).select('*').eq('id', 1).single();
            if (data && data.is_locked) {
                isLocked = true; sysHogis = data.sys_hogis; sysSeed = data.sys_seed; sysTarget = data.sys_target; sysDday = data.sys_dday;
                document.getElementById('settingsForm').classList.add('d-none');
                document.getElementById('settingsSummary').classList.remove('d-none');
                document.getElementById('lockStatus').classList.remove('d-none');
                document.getElementById('summaryText').innerText = `[${sysHogis}분할] $${sysSeed.toLocaleString()} | 매도 +${sysTarget}% | 손절 ${sysDday}일`;
            } else {
                isLocked = false;
                document.getElementById('settingsForm').classList.remove('d-none');
                document.getElementById('settingsSummary').classList.add('d-none');
                document.getElementById('lockStatus').classList.add('d-none');
            }
            updateHogiSelect();
        }

        async function lockSettings() {
            sysHogis = parseInt(document.getElementById('setHogis').value); sysSeed = parseFloat(document.getElementById('setSeed').value);
            sysTarget = parseFloat(document.getElementById('setTarget').value); sysDday = parseInt(document.getElementById('setDday').value);
            const payload = { id: 1, sys_hogis: sysHogis, sys_seed: sysSeed, sys_target: sysTarget, sys_dday: sysDday, is_locked: true };
            await client.from(SETTINGS_TABLE).upsert(payload);
            await loadSettings(); await loadData();
        }

        async function unlockSettings() { if(confirm("초기화하시겠습니까?")) { await client.from(SETTINGS_TABLE).update({ is_locked: false }).eq('id', 1); await loadSettings(); } }

        function updateHogiSelect() {
            const select = document.getElementById('hogiInput'); select.innerHTML = '';
            for(let i=1; i<=sysHogis; i++) select.innerHTML += `<option value="${i}호기">${i}호기</option>`;
            autoFillTrade();
        }

        window.onload = async () => { await loadSettings(); await loadData(); fetchTicker(); };

        async function loadData() {
            const { data } = await client.from(TABLE_NAME).select('*').order('date', { ascending: false }).order('created_at', { ascending: false });
            let chronoData = [...data].reverse();
            let stats = {};
            for(let i=1; i<=sysHogis; i++) stats[`${i}호기`] = { seed: sysSeed, qty: 0, avgPrice: 0, profit: 0, win: 0, loss: 0, firstDate: null };
            chronoData.forEach(row => {
                let h = row.hogi; if(!stats[h]) return;
                let q = parseFloat(row.quantity), p = parseFloat(row.price);
                if(row.trade_type === '매수') {
                    if(stats[h].qty === 0) stats[h].firstDate = row.date;
                    stats[h].avgPrice = ((stats[h].qty * stats[h].avgPrice) + (q * p)) / (stats[h].qty + q);
                    stats[h].qty += q;
                } else if(row.trade_type === '매도') {
                    let realized = (p - stats[h].avgPrice) * q;
                    row.realizedProfit = realized; row.profitRate = (realized / (stats[h].avgPrice * q)) * 100;
                    stats[h].profit += realized; stats[h].qty -= q;
                    if(stats[h].qty <= 0) { stats[h].qty = 0; stats[h].avgPrice = 0; stats[h].firstDate = null; }
                    if(realized > 0) stats[h].win++; else if(realized < 0) stats[h].loss++;
                } else if(row.trade_type === '시드추가') { stats[h].seed += (q * p); }
            });
            globalData = chronoData.reverse(); globalStats = stats;
            renderDashboard(); renderMonthlySummaryAndChart(); renderTradeLog();
        }

        function renderDashboard() {
            const dashBody = document.getElementById('dashboardBody'); dashBody.innerHTML = '';
            let sumSeed = 0, sumCompound = 0, sumProfit = 0, curPrice = parseFloat(document.getElementById('currentPrice').value) || 0;
            for(let i=1; i<=sysHogis; i++) {
                let h = `${i}호기`, s = globalStats[h], compound = s.seed + s.profit;
                sumSeed += s.seed; sumCompound += compound; sumProfit += s.profit;
                let targetPrice = s.avgPrice > 0 ? s.avgPrice * (1 + (sysTarget / 100)) : 0;
                let dDayStr = '-';
                if(s.firstDate) {
                    let targetD = new Date(s.firstDate), added = 0;
                    while(added < sysDday) { targetD.setDate(targetD.getDate() + 1); if(targetD.getDay() !== 0 && targetD.getDay() !== 6) added++; }
                    let diff = Math.ceil((targetD - new Date()) / (1000*60*60*24));
                    dDayStr = `${targetD.getMonth()+1}/${targetD.getDate()}(${diff > 0 ? '-' : '+'}${Math.abs(diff)}일)`;
                }
                dashBody.innerHTML += `<tr><td class="sticky-col">${h}</td><td>${s.seed.toLocaleString()}</td><td>${compound.toLocaleString()}</td><td>${s.qty}</td><td class="${s.profit > 0 ? 'text-profit' : 'text-loss'}">${s.profit.toLocaleString()}</td><td>${(s.profit/s.seed*100).toFixed(1)}%</td><td>${s.win}</td><td>${s.loss}</td><td>${s.avgPrice.toFixed(2)}</td><td class="text-profit">${targetPrice.toFixed(2)}</td><td class="text-success fw-bold">${curPrice > 0 ? (compound/curPrice).toFixed(2) : '-'}</td><td>${dDayStr}</td></tr>`;
            }
        }

        function renderMonthlySummaryAndChart() {
            let monthly = {}; let currentPrincipal = sysHogis * sysSeed; let currentTotalProfit = 0;
            [...globalData].reverse().forEach(row => {
                let month = row.date.substring(0, 7);
                if(!monthly[month]) monthly[month] = { profit: 0, principal: currentPrincipal };
                if(row.trade_type === '매도') { monthly[month].profit += row.realizedProfit; currentTotalProfit += row.realizedProfit; }
                else if(row.trade_type === '시드추가') { currentPrincipal += (row.quantity * row.price); }
                monthly[month].principal = currentPrincipal; monthly[month].evaluated = currentPrincipal + currentTotalProfit;
            });
            let tbody = document.getElementById('monthlySummaryBody'); tbody.innerHTML = '';
            Object.keys(monthly).sort().reverse().forEach(m => {
                tbody.innerHTML += `<tr><td class="fw-bold">${m}</td><td>${monthly[m].principal.toLocaleString()}</td><td class="text-profit">${monthly[m].profit.toLocaleString()}</td><td>${(monthly[m].profit/monthly[m].principal*100).toFixed(1)}%</td></tr>`;
            });
            // 차트 갱신 로직 생략(기존과 동일)
        }

        function renderTradeLog() {
            const tbody = document.getElementById('tradeLogBody'); tbody.innerHTML = '';
            globalData.forEach(row => {
                tbody.innerHTML += `<tr><td class="sticky-col">${row.date.substring(5)}</td><td>${row.hogi}</td><td>${row.trade_type}</td><td>${row.quantity}</td><td>${row.price}</td><td>${(row.quantity*row.price).toFixed(2)}</td><td>${row.realizedProfit ? row.realizedProfit.toFixed(2) : '-'}</td><td>${row.profitRate ? row.profitRate.toFixed(1)+'%' : '-'}</td><td>${row.memo||''}</td><td><button onclick="deleteData(${row.id})" class="btn btn-outline-danger btn-action">삭제</button></td></tr>`;
            });
        }

        function calcTodayBuyPrice() {
            const current = parseFloat(document.getElementById('currentPrice').value);
            document.getElementById('todayBuyPrice').innerText = current ? (current * 0.999).toFixed(2) : '-';
        }

        function handleTypeChange() {
            const t = document.getElementById('typeInput').value;
            document.getElementById('typeInput').className = `form-select form-select-sm ${t==='매수'?'text-loss':t==='매도'?'text-profit':'text-success'}`;
        }

        function autoFillTrade() {
            const h = document.getElementById('hogiInput').value;
            if(globalStats[h] && globalStats[h].qty > 0) { document.getElementById('typeInput').value = '매도'; document.getElementById('qtyInput').value = globalStats[h].qty; }
            else { document.getElementById('typeInput').value = '매수'; document.getElementById('qtyInput').value = ''; }
            handleTypeChange();
        }

        async function saveData() {
            const payload = { date: document.getElementById('dateInput').value, hogi: document.getElementById('hogiInput').value, trade_type: document.getElementById('typeInput').value, quantity: parseFloat(document.getElementById('qtyInput').value), price: parseFloat(document.getElementById('priceInput').value), memo: document.getElementById('memoInput').value };
            await client.from(TABLE_NAME).insert([payload]); resetForm(); loadData();
        }

        async function deleteData(id) { if(confirm("삭제?")) { await client.from(TABLE_NAME).delete().eq('id', id); loadData(); } }

        function resetForm() { document.getElementById('qtyInput').value = ''; document.getElementById('priceInput').value = ''; document.getElementById('memoInput').value = ''; autoFillTrade(); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>떨사오팔 트레이딩 센터</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Noto Sans KR', sans-serif; font-size: 0.85rem; color: #333; }
        .card { border-radius: 12px; margin-bottom: 20px; border: 1px solid #e1e4e8; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow: hidden; }
        .card-header { background-color: #ffffff; border-bottom: 2px solid #1a237e; font-weight: 700; font-size: 1rem; color: #1a237e; padding: 14px 16px; }
        
        .table-responsive { overflow-x: auto; }
        .table-excel { border-collapse: separate; border-spacing: 0; width: 100%; white-space: nowrap; background: #ffffff; }
        .table-excel th, .table-excel td { border-bottom: 1px solid #dee2e6; border-right: 1px solid #dee2e6; padding: 10px 8px; text-align: center; vertical-align: middle; }
        .table-excel th { background-color: #f8f9fa; font-weight: 700; color: #495057; border-top: 1px solid #dee2e6; }
        .table-excel tbody tr:nth-child(even) { background-color: #fafbfc; }
        .table-excel tbody tr:hover { background-color: #eef2f5; transition: background-color 0.2s; cursor: pointer; }
        .table-excel .total-row { background-color: #ffffff; font-weight: 700; color: #000; border-top: 2px solid #1a237e; border-bottom: 2px solid #1a237e; }
        
        .sticky-col { position: sticky; left: 0; background-color: #ffffff; z-index: 2; border-right: 2px solid #ced4da !important; font-weight: 700; }
        .table-excel th.sticky-col { background-color: #f8f9fa; z-index: 3; }
        .table-excel tbody tr:nth-child(even) .sticky-col { background-color: #fafbfc; }
        .table-excel tbody tr:hover .sticky-col { background-color: #eef2f5; }

        .scroll-box { max-height: 250px; overflow-y: auto; }
        .scroll-box thead th { position: sticky; top: 0; z-index: 2; }
        
        .chart-scroll-box { overflow-x: auto; overflow-y: hidden; }

        .text-profit { color: #1565c0 !important; font-weight: 700; } 
        .text-loss { color: #d32f2f !important; font-weight: 700; }
        .text-success { color: #2e7d32 !important; font-weight: 700; } 
        
        .form-control, .form-select { border-radius: 6px; border: 1px solid #ced4da; }
        .btn-primary { background-color: #1a237e; border-color: #1a237e; }
        .btn-primary:hover { background-color: #121858; border-color: #121858; }
        .app-link-btn { border-radius: 20px; font-weight: 700; font-size: 0.85rem; border: 1.5px solid #1a237e; color: #1a237e; text-decoration: none; padding: 4px 12px; transition: all 0.2s; background: white; }
        .app-link-btn:hover { background-color: #1a237e; color: white; }
        
        .btn-action { padding: 1px 5px !important; font-size: 0.65rem !important; margin: 0 1px; }
    </style>
</head>
<body>
    <div class="container mt-4 mb-5" style="max-width: 1100px;">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h4 class="fw-bold m-0" style="color: #1a237e; letter-spacing: -0.5px;">📈 떨사오팔 센터</h4>
            <a href="https://trillionly.github.io/great/?t=1" class="app-link-btn shadow-sm">🔄 그리드매매 시스템 ➔</a>
        </div>
        
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <div class="card h-100 mb-0">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>매매 시스템 세팅</span>
                        <span id="lockStatus" class="badge bg-danger d-none" style="font-size: 0.7rem;">잠금됨</span>
                    </div>
                    <div class="card-body p-3">
                        <div id="settingsForm">
                            <div class="row g-2 align-items-end mb-2">
                                <div class="col-3">
                                    <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">운용 호기</label>
                                    <select id="setHogis" class="form-select form-select-sm"><option value="4">4분할</option><option value="6" selected>6분할</option><option value="10">10분할</option></select>
                                </div>
                                <div class="col-3">
                                    <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">기본시드($)</label>
                                    <input type="number" id="setSeed" class="form-control form-control-sm" value="11000">
                                </div>
                                <div class="col-3">
                                    <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">매도 목표</label>
                                    <select id="setTarget" class="form-select form-select-sm"><option value="0.5">0.5%</option><option value="0.7" selected>0.7%</option><option value="1.0">1.0%</option></select>
                                </div>
                                <div class="col-3">
                                    <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">손절(D-day)</label>
                                    <select id="setDday" class="form-select form-select-sm"><option value="15">15일</option><option value="30">30일</option><option value="45" selected>45일</option><option value="60">60일</option></select>
                                </div>
                            </div>
                            <button class="btn btn-primary btn-sm w-100 fw-bold mt-2" onclick="lockSettings()">새 매매 시작 (설정 확정)</button>
                        </div>
                        <div id="settingsSummary" class="d-none bg-light p-2 rounded text-center border mt-1">
                            <span id="summaryText" class="fw-bold me-3" style="color: #1a237e;"></span>
                            <button class="btn btn-outline-secondary btn-sm" onclick="unlockSettings()" style="font-size:0.7rem;">초기화</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card h-100 mb-0">
                    <div class="card-header">실시간 시세 및 타점 계산기</div>
                    <div class="card-body p-3">
                        <div class="row g-2 align-items-center h-100">
                            <div class="col-4 border-end px-2">
                                <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">종목 티커</label>
                                <div class="input-group input-group-sm">
                                    <input type="text" id="tickerInput" class="form-control text-center fw-bold text-uppercase" value="SOXL" placeholder="티커">
                                    <button class="btn btn-secondary" id="fetchBtn" style="min-width: 50px;" onclick="fetchTicker()">조회</button>
                                </div>
                            </div>
                            <div class="col-4 border-end px-2 text-center">
                                <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">현재(LOC) 단가($)</label>
                                <input type="number" id="currentPrice" class="form-control form-control-sm text-center fw-bold" step="0.01" oninput="calcTodayBuyPrice()">
                            </div>
                            <div class="col-4 px-2 text-center">
                                <label class="form-label text-muted mb-1" style="font-size: 0.75rem;">매수 타점(-0.1%)</label>
                                <div id="todayBuyPrice" class="fs-5 text-loss fw-bold mt-1">-</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">전체 누적 호기별 현황</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table-excel mb-0">
                        <thead>
                            <tr>
                                <th class="sticky-col">호기</th><th>투입시드</th><th>복리시드</th><th>보유수량</th>
                                <th>수익금</th><th>수익률</th><th>익절</th><th>손절</th>
                                <th>매수가(평단)</th><th class="text-profit">매도가(목표)</th><th>주문가능수량</th><th>D-day(손절)</th>
                            </tr>
                        </thead>
                        <tbody id="dashboardBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-7">
                <div class="card h-100 mb-0">
                    <div class="card-header">월별 자산 성장 추이 (원금 vs 평가금)</div>
                    <div class="card-body p-3 chart-scroll-box">
                        <div id="chartWrapper" style="height: 250px; min-width: 100%;">
                            <canvas id="monthlyChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card h-100 mb-0">
                    <div class="card-header">월별 마감 요약</div>
                    <div class="card-body p-0 scroll-box">
                        <table class="table-excel mb-0">
                            <thead>
                                <tr>
                                    <th style="width: 25%;">월별</th>
                                    <th style="width: 30%;">누적시드</th>
                                    <th style="width: 25%;">수익금</th>
                                    <th style="width: 20%;">수익률</th>
                                </tr>
                            </thead>
                            <tbody id="monthlySummaryBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-header" id="formTitle">매매 기록 입력</div>
            <div class="card-body p-3">
                <input type="hidden" id="recordId">
                <div class="row g-2 mb-3">
                    <div class="col-4">
                        <label class="form-label text-muted mb-1" style="font-size:0.75rem;">날짜</label>
                        <input type="date" id="dateInput" class="form-control form-control-sm">
                    </div>
                    <div class="col-4">
                        <label class="form-label text-muted mb-1" style="font-size:0.75rem;">호기 선택</label>
                        <select id="hogiInput" class="form-select form-select-sm" onchange="autoFillTrade()"></select>
                    </div>
                    <div class="col-4">
                        <label class="form-label text-muted mb-1" style="font-size:0.75rem;">매매/시드추가</label>
                        <select id="typeInput" class="form-select form-select-sm text-loss" onchange="handleTypeChange()">
                            <option value="매수" class="text-loss">매수</option>
                            <option value="매도" class="text-profit">매도</option>
                            <option value="시드추가" class="text-success">시드추가</option>
                        </select>
                    </div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-4">
                        <label class="form-label text-muted mb-1" style="font-size:0.75rem;">수량</label>
                        <input type="number" id="qtyInput" class="form-control form-control-sm" placeholder="0">
                    </div>
                    <div class="col-4">
                        <label class="form-label text-muted mb-1" style="font-size:0.75rem;">단가/금액</label>
                        <input type="number" id="priceInput" class="form-control form-control-sm" placeholder="0.00" step="0.01">
                    </div>
                    <div class="col-4">
                        <label class="form-label text-muted mb-1" style="font-size:0.75rem;">비고</label>
                        <input type="text" id="memoInput" class="form-control form-control-sm" placeholder="선택사항">
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button id="saveBtn" onclick="saveData()" class="btn btn-primary w-100 fw-bold">저장하기</button>
                    <button id="cancelBtn" onclick="resetForm()" class="btn btn-secondary d-none">수정 취소</button>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header">최근 매매 기록 내역</div>
            <div class="card-body p-0">
                <div class="table-responsive scroll-box" style="max-height: 500px;">
                    <table class="table-excel mb-0">
                        <thead>
                            <tr>
                                <th class="sticky-col" style="z-index: 4;">날짜</th>
                                <th>호기</th><th>구분</th><th>수량</th><th>단가/금액</th><th>총액</th>
                                <th>수익금</th><th>수익률</th>
                                <th>비고</th><th style="width: 70px;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="tradeLogBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qutualbddxsyrhwzaosf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dHVhbGJkZHhzeXJod3phb3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODA1MTEsImV4cCI6MjA4NzE1NjUxMX0.iDcwZg9bGFnbl0DJfU0ks4DZtdVJ24Rh_e2ooDP-dts';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const TABLE_NAME = 'teol_sa_o_pal';

        let sysHogis = 6, sysSeed = 11000, sysTarget = 0.7, sysDday = 45;
        let isLocked = false;
        let globalData = [];
        let globalStats = {}; 
        let myChart = null; 

        document.getElementById('dateInput').valueAsDate = new Date();

        // 빙글빙글 스피너 로직이 추가된 시세 조회 기능
        async function fetchTicker() {
            const ticker = document.getElementById('tickerInput').value.toUpperCase();
            if(!ticker) { alert("조회할 종목의 티커를 입력하세요."); return; }
            
            const btn = document.getElementById('fetchBtn');
            // 부트스트랩 스피너 코드 삽입
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>'; 
            btn.disabled = true;
            let price = null;
            const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}`;

            for(let i=0; i<3; i++) { 
                try {
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    const data = await res.json();
                    if(data.contents) {
                        const parsed = JSON.parse(data.contents);
                        price = parsed.chart.result[0].meta.regularMarketPrice;
                        if(price) break; 
                    }
                } catch(e) {
                    await new Promise(r => setTimeout(r, 1000)); 
                }
            }
            btn.innerHTML = "조회"; 
            btn.disabled = false;

            if(price) {
                const priceStr = price.toFixed(2);
                document.getElementById('currentPrice').value = priceStr;
                if(document.getElementById('typeInput').value !== '시드추가') {
                    document.getElementById('priceInput').value = priceStr; 
                }
                calcTodayBuyPrice(); 
            } else {
                console.warn("네트워크 통신 지연으로 시세를 가져오지 못했습니다.");
            }
        }

        function calcTodayBuyPrice() {
            const current = parseFloat(document.getElementById('currentPrice').value);
            if(current && current > 0) {
                document.getElementById('todayBuyPrice').innerText = (current * 0.999).toFixed(2);
            } else {
                document.getElementById('todayBuyPrice').innerText = '-';
            }
            renderDashboard(); 
        }

        function loadSettings() {
            if(localStorage.getItem('isLocked') === 'true') {
                isLocked = true;
                sysHogis = parseInt(localStorage.getItem('sysHogis'));
                sysSeed = parseFloat(localStorage.getItem('sysSeed'));
                sysTarget = parseFloat(localStorage.getItem('sysTarget'));
                sysDday = parseInt(localStorage.getItem('sysDday'));
                
                document.getElementById('settingsForm').classList.add('d-none');
                document.getElementById('settingsSummary').classList.remove('d-none');
                document.getElementById('lockStatus').classList.remove('d-none');
                document.getElementById('summaryText').innerText = `[${sysHogis}분할] 기본시드 $${sysSeed.toLocaleString()} | 매도 +${sysTarget}% | 손절 ${sysDday}일`;
            } else {
                isLocked = false;
                document.getElementById('settingsForm').classList.remove('d-none');
                document.getElementById('settingsSummary').classList.add('d-none');
                document.getElementById('lockStatus').classList.add('d-none');
            }
            updateHogiSelect();
        }

        function lockSettings() {
            sysHogis = parseInt(document.getElementById('setHogis').value);
            sysSeed = parseFloat(document.getElementById('setSeed').value);
            sysTarget = parseFloat(document.getElementById('setTarget').value);
            sysDday = parseInt(document.getElementById('setDday').value);
            localStorage.setItem('sysHogis', sysHogis); localStorage.setItem('sysSeed', sysSeed);
            localStorage.setItem('sysTarget', sysTarget); localStorage.setItem('sysDday', sysDday);
            localStorage.setItem('isLocked', 'true');
            loadSettings(); loadData();
        }

        function unlockSettings() {
            if(confirm("설정을 초기화하시겠습니까? 데이터는 유지되나 대시보드 기준이 변경됩니다.")) {
                localStorage.removeItem('isLocked'); loadSettings();
            }
        }

        function updateHogiSelect() {
            const select = document.getElementById('hogiInput');
            select.innerHTML = '';
            for(let i=1; i<=sysHogis; i++) {
                select.innerHTML += `<option value="${i}호기">${i}호기</option>`;
            }
            autoFillTrade();
        }

        // 웹페이지 로드 시 데이터 로딩 후 자동으로 티커 가격을 조회하는 로직 실행
        window.onload = () => { 
            loadSettings(); 
            loadData();
            fetchTicker(); 
        };

        async function loadData() {
            const { data, error } = await client.from(TABLE_NAME).select('*').order('date', { ascending: false }).order('created_at', { ascending: false });
            if (error) { alert("데이터 로드 실패!"); return; }
            
            let chronoData = [...data].reverse();
            let stats = {};
            for(let i=1; i<=sysHogis; i++) stats[`${i}호기`] = { seed: sysSeed, qty: 0, avgPrice: 0, profit: 0, win: 0, loss: 0, firstDate: null };

            chronoData.forEach(row => {
                let h = row.hogi;
                if(!stats[h]) return;
                
                let q = parseFloat(row.quantity);
                let p = parseFloat(row.price);
                row.realizedProfit = 0; 
                row.profitRate = 0;

                if(row.trade_type === '매수') {
                    if(stats[h].qty === 0) stats[h].firstDate = row.date;
                    let totalCost = (stats[h].qty * stats[h].avgPrice) + (q * p);
                    stats[h].qty += q;
                    stats[h].avgPrice = totalCost / stats[h].qty;
                } else if(row.trade_type === '매도') {
                    let realized = (p - stats[h].avgPrice) * q;
                    row.realizedProfit = realized;
                    if(stats[h].avgPrice > 0) {
                        row.profitRate = (realized / (stats[h].avgPrice * q)) * 100;
                    }
                    stats[h].profit += realized;
                    stats[h].qty -= q;
                    
                    if(stats[h].qty <= 0) { stats[h].qty = 0; stats[h].avgPrice = 0; stats[h].firstDate = null; }
                    if(realized > 0) stats[h].win++; else if(realized < 0) stats[h].loss++;
                } else if(row.trade_type === '시드추가') {
                    stats[h].seed += (q * p);
                }
            });

            globalData = chronoData.reverse(); 
            globalStats = stats; 
            
            renderDashboard();
            renderMonthlySummaryAndChart(); 
            renderTradeLog();       
            autoFillTrade(); 
        }

        function renderDashboard() {
            const dashBody = document.getElementById('dashboardBody');
            dashBody.innerHTML = '';
            let sumSeed = 0, sumCompound = 0, sumQty = 0, sumProfit = 0, sumWin = 0, sumLoss = 0;
            let today = new Date();
            today.setHours(0,0,0,0);
            let curPrice = parseFloat(document.getElementById('currentPrice').value) || 0;

            for(let i=1; i<=sysHogis; i++) {
                let h = `${i}호기`; let s = globalStats[h];
                let compound = s.seed + s.profit;
                let rate = (s.profit / s.seed) * 100;
                
                sumSeed += s.seed; sumCompound += compound; sumQty += s.qty;
                sumProfit += s.profit; sumWin += s.win; sumLoss += s.loss;

                let targetPrice = s.avgPrice > 0 ? s.avgPrice * (1 + (sysTarget / 100)) : 0;
                let orderable = curPrice > 0 ? (compound / curPrice).toFixed(2) : '-';

                let dDayStr = '-';
                if(s.firstDate) {
                    let start = new Date(s.firstDate);
                    start.setDate(start.getDate() + sysDday);
                    let diffTime = start - today;
                    let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    let sign = diffDays >= 0 ? '-' : '+'; 
                    dDayStr = `${start.getMonth()+1}/${start.getDate()}(${sign}${Math.abs(diffDays)}일)`;
                }

                dashBody.innerHTML += `
                    <tr>
                        <td class="sticky-col">${h}</td>
                        <td>${s.seed.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                        <td>${compound.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                        <td>${s.qty}</td>
                        <td class="${s.profit > 0 ? 'text-profit' : (s.profit < 0 ? 'text-loss' : '')}">${s.profit.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                        <td>${rate.toFixed(1)}%</td>
                        <td>${s.win}</td><td>${s.loss}</td>
                        <td>${s.avgPrice > 0 ? s.avgPrice.toFixed(2) : '-'}</td>
                        <td class="text-profit">${targetPrice > 0 ? targetPrice.toFixed(2) : '-'}</td>
                        <td class="fw-bold text-success">${orderable}</td>
                        <td class="text-muted">${dDayStr}</td>
                    </tr>
                `;
            }

            let totalRate = sumSeed > 0 ? (sumProfit / sumSeed) * 100 : 0;
            dashBody.insertAdjacentHTML('afterbegin', `
                <tr class="total-row">
                    <td class="sticky-col">합계</td>
                    <td>${sumSeed.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td>${sumCompound.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td>${sumQty}</td>
                    <td class="${sumProfit > 0 ? 'text-profit' : (sumProfit < 0 ? 'text-loss' : '')}">${sumProfit.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td>${totalRate.toFixed(1)}%</td>
                    <td class="text-profit">${sumWin}</td><td class="text-loss">${sumLoss}</td>
                    <td>-</td><td>-</td><td>-</td><td>-</td>
                </tr>
            `);
        }

        function renderMonthlySummaryAndChart() {
            let monthly = {};
            let baseTotalSeed = sysHogis * sysSeed;
            let currentPrincipal = baseTotalSeed;
            let currentTotalProfit = 0;
            
            let chronoData = [...globalData].reverse();
            chronoData.forEach(row => {
                let month = row.date.substring(0, 7); 
                if(!monthly[month]) {
                    monthly[month] = { profit: 0, principal: currentPrincipal, evaluated: currentPrincipal + currentTotalProfit };
                }
                
                if(row.trade_type === '매도' && row.realizedProfit) {
                    monthly[month].profit += row.realizedProfit;
                    currentTotalProfit += row.realizedProfit;
                } else if(row.trade_type === '시드추가') {
                    currentPrincipal += (row.quantity * row.price);
                }
                monthly[month].principal = currentPrincipal;
                monthly[month].evaluated = currentPrincipal + currentTotalProfit;
            });

            let sortedMonths = Object.keys(monthly).sort().reverse();
            let tbody = document.getElementById('monthlySummaryBody');
            tbody.innerHTML = '';

            sortedMonths.forEach(m => {
                let mObj = monthly[m];
                let yy = m.substring(2, 4);
                let mm = parseInt(m.substring(5, 7));
                let displayMonth = `'${yy}.${mm}`; 
                let monthlyRate = mObj.principal > 0 ? (mObj.profit / mObj.principal) * 100 : 0;

                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold">${displayMonth}</td>
                        <td>${mObj.principal.toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                        <td class="${mObj.profit > 0 ? 'text-profit' : (mObj.profit < 0 ? 'text-loss' : '')} fw-bold">${mObj.profit.toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                        <td class="fw-bold text-secondary">${monthlyRate.toFixed(1)}%</td>
                    </tr>
                `;
            });
            if(sortedMonths.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-muted">기록 없음</td></tr>`;
            }

            let chartLabels = [];
            let chartPrincipal = [];
            let chartEvaluated = [];
            
            Object.keys(monthly).sort().forEach(m => {
                chartLabels.push(`'${m.substring(2,4)}.${parseInt(m.substring(5,7))}`);
                chartPrincipal.push(monthly[m].principal);
                chartEvaluated.push(monthly[m].evaluated);
            });

            const chartWrapper = document.getElementById('chartWrapper');
            if(chartLabels.length > 6) {
                chartWrapper.style.minWidth = `${chartLabels.length * 60}px`; 
            } else {
                chartWrapper.style.minWidth = '100%';
            }

            const ctx = document.getElementById('monthlyChart').getContext('2d');
            if(myChart) myChart.destroy(); 
            
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [
                        { label: '누적 시드(원금)', data: chartPrincipal, borderColor: '#adb5bd', backgroundColor: 'rgba(173, 181, 189, 0.2)', borderWidth: 2, tension: 0.3, fill: true },
                        { label: '누적 평가금', data: chartEvaluated, borderColor: '#1a237e', backgroundColor: 'rgba(26, 35, 126, 0.1)', borderWidth: 3, tension: 0.3, fill: true }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { position: 'top', labels: { font: { family: "'Noto Sans KR', sans-serif", size: 11 } } },
                        tooltip: {
                            backgroundColor: 'rgba(26, 35, 126, 0.9)',
                            titleFont: { size: 13, family: "'Noto Sans KR', sans-serif" },
                            bodyFont: { size: 12, family: "'Noto Sans KR', sans-serif" },
                            padding: 10,
                            callbacks: {
                                label: function(context) {
                                    return ` ${context.dataset.label}: $${context.parsed.y.toLocaleString(undefined, {minimumFractionDigits:2})}`;
                                },
                                afterBody: function(tooltipItems) {
                                    if(tooltipItems.length === 2) {
                                        let principal = tooltipItems[0].raw;
                                        let evaluated = tooltipItems[1].raw;
                                        let profit = evaluated - principal;
                                        let sign = profit >= 0 ? '+' : '';
                                        return `\n💰 월 확정 수익: ${sign}$${profit.toLocaleString(undefined, {minimumFractionDigits:2})}`;
                                    }
                                }
                            }
                        }
                    },
                    scales: { y: { beginAtZero: false, ticks: { font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } }
                }
            });
        }

        function renderTradeLog() {
            const tbody = document.getElementById('tradeLogBody');
            tbody.innerHTML = '';
            globalData.forEach(row => {
                const amount = (row.quantity * row.price).toFixed(2);
                const typeClass = row.trade_type === '매수' ? 'text-loss' : row.trade_type === '매도' ? 'text-profit' : 'text-success';
                
                let profitStr = '-';
                let rateStr = '-';
                if (row.trade_type === '매도' && row.realizedProfit !== undefined) {
                    let sign = row.realizedProfit > 0 ? '+' : '';
                    profitStr = `<span class="text-profit">${sign}${row.realizedProfit.toLocaleString(undefined, {minimumFractionDigits:2})}</span>`;
                    rateStr = `<span class="text-profit">${sign}${row.profitRate.toFixed(2)}%</span>`;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="sticky-col">${row.date.substring(5)}</td>
                    <td>${row.hogi}</td>
                    <td class="${typeClass}">${row.trade_type}</td>
                    <td>${row.quantity}</td>
                    <td>${row.price.toFixed(2)}</td>
                    <td>${amount}</td>
                    <td>${profitStr}</td>
                    <td>${rateStr}</td>
                    <td class="small text-muted">${row.memo || ''}</td>
                    <td style="padding: 4px;">
                        <button onclick="editData(${row.id})" class="btn btn-outline-secondary btn-action">수정</button>
                        <button onclick="deleteData(${row.id})" class="btn btn-outline-danger btn-action">삭제</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function handleTypeChange() {
            const tInput = document.getElementById('typeInput');
            const qInput = document.getElementById('qtyInput');
            const pInput = document.getElementById('priceInput');

            tInput.className = tInput.value === '매수' ? 'form-select form-select-sm text-loss' :
                               tInput.value === '매도' ? 'form-select form-select-sm text-profit' :
                               'form-select form-select-sm text-success';

            if(tInput.value === '시드추가') {
                qInput.value = 1; pInput.value = ''; pInput.placeholder = "추가 금액($)";
            } else {
                pInput.placeholder = "0.00";
                const curPrice = document.getElementById('currentPrice').value;
                if(curPrice) pInput.value = curPrice; 
            }
        }

        function autoFillTrade() {
            const h = document.getElementById('hogiInput').value;
            const tInput = document.getElementById('typeInput');
            const qInput = document.getElementById('qtyInput');
            if(tInput.value === '시드추가') return;

            if(globalStats[h] && globalStats[h].qty > 0) {
                tInput.value = '매도'; qInput.value = globalStats[h].qty;
            } else {
                tInput.value = '매수'; qInput.value = '';
            }
            handleTypeChange(); 
        }

        async function saveData() {
            if(!isLocked) { alert("먼저 '새 매매 시작' 버튼을 눌러 설정을 확정해주세요."); return; }

            const id = document.getElementById('recordId').value;
            const date = document.getElementById('dateInput').value;
            const hogi = document.getElementById('hogiInput').value;
            const trade_type = document.getElementById('typeInput').value;
            const quantity = parseFloat(document.getElementById('qtyInput').value);
            const price = parseFloat(document.getElementById('priceInput').value);
            const memo = document.getElementById('memoInput').value;

            if(!quantity || !price) { alert("수량과 단가(금액)를 입력하세요."); return; }

            const payload = { date, hogi, trade_type, quantity, price, memo };
            let error;
            if(id) {
                const res = await client.from(TABLE_NAME).update(payload).eq('id', id); error = res.error;
            } else {
                const res = await client.from(TABLE_NAME).insert([payload]); error = res.error;
            }

            if(error) alert("처리 실패: " + error.message);
            else { resetForm(); loadData(); }
        }

        function editData(id) {
            const row = globalData.find(d => d.id === id);
            if(!row) return;
            document.getElementById('recordId').value = row.id;
            document.getElementById('dateInput').value = row.date;
            document.getElementById('hogiInput').value = row.hogi;
            document.getElementById('typeInput').value = row.trade_type;
            handleTypeChange(); 
            document.getElementById('qtyInput').value = row.quantity;
            document.getElementById('priceInput').value = row.price;
            document.getElementById('memoInput').value = row.memo || '';
            
            document.getElementById('formTitle').innerText = "매매 기록 수정 중...";
            document.getElementById('saveBtn').innerText = "수정 완료";
            document.getElementById('cancelBtn').classList.remove('d-none');
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        async function deleteData(id) {
            if(confirm("정말 이 기록을 삭제하시겠습니까?")) {
                const { error } = await client.from(TABLE_NAME).delete().eq('id', id);
                if(error) alert("삭제 실패: " + error.message); else loadData();
            }
        }

        function resetForm() {
            document.getElementById('recordId').value = '';
            document.getElementById('qtyInput').value = '';
            document.getElementById('priceInput').value = '';
            document.getElementById('memoInput').value = '';
            document.getElementById('formTitle').innerText = "매매 기록 입력";
            document.getElementById('saveBtn').innerText = "저장하기";
            document.getElementById('cancelBtn').classList.add('d-none');
            
            if(document.getElementById('typeInput').value === '시드추가') {
                document.getElementById('typeInput').value = '매수';
            }
            autoFillTrade(); 
        }
    </script>
</body>
</html>

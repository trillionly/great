<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>떨사오팔 매매 현황판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f4f7f6; font-size: 0.85rem; }
        .card { border-radius: 12px; margin-bottom: 15px; }
        .table-excel { border-collapse: collapse; width: 100%; white-space: nowrap; background: white;}
        .table-excel th, .table-excel td { border: 1px solid #dee2e6; padding: 6px; text-align: center; vertical-align: middle; }
        .table-excel th { background-color: #e9ecef; font-weight: bold; }
        .table-excel .total-row { background-color: #fdfdfe; font-weight: bold; color: black; }
        
        /* 2. 얼룩말 패턴 및 마우스 오버(터치) 효과 적용 */
        .table-excel tbody tr:nth-child(even) { background-color: #f8f9fa; }
        .table-excel tbody tr:hover { background-color: #e2e6ea; transition: background-color 0.2s; cursor: pointer; }
        
        .text-profit { color: #0275d8; font-weight: bold; } /* 파란색 (익절, 매도가) */
        .text-loss { color: #d9534f; font-weight: bold; } /* 빨간색 (손절, 매수) */
        .btn-action { padding: 2px 8px; font-size: 0.75rem; margin: 0 2px; }
    </style>
</head>
<body>
    <div class="container mt-3 mb-5" style="max-width: 950px;">
        <h3 class="text-center mb-4 fw-bold">📈 떨사오팔 매매 대시보드</h3>
        
        <div class="card shadow-sm border-0 p-3 bg-white">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="fw-bold m-0">⚙️ 매매 시스템 세팅</h6>
                <span id="lockStatus" class="badge bg-danger d-none">🔒 세팅 잠금됨</span>
            </div>
            <div id="settingsForm">
                <div class="row g-2 align-items-end mb-2">
                    <div class="col-3">
                        <label class="form-label mb-1" style="font-size: 0.75rem;">운용 호기</label>
                        <select id="setHogis" class="form-select form-select-sm"><option value="4">4분할</option><option value="6" selected>6분할</option><option value="10">10분할</option></select>
                    </div>
                    <div class="col-3">
                        <label class="form-label mb-1" style="font-size: 0.75rem;">최초시드($)</label>
                        <input type="number" id="setSeed" class="form-control form-control-sm" value="11000">
                    </div>
                    <div class="col-3">
                        <label class="form-label mb-1" style="font-size: 0.75rem;">매도 목표</label>
                        <select id="setTarget" class="form-select form-select-sm"><option value="0.5">0.5%</option><option value="0.7" selected>0.7%</option><option value="1.0">1.0%</option></select>
                    </div>
                    <div class="col-3">
                        <label class="form-label mb-1" style="font-size: 0.75rem;">손절일(D-day)</label>
                        <select id="setDday" class="form-select form-select-sm"><option value="15">15일</option><option value="30">30일</option><option value="45" selected>45일</option><option value="60">60일</option></select>
                    </div>
                </div>
                <button class="btn btn-primary btn-sm w-100 fw-bold mt-1" onclick="lockSettings()">🚀 새 매매 시작 (설정 확정)</button>
            </div>
            <div id="settingsSummary" class="d-none bg-light p-2 rounded text-center border">
                <span id="summaryText" class="fw-bold me-3"></span>
                <button class="btn btn-outline-secondary btn-sm" onclick="unlockSettings()">초기화</button>
            </div>
        </div>

        <div class="card shadow-sm border-0 p-2 bg-white mb-3">
            <div class="row g-2 align-items-center">
                <div class="col-4 text-center border-end">
                    <span class="badge bg-dark mb-1">티커 입력</span><br>
                    <div class="input-group input-group-sm">
                        <input type="text" id="tickerInput" class="form-control text-center fw-bold text-uppercase" placeholder="SOXL">
                        <button class="btn btn-secondary" id="fetchBtn" onclick="fetchTicker()">조회</button>
                    </div>
                </div>
                <div class="col-4 text-center border-end">
                    <span class="badge bg-secondary mb-1">현재가 (조회됨)</span><br>
                    <input type="number" id="currentPrice" class="form-control form-control-sm text-center fw-bold" step="0.01" oninput="calcTodayBuyPrice()">
                </div>
                <div class="col-4 text-center">
                    <span class="badge bg-success mb-1">오늘 매수 타점 (-0.1%)</span><br>
                    <h5 id="todayBuyPrice" class="text-success fw-bold m-0 mt-1">-</h5>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0 p-2 bg-white mb-4">
            <h6 class="fw-bold mb-2 ms-1">📊 전체 누적 호기별 현황</h6>
            <div class="table-responsive">
                <table class="table-excel">
                    <thead>
                        <tr>
                            <th>호기</th><th>최초시드</th><th>복리시드</th><th>보유수량</th>
                            <th>수익금</th><th>수익률</th><th>익절</th><th>손절</th>
                            <th>매수가(평단)</th><th class="text-profit">매도가(목표)</th><th>D-day(손절)</th>
                        </tr>
                    </thead>
                    <tbody id="dashboardBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card shadow-sm border-0 p-3 bg-white mb-4">
            <h6 class="fw-bold mb-3" id="formTitle">📝 매매 기록 입력 (자동 매칭)</h6>
            <input type="hidden" id="recordId">
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="date" id="dateInput" class="form-control"></div>
                <div class="col-6"><select id="hogiInput" class="form-select" onchange="autoFillTrade()"></select></div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-6">
                    <select id="typeInput" class="form-select text-loss" onchange="this.className=this.value=='매수'?'form-select text-loss':'form-select text-profit'">
                        <option value="매수" class="text-loss">🔴 매수</option><option value="매도" class="text-profit">🔵 매도</option>
                    </select>
                </div>
                <div class="col-6"><input type="number" id="qtyInput" class="form-control" placeholder="수량"></div>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-6"><input type="number" id="priceInput" class="form-control" placeholder="단가" step="0.01"></div>
                <div class="col-6"><input type="text" id="memoInput" class="form-control" placeholder="비고 (선택)"></div>
            </div>
            <div class="d-flex gap-2">
                <button id="saveBtn" onclick="saveData()" class="btn btn-dark w-100 fw-bold">저장하기</button>
                <button id="cancelBtn" onclick="resetForm()" class="btn btn-secondary d-none">취소</button>
            </div>
        </div>

        <div class="card shadow-sm border-0 p-3 bg-white mb-5">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-bold m-0">🗓️ 월별 매매 기록 및 요약</h6>
                <input type="month" id="monthFilter" class="form-control form-control-sm w-auto" onchange="renderMonthly()">
            </div>
            
            <div class="alert alert-secondary py-2 mb-3 text-center">
                <span class="fw-bold">해당 월 확정 수익금 : </span> 
                <span id="monthlyProfit" class="fs-5 fw-bold text-profit">0.00</span> $
            </div>

            <div class="table-responsive">
                <table class="table-excel">
                    <thead>
                        <tr>
                            <th>날짜</th><th>호기</th><th>매매</th><th>수량</th><th>단가</th><th>비고</th><th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="tradeLogBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qutualbddxsyrhwzaosf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dHVhbGJkZHhzeXJod3phb3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODA1MTEsImV4cCI6MjA4NzE1NjUxMX0.iDcwZg9bGFnbl0DJfU0ks4DZtdVJ24Rh_e2ooDP-dts';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const TABLE_NAME = 'teol_sa_o_pal';

        let sysHogis = 6, sysSeed = 11000, sysTarget = 0.7, sysDday = 45;
        let isLocked = false;
        let globalData = [];
        let globalStats = {}; // 자동 입력을 위한 호기별 현재 상태 저장

        // 3. 오늘 날짜 자동 입력 및 이번 달 기본 선택
        document.getElementById('dateInput').valueAsDate = new Date();
        const todayStr = new Date().toISOString().substring(0, 7);
        document.getElementById('monthFilter').value = todayStr;

        // 1. 외부 실시간 시세 (프록시 서버 우회)
        async function fetchTicker() {
            const ticker = document.getElementById('tickerInput').value.toUpperCase();
            if(!ticker) { alert("티커를 입력하세요."); return; }
            
            const btn = document.getElementById('fetchBtn');
            btn.innerText = "⏳";
            try {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}`;
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                const parsed = JSON.parse(data.contents);
                const price = parsed.chart.result[0].meta.regularMarketPrice;
                
                document.getElementById('currentPrice').value = price;
                calcTodayBuyPrice();
                btn.innerText = "조회";
            } catch(e) {
                alert("시세 조회 실패. 티커가 정확한지 확인해 주세요.");
                btn.innerText = "조회";
            }
        }

        function calcTodayBuyPrice() {
            const current = parseFloat(document.getElementById('currentPrice').value);
            if(current && current > 0) {
                document.getElementById('todayBuyPrice').innerText = (current * 0.999).toFixed(2);
            }
        }

        // 설정 로드 
        function loadSettings() {
            if(localStorage.getItem('isLocked') === 'true') {
                isLocked = true;
                sysHogis = parseInt(localStorage.getItem('sysHogis'));
                sysSeed = parseFloat(localStorage.getItem('sysSeed'));
                sysTarget = parseFloat(localStorage.getItem('sysTarget'));
                sysDday = parseInt(localStorage.getItem('sysDday'));
                
                document.getElementById('settingsForm').classList.add('d-none');
                document.getElementById('settingsSummary').classList.remove('d-none');
                document.getElementById('lockStatus').classList.remove('d-none');
                document.getElementById('summaryText').innerText = `[${sysHogis}분할] 시드 $${sysSeed} | 매도 +${sysTarget}% | 손절 ${sysDday}일`;
            } else {
                isLocked = false;
                document.getElementById('settingsForm').classList.remove('d-none');
                document.getElementById('settingsSummary').classList.add('d-none');
                document.getElementById('lockStatus').classList.add('d-none');
            }
            updateHogiSelect();
        }

        function lockSettings() {
            sysHogis = parseInt(document.getElementById('setHogis').value);
            sysSeed = parseFloat(document.getElementById('setSeed').value);
            sysTarget = parseFloat(document.getElementById('setTarget').value);
            sysDday = parseInt(document.getElementById('setDday').value);
            localStorage.setItem('sysHogis', sysHogis); localStorage.setItem('sysSeed', sysSeed);
            localStorage.setItem('sysTarget', sysTarget); localStorage.setItem('sysDday', sysDday);
            localStorage.setItem('isLocked', 'true');
            loadSettings(); loadData();
        }

        function unlockSettings() {
            if(confirm("설정을 초기화하시겠습니까? (기록은 지워지지 않으나 대시보드 계산 기준이 바뀝니다)")) {
                localStorage.removeItem('isLocked'); loadSettings();
            }
        }

        function updateHogiSelect() {
            const select = document.getElementById('hogiInput');
            select.innerHTML = '';
            for(let i=1; i<=sysHogis; i++) {
                select.innerHTML += `<option value="${i}호기">${i}호기</option>`;
            }
            autoFillTrade(); // 선택지 업데이트 후 자동매칭 실행
        }

        window.onload = () => { loadSettings(); loadData(); };

        async function loadData() {
            const { data, error } = await client.from(TABLE_NAME).select('*').order('date', { ascending: false }).order('created_at', { ascending: false });
            if (error) { alert("데이터 로드 실패!"); return; }
            
            let chronoData = [...data].reverse();
            let stats = {};
            for(let i=1; i<=sysHogis; i++) stats[`${i}호기`] = { seed: sysSeed, qty: 0, avgPrice: 0, profit: 0, win: 0, loss: 0, firstDate: null };

            chronoData.forEach(row => {
                let h = row.hogi;
                if(!stats[h]) return;
                
                let q = parseFloat(row.quantity);
                let p = parseFloat(row.price);
                row.realizedProfit = 0; // 월별 수익 계산을 위해 각 행에 실현수익 기록

                if(row.trade_type === '매수') {
                    if(stats[h].qty === 0) stats[h].firstDate = row.date;
                    let totalCost = (stats[h].qty * stats[h].avgPrice) + (q * p);
                    stats[h].qty += q;
                    stats[h].avgPrice = totalCost / stats[h].qty;
                } else if(row.trade_type === '매도') {
                    let realized = (p - stats[h].avgPrice) * q;
                    row.realizedProfit = realized; // 이 매도 건에서 발생한 수익 저장
                    stats[h].profit += realized;
                    stats[h].qty -= q;
                    
                    if(stats[h].qty <= 0) { stats[h].qty = 0; stats[h].avgPrice = 0; stats[h].firstDate = null; }
                    if(realized > 0) stats[h].win++; else if(realized < 0) stats[h].loss++;
                }
            });

            globalData = chronoData.reverse(); // 최신순으로 다시 뒤집어서 전역 저장
            globalStats = stats; // 스마트 자동 완성을 위해 전역 저장
            
            renderDashboard();
            renderMonthly(); // 6. 월별 렌더링 함수 호출
            autoFillTrade(); // 로드 완료 후 입력창 상태 세팅
        }

        function renderDashboard() {
            const dashBody = document.getElementById('dashboardBody');
            dashBody.innerHTML = '';
            let sumSeed = 0, sumCompound = 0, sumQty = 0, sumProfit = 0, sumWin = 0, sumLoss = 0;
            let today = new Date();
            today.setHours(0,0,0,0);

            for(let i=1; i<=sysHogis; i++) {
                let h = `${i}호기`; let s = globalStats[h];
                let compound = s.seed + s.profit;
                let rate = (s.profit / s.seed) * 100;
                
                sumSeed += s.seed; sumCompound += compound; sumQty += s.qty;
                sumProfit += s.profit; sumWin += s.win; sumLoss += s.loss;

                let targetPrice = s.avgPrice > 0 ? s.avgPrice * (1 + (sysTarget / 100)) : 0;
                
                // 4. 손절일 및 남은 기간 계산 기능 (Ex: 4/7(-28일))
                let dDayStr = '-';
                if(s.firstDate) {
                    let start = new Date(s.firstDate);
                    start.setDate(start.getDate() + sysDday);
                    let diffTime = start - today;
                    let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    let sign = diffDays > 0 ? '-' : '+'; // 남았으면 -, 지났으면 +
                    dDayStr = `${start.getMonth()+1}/${start.getDate()}(${sign}${Math.abs(diffDays)}일)`;
                }

                dashBody.innerHTML += `
                    <tr>
                        <td class="fw-bold">${h}</td>
                        <td>${s.seed.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                        <td>${compound.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                        <td>${s.qty}</td>
                        <td class="${s.profit > 0 ? 'text-profit' : (s.profit < 0 ? 'text-loss' : '')}">${s.profit.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                        <td>${rate.toFixed(1)}%</td>
                        <td>${s.win}</td><td>${s.loss}</td>
                        <td>${s.avgPrice > 0 ? s.avgPrice.toFixed(2) : '-'}</td>
                        <td class="text-profit fw-bold">${targetPrice > 0 ? targetPrice.toFixed(2) : '-'}</td> <td class="fw-bold text-secondary">${dDayStr}</td>
                    </tr>
                `;
            }

            let totalRate = sumSeed > 0 ? (sumProfit / sumSeed) * 100 : 0;
            dashBody.insertAdjacentHTML('afterbegin', `
                <tr class="total-row">
                    <td>합계</td>
                    <td>${sumSeed.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td>${sumCompound.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td>${sumQty}</td>
                    <td class="${sumProfit > 0 ? 'text-profit' : (sumProfit < 0 ? 'text-loss' : '')}">${sumProfit.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td>${totalRate.toFixed(1)}%</td>
                    <td class="text-profit">${sumWin}</td><td class="text-loss">${sumLoss}</td>
                    <td>-</td><td>-</td><td>-</td>
                </tr>
            `);
        }

        // 6. 월별 요약 렌더링 기능
        function renderMonthly() {
            let selectedMonth = document.getElementById('monthFilter').value;
            let tbody = document.getElementById('tradeLogBody');
            tbody.innerHTML = '';
            
            let monthlyProfitSum = 0;

            globalData.forEach(row => {
                let rowMonth = row.date.substring(0, 7);
                if(rowMonth === selectedMonth) {
                    if(row.trade_type === '매도') {
                        monthlyProfitSum += row.realizedProfit;
                    }
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${row.date.substring(5)}</td>
                        <td>${row.hogi}</td>
                        <td class="${row.trade_type === '매수' ? 'text-loss' : 'text-profit'}">${row.trade_type}</td>
                        <td>${row.quantity}</td>
                        <td>${row.price.toFixed(2)}</td>
                        <td class="small text-muted">${row.memo || ''}</td>
                        <td>
                            <button onclick="editData(${row.id})" class="btn btn-outline-primary btn-action">수정</button>
                            <button onclick="deleteData(${row.id})" class="btn btn-outline-danger btn-action">삭제</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            });

            // 해당 월 수익금 업데이트
            const profitElem = document.getElementById('monthlyProfit');
            profitElem.innerText = monthlyProfitSum.toFixed(2);
            profitElem.className = monthlyProfitSum >= 0 ? 'fs-5 fw-bold text-profit' : 'fs-5 fw-bold text-loss';
        }

        // 3. 매매 입력 스마트 자동 매칭 기능
        function autoFillTrade() {
            const h = document.getElementById('hogiInput').value;
            const tInput = document.getElementById('typeInput');
            const qInput = document.getElementById('qtyInput');
            
            if(globalStats[h] && globalStats[h].qty > 0) {
                // 이미 보유수량이 있으면 '매도' 선택 및 수량 자동 입력
                tInput.value = '매도';
                tInput.className = 'form-select text-profit';
                qInput.value = globalStats[h].qty;
            } else {
                // 보유수량이 없으면 '매수' 선택 및 수량 비우기
                tInput.value = '매수';
                tInput.className = 'form-select text-loss';
                qInput.value = '';
            }
        }

        async function saveData() {
            if(!isLocked) { alert("먼저 '새 매매 시작' 버튼을 눌러 설정을 확정해주세요!"); return; }

            const id = document.getElementById('recordId').value;
            const date = document.getElementById('dateInput').value;
            const hogi = document.getElementById('hogiInput').value;
            const trade_type = document.getElementById('typeInput').value;
            const quantity = parseFloat(document.getElementById('qtyInput').value);
            const price = parseFloat(document.getElementById('priceInput').value);
            const memo = document.getElementById('memoInput').value;

            if(!quantity || !price) { alert("수량과 단가를 입력하세요."); return; }

            const payload = { date, hogi, trade_type, quantity, price, memo };
            let error;
            if(id) {
                const res = await client.from(TABLE_NAME).update(payload).eq('id', id); error = res.error;
            } else {
                const res = await client.from(TABLE_NAME).insert([payload]); error = res.error;
            }

            if(error) alert("처리 실패: " + error.message);
            else { resetForm(); loadData(); }
        }

        function editData(id) {
            const row = globalData.find(d => d.id === id);
            if(!row) return;
            document.getElementById('recordId').value = row.id;
            document.getElementById('dateInput').value = row.date;
            document.getElementById('hogiInput').value = row.hogi;
            document.getElementById('typeInput').value = row.trade_type;
            document.getElementById('qtyInput').value = row.quantity;
            document.getElementById('priceInput').value = row.price;
            document.getElementById('memoInput').value = row.memo || '';
            document.getElementById('formTitle').innerText = "✏️ 매매 기록 수정 중...";
            document.getElementById('saveBtn').innerText = "수정 완료";
            document.getElementById('cancelBtn').classList.remove('d-none');
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        async function deleteData(id) {
            if(confirm("정말 이 기록을 삭제하시겠습니까?")) {
                const { error } = await client.from(TABLE_NAME).delete().eq('id', id);
                if(error) alert("삭제 실패: " + error.message); else loadData();
            }
        }

        function resetForm() {
            document.getElementById('recordId').value = '';
            document.getElementById('qtyInput').value = '';
            document.getElementById('priceInput').value = '';
            document.getElementById('memoInput').value = '';
            document.getElementById('formTitle').innerText = "📝 매매 기록 입력 (자동 매칭)";
            document.getElementById('saveBtn').innerText = "저장하기";
            document.getElementById('cancelBtn').classList.add('d-none');
            autoFillTrade(); // 폼 초기화 시에도 자동 매칭 1회 실행
        }
    </script>
</body>
</html>

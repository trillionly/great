<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>떨사오팔 매매 현황</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f4f7f6; font-size: 0.9rem; }
        .card { border-radius: 12px; }
        .table-excel { border-collapse: collapse; width: 100%; white-space: nowrap; font-size: 0.85rem; background: white;}
        .table-excel th, .table-excel td { border: 1px solid #dee2e6; padding: 6px; text-align: center; vertical-align: middle; }
        .table-excel th { background-color: #e9ecef; font-weight: bold; }
        .table-excel .total-row { background-color: #fdfdfe; font-weight: bold; }
        .text-buy { color: #d9534f; font-weight: bold; }
        .text-sell { color: #0275d8; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container mt-3 mb-5" style="max-width: 900px;">
        <h3 class="text-center mb-4 fw-bold">📈 떨사오팔 매매 현황판</h3>
        
        <div class="card mb-3 shadow-sm border-0 p-3 bg-white">
            <h6 class="fw-bold mb-2">⚙️ 시스템 설정 (버전 선택)</h6>
            <div class="row g-2 align-items-end">
                <div class="col-4">
                    <label class="form-label" style="font-size: 0.8rem;">운용 호기(분할) 수</label>
                    <select id="settingHogis" class="form-select form-select-sm" onchange="saveSettingsAndReload()">
                        <option value="1">1분할</option><option value="2">2분할</option><option value="3">3분할</option>
                        <option value="4">4분할</option><option value="5">5분할</option><option value="6" selected>6분할</option>
                        <option value="7">7분할</option><option value="10">10분할</option>
                    </select>
                </div>
                <div class="col-5">
                    <label class="form-label" style="font-size: 0.8rem;">1호기당 최초시드($)</label>
                    <input type="number" id="settingSeed" class="form-control form-control-sm" value="11000" onchange="saveSettingsAndReload()">
                </div>
                <div class="col-3">
                    <button class="btn btn-secondary btn-sm w-100" onclick="saveSettingsAndReload()">적용</button>
                </div>
            </div>
        </div>

        <div class="card mb-4 shadow-sm border-0 p-2 bg-white">
            <h6 class="fw-bold mb-2 ms-1">📊 호기별 요약 현황</h6>
            <div class="table-responsive">
                <table class="table-excel">
                    <thead>
                        <tr>
                            <th>호기</th><th>최초시드</th><th>복리시드</th><th>보유수량</th>
                            <th>수익금</th><th>수익률</th><th>익절</th><th>손절</th><th>매수가(평단)</th>
                        </tr>
                    </thead>
                    <tbody id="dashboardBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="card mb-4 shadow-sm border-0 p-3 bg-white">
            <h6 class="fw-bold mb-3">📝 매매 기록 입력</h6>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="date" id="dateInput" class="form-control"></div>
                <div class="col-6">
                    <select id="hogiInput" class="form-select">
                        </select>
                </div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-6">
                    <select id="typeInput" class="form-select text-buy" onchange="this.className=this.value=='매수'?'form-select text-buy':'form-select text-sell'">
                        <option value="매수" class="text-buy">🔴 매수</option>
                        <option value="매도" class="text-sell">🔵 매도</option>
                    </select>
                </div>
                <div class="col-6"><input type="number" id="qtyInput" class="form-control" placeholder="수량"></div>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-6"><input type="number" id="priceInput" class="form-control" placeholder="단가" step="0.01"></div>
                <div class="col-6"><input type="text" id="memoInput" class="form-control" placeholder="비고 (선택)"></div>
            </div>
            <button onclick="saveData()" class="btn btn-dark w-100 fw-bold">저장하기</button>
        </div>

        <div class="card shadow-sm border-0 p-3 mb-4 bg-white">
            <h6 class="fw-bold mb-3">📜 매매 기록 목록</h6>
            <div class="table-responsive">
                <table class="table-excel">
                    <thead>
                        <tr>
                            <th>날짜</th><th>호기</th><th>매매</th><th>수량</th><th>단가</th><th>비고</th>
                        </tr>
                    </thead>
                    <tbody id="tradeLogBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qutualbddxsyrhwzaosf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dHVhbGJkZHhzeXJod3phb3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODA1MTEsImV4cCI6MjA4NzE1NjUxMX0.iDcwZg9bGFnbl0DJfU0ks4DZtdVJ24Rh_e2ooDP-dts';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const TABLE_NAME = 'teol_sa_o_pal';

        document.getElementById('dateInput').valueAsDate = new Date();

        // 1. 설정값 불러오기 및 초기화
        let numHogis = localStorage.getItem('settingHogis') ? parseInt(localStorage.getItem('settingHogis')) : 6;
        let seedPerHogi = localStorage.getItem('settingSeed') ? parseFloat(localStorage.getItem('settingSeed')) : 11000;

        function applySettingsToUI() {
            document.getElementById('settingHogis').value = numHogis;
            document.getElementById('settingSeed').value = seedPerHogi;
            
            const hogiSelect = document.getElementById('hogiInput');
            hogiSelect.innerHTML = '';
            for(let i=1; i<=numHogis; i++) {
                hogiSelect.innerHTML += `<option value="${i}호기">${i}호기</option>`;
            }
        }

        function saveSettingsAndReload() {
            numHogis = parseInt(document.getElementById('settingHogis').value);
            seedPerHogi = parseFloat(document.getElementById('settingSeed').value);
            localStorage.setItem('settingHogis', numHogis);
            localStorage.setItem('settingSeed', seedPerHogi);
            applySettingsToUI();
            loadData(); // 설정이 바뀌면 대시보드 다시 계산
        }

        window.onload = () => {
            applySettingsToUI();
            loadData();
        };

        // 2. 데이터 불러오기 및 대시보드 계산 핵심 로직
        async function loadData() {
            const { data, error } = await client.from(TABLE_NAME).select('*').order('date', { ascending: false });
            if (error) { alert("데이터 불러오기 실패: " + error.message); return; }

            // 하단 표 (기록 목록) 그리기
            const tbody = document.getElementById('tradeLogBody');
            tbody.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.date.substring(5)}</td>
                    <td>${row.hogi}</td>
                    <td class="${row.trade_type === '매수' ? 'text-buy' : 'text-sell'}">${row.trade_type}</td>
                    <td>${row.quantity}</td>
                    <td>${row.price.toFixed(2)}</td>
                    <td class="small text-muted">${row.memo || ''}</td>
                `;
                tbody.appendChild(tr);
            });

            // 상단 대시보드 계산 로직 (과거부터 순서대로 계산해야 평단가가 맞음)
            let chronologicalData = [...data].reverse(); 
            
            // 호기별 현황판 데이터 그릇 만들기
            let stats = {};
            for(let i=1; i<=numHogis; i++) {
                stats[`${i}호기`] = { 
                    seed: seedPerHogi, qty: 0, avgPrice: 0, profit: 0, win: 0, loss: 0 
                };
            }

            // 매매 기록을 하나씩 돌면서 계산
            chronologicalData.forEach(row => {
                let h = row.hogi;
                if(!stats[h]) return; // 설정된 호기 수보다 높은 기록은 무시
                
                let q = parseFloat(row.quantity);
                let p = parseFloat(row.price);

                if(row.trade_type === '매수') {
                    // 평단가 계산: ((기존수량*기존평단) + (새수량*새단가)) / 총수량
                    let totalCost = (stats[h].qty * stats[h].avgPrice) + (q * p);
                    stats[h].qty += q;
                    stats[h].avgPrice = totalCost / stats[h].qty;
                } 
                else if(row.trade_type === '매도') {
                    // 수익금 계산: (매도단가 - 매수평단가) * 수량
                    let realizedProfit = (p - stats[h].avgPrice) * q;
                    stats[h].profit += realizedProfit;
                    stats[h].qty -= q; // 보유수량 차감
                    
                    if(stats[h].qty <= 0) {
                        stats[h].qty = 0;
                        stats[h].avgPrice = 0; // 전량 매도시 평단가 초기화
                    }
                    
                    if(realizedProfit > 0) stats[h].win++;
                    else if(realizedProfit < 0) stats[h].loss++;
                }
            });

            // 계산된 결과를 상단 대시보드 표에 그리기
            const dashBody = document.getElementById('dashboardBody');
            dashBody.innerHTML = '';
            
            let sumSeed = 0, sumCompound = 0, sumQty = 0, sumProfit = 0, sumWin = 0, sumLoss = 0;

            for(let i=1; i<=numHogis; i++) {
                let h = `${i}호기`;
                let s = stats[h];
                let compoundSeed = s.seed + s.profit; // 복리시드
                let profitRate = (s.profit / s.seed) * 100; // 수익률

                // 합계 누적
                sumSeed += s.seed; sumCompound += compoundSeed; sumQty += s.qty;
                sumProfit += s.profit; sumWin += s.win; sumLoss += s.loss;

                dashBody.innerHTML += `
                    <tr>
                        <td class="fw-bold">${h}</td>
                        <td>${s.seed.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
                        <td>${compoundSeed.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
                        <td>${s.qty}</td>
                        <td class="${s.profit > 0 ? 'text-buy' : (s.profit < 0 ? 'text-sell' : '')}">${s.profit.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
                        <td>${profitRate.toFixed(1)}%</td>
                        <td>${s.win}</td>
                        <td>${s.loss}</td>
                        <td>${s.avgPrice > 0 ? s.avgPrice.toFixed(2) : '-'}</td>
                    </tr>
                `;
            }

            // 전체 합계 줄 그리기
            let totalRate = sumSeed > 0 ? (sumProfit / sumSeed) * 100 : 0;
            dashBody.insertAdjacentHTML('afterbegin', `
                <tr class="total-row text-primary">
                    <td>합계</td>
                    <td>${sumSeed.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
                    <td>${sumCompound.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
                    <td>${sumQty}</td>
                    <td class="${sumProfit > 0 ? 'text-buy' : (sumProfit < 0 ? 'text-sell' : '')}">${sumProfit.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
                    <td>${totalRate.toFixed(1)}%</td>
                    <td>${sumWin}</td>
                    <td>${sumLoss}</td>
                    <td>-</td>
                </tr>
            `);
        }

        // 3. 저장 기능
        async function saveData() {
            const date = document.getElementById('dateInput').value;
            const hogi = document.getElementById('hogiInput').value;
            const trade_type = document.getElementById('typeInput').value;
            const quantity = parseFloat(document.getElementById('qtyInput').value);
            const price = parseFloat(document.getElementById('priceInput').value);
            const memo = document.getElementById('memoInput').value;

            if(!quantity || !price) { alert("수량과 단가를 모두 입력해 주세요!"); return; }

            const { error } = await client.from(TABLE_NAME).insert([{ date, hogi, trade_type, quantity, price, memo }]);

            if (error) { alert("저장 실패: " + error.message); } 
            else {
                document.getElementById('qtyInput').value = '';
                document.getElementById('priceInput').value = '';
                document.getElementById('memoInput').value = '';
                loadData(); // 저장 성공시 대시보드 및 목록 즉시 업데이트
            }
        }
    </script>
</body>
</html>

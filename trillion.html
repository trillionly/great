<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장투리밸런싱 시스템 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
        .input-field { background-color: #0f172a; border: 1px solid #334155; color: white; width: 100%; padding: 0.75rem; border-radius: 0.5rem; outline: none; }
        table { width: 100%; text-align: left; border-collapse: collapse; white-space: nowrap; }
        /* 폰트 크기 한 포인트 상향 (0.875rem -> 1rem) */
        th, td { padding: 0.75rem 1rem; border-bottom: 1px solid #334155; font-size: 1rem; }
        th { background-color: #0f172a; color: #94a3b8; font-weight: 600; }
        .text-up { color: #ef4444; } 
        .text-down { color: #3b82f6; }
        .btn-sm { padding: 2px 8px; font-size: 12px; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 pb-5 border-b border-slate-700">
            <h1 class="text-2xl font-bold tracking-tight">📊 장투 사령부 v2.0</h1>
            <div id="fx-rate" class="text-sm font-bold text-yellow-500">실시간 환율 로딩중...</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-6">
            <div class="lg:col-span-3 card p-6 shadow-lg overflow-x-auto">
                <h2 class="text-lg font-semibold mb-4 flex items-center justify-between">
                    <div>자산 현황 (SCHD 4 : QLD 6)</div>
                    <span id="price-status" class="text-xs text-slate-500">연동 대기중</span>
                </h2>
                <table>
                    <thead>
                        <tr>
                            <th class="text-left">종목</th><th>현재가</th><th>수량</th><th>평가금액($)</th><th>수익률</th><th>비중</th><th>리밸런싱 가이드</th>
                        </tr>
                    </thead>
                    <tbody id="asset-table-body">
                        </tbody>
                </table>
                <div id="total-krw-box" class="mt-4 p-4 bg-slate-800 rounded-lg text-right">
                    <span class="text-slate-400">원화 환산 총자산:</span>
                    <span id="total-krw" class="text-xl font-bold ml-2 text-green-400">₩0</span>
                </div>
            </div>

            <div class="lg:col-span-1 card p-6 shadow-lg">
                <h2 class="text-lg font-semibold mb-5">거래 입력/수정</h2>
                <div class="space-y-4">
                    <input type="hidden" id="edit-id">
                    <select id="ticker" class="input-field"><option value="QLD">QLD</option><option value="SCHD">SCHD</option></select>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="tradeType" class="input-field"><option value="매수">매수</option><option value="매도">매도</option></select>
                        <input type="number" id="quantity" class="input-field" placeholder="수량">
                    </div>
                    <input type="number" id="price" step="0.01" class="input-field" placeholder="단가 ($)">
                    <button onclick="saveData()" id="save-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-md transition-colors">기록 저장</button>
                    <button onclick="resetForm()" id="cancel-btn" class="w-full bg-slate-600 hidden text-white font-bold py-2 rounded-lg mt-2">수정 취소</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="card p-6 shadow-lg overflow-x-auto">
                <h2 class="text-lg font-semibold mb-4">최근 매매 기록 (수정/삭제)</h2>
                <table class="text-sm">
                    <thead><tr><th>날짜</th><th>종목</th><th>구분</th><th>수량</th><th>단가</th><th>관리</th></tr></thead>
                    <tbody id="trade-history-body"></tbody>
                </table>
            </div>
            <div class="card p-6 shadow-lg flex flex-col items-center">
                <h2 class="text-lg font-semibold mb-4 self-start">포트폴리오 비중</h2>
                <div class="h-64 w-full"><canvas id="weightChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>
    const SUPABASE_URL = 'https://qutualbddxsyrhwzaosf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dHVhbGJkZHhzeXJod3phb3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODA1MTEsImV4cCI6MjA4NzE1NjUxMX0.iDcwZg9bGFnbl0DJfU0ks4DZtdVJ24Rh_e2ooDP-dts';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // [소장님의 API Key를 여기에 입력하세요]
    const FINNHUB_API_KEY = 'YOUR_API_KEY_HERE'; 

    let weightChartInstance = null;
    let usdToKrw = 1350; // 기본 환율

    const fmt = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
    const fmtKrw = (n) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(n);

    // 1. 환율 및 주가 데이터 로드
    async function initData() {
        try {
            // 환율 로드 (오픈 API 사용)
            const fxRes = await fetch('https://open.er-api.com/v6/latest/USD').then(r => r.json());
            usdToKrw = fxRes.rates.KRW;
            document.getElementById('fx-rate').innerText = `💵 실시간 환율: ₩${usdToKrw.toFixed(2)}`;

            await updateDashboard();
            await loadTradeHistory();
        } catch(e) { console.error("데이터 로드 에러", e); }
    }

    // 2. 메인 대시보드 연산 및 업데이트
    async function updateDashboard() {
        const { data: trades } = await db.from('long_term_trade').select('*');
        let assets = { SCHD: { qty:0, cost:0 }, QLD: { qty:0, cost:0 } };
        
        trades?.forEach(t => {
            if(t.trade_type === '매수') { assets[t.ticker].qty += t.quantity; assets[t.ticker].cost += t.total_amount; }
            else { assets[t.ticker].qty -= t.quantity; assets[t.ticker].cost -= (assets[t.ticker].cost/ (assets[t.ticker].qty + t.quantity)) * t.quantity; }
        });

        // 실시간 주가 (Finnhub)
        let prices = { SCHD: 30.9, QLD: 67.91 }; // 백업가
        if(FINNHUB_API_KEY !== 'YOUR_API_KEY_HERE') {
            const [s, q] = await Promise.all([
                fetch(`https://finnhub.io/api/v1/quote?symbol=SCHD&token=${FINNHUB_API_KEY}`).then(r=>r.json()),
                fetch(`https://finnhub.io/api/v1/quote?symbol=QLD&token=${FINNHUB_API_KEY}`).then(r=>r.json())
            ]);
            if(s.c) prices.SCHD = s.c; if(q.c) prices.QLD = q.c;
            document.getElementById('price-status').innerText = '🟢 실시간 연결됨';
        }

        const schdVal = assets.SCHD.qty * prices.SCHD;
        const qldVal = assets.QLD.qty * prices.QLD;
        const totalUsd = schdVal + qldVal;

        // 화면 렌더링
        const tbody = document.getElementById('asset-table-body');
        tbody.innerHTML = '';
        
        [
            { name: 'SCHD', color: 'text-yellow-400', target: 0.4 },
            { name: 'QLD', color: 'text-blue-400', target: 0.6 }
        ].forEach(item => {
            const currentVal = item.name === 'SCHD' ? schdVal : qldVal;
            const currentQty = assets[item.name].qty;
            const currentPrice = prices[item.name];
            const ratio = totalUsd > 0 ? (currentVal / totalUsd) * 100 : 0;
            
            // 리밸런싱 계산 (목표금액 - 현재금액) / 현재가
            const targetVal = totalUsd * item.target;
            const diffQty = Math.round((targetVal - currentVal) / currentPrice);
            const guideText = diffQty > 0 ? `<span class="text-up font-bold">+${diffQty}주 매수</span>` : 
                             (diffQty < 0 ? `<span class="text-down font-bold">${diffQty}주 매도</span>` : '-');

            tbody.innerHTML += `
                <tr class="hover:bg-slate-800">
                    <td class="font-bold ${item.color}">${item.name}</td>
                    <td>${fmt(currentPrice)}</td>
                    <td>${currentQty.toLocaleString()}</td>
                    <td>${fmt(currentVal)}</td>
                    <td class="${assets[item.name].cost < currentVal ? 'text-up' : 'text-down'}">${(((currentVal - assets[item.name].cost)/assets[item.name].cost)*100 || 0).toFixed(2)}%</td>
                    <td class="font-bold">${ratio.toFixed(1)}%</td>
                    <td>${guideText}</td>
                </tr>
            `;
        });

        document.getElementById('total-krw').innerText = fmtKrw(totalUsd * usdToKrw);
        updateChart(schdVal, qldVal);
    }

    // 3. 최근 거래 내역 및 수정/삭제
    async function loadTradeHistory() {
        const { data } = await db.from('long_term_trade').select('*').order('created_at', { ascending: false }).limit(5);
        const tbody = document.getElementById('trade-history-body');
        tbody.innerHTML = '';
        data?.forEach(t => {
            tbody.innerHTML += `
                <tr class="text-xs border-b border-slate-700">
                    <td>${t.created_at.split('T')[0]}</td>
                    <td>${t.ticker}</td>
                    <td class="${t.trade_type === '매수' ? 'text-up' : 'text-down'}">${t.trade_type}</td>
                    <td>${t.quantity}</td>
                    <td>$${t.price}</td>
                    <td>
                        <button onclick="editTrade('${t.id}', '${t.ticker}', '${t.trade_type}', ${t.quantity}, ${t.price})" class="bg-blue-900 text-blue-200 btn-sm mr-1">수정</button>
                        <button onclick="deleteTrade('${t.id}')" class="bg-red-900 text-red-200 btn-sm">삭제</button>
                    </td>
                </tr>
            `;
        });
    }

    async function saveData() {
        const id = document.getElementById('edit-id').value;
        const payload = {
            ticker: document.getElementById('ticker').value,
            trade_type: document.getElementById('tradeType').value,
            quantity: parseInt(document.getElementById('quantity').value),
            price: parseFloat(document.getElementById('price').value),
            total_amount: parseInt(document.getElementById('quantity').value) * parseFloat(document.getElementById('price').value)
        };

        let result;
        if(id) result = await db.from('long_term_trade').update(payload).eq('id', id);
        else result = await db.from('long_term_trade').insert([payload]);

        if(result.error) alert("실패: " + result.error.message);
        else { alert("처리 완료!"); location.reload(); }
    }

    async function deleteTrade(id) {
        if(!confirm("정말 삭제하시겠습니까?")) return;
        await db.from('long_term_trade').delete().eq('id', id);
        location.reload();
    }

    function editTrade(id, ticker, type, qty, price) {
        document.getElementById('edit-id').value = id;
        document.getElementById('ticker').value = ticker;
        document.getElementById('tradeType').value = type;
        document.getElementById('quantity').value = qty;
        document.getElementById('price').value = price;
        document.getElementById('save-btn').innerText = "수정하기";
        document.getElementById('save-btn').classList.replace('bg-blue-600', 'bg-yellow-600');
        document.getElementById('cancel-btn').classList.remove('hidden');
    }

    function resetForm() { location.reload(); }

    function updateChart(s, q) {
        const ctx = document.getElementById('weightChart').getContext('2d');
        if(weightChartInstance) weightChartInstance.destroy();
        weightChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['SCHD', 'QLD'], datasets: [{ data: [s, q], backgroundColor: ['#eab308', '#3b82f6'], borderColor: '#1e293b' }] },
            options: { plugins: { legend: { position: 'bottom', labels: { color: '#cbd5e1' } } } }
        });
    }

    window.onload = initData;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장투리밸런싱 시스템 vPB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* PB 프리미엄 컬러 팔레트 정의 */
        :root {
            --pb-bg-main: #0b1120;       /* 깊은 다크 네이비 */
            --pb-bg-card: #111827;       /* 리치 블랙 카드 */
            --pb-border: #1f2937;        /* 차분한 보더 */
            --pb-text-main: #f8fafc;     /* 아이보리 화이트 */
            --pb-text-muted: #94a3b8;    /* 뮤트된 그레이 */
            --pb-point-gold: #cda05e;    /* PB 골드 포인트 */
            --pb-up: #f43f5e;           /* 차분한 로즈 레드 */
            --pb-down: #38bdf8;         /* 차분한 스카이 블루 */
            --pb-ticker-schd: #facc15;  /* SCHD 옐로우 */
            --pb-ticker-qld: #60a5fa;   /* QLD 블루 */
        }

        body { 
            background-color: var(--pb-bg-main); 
            color: var(--pb-text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            letter-spacing: -0.025em; /* 금융 앱 특유의 조밀한 자간 */
        }
        
        .card { 
            background-color: var(--pb-bg-card); 
            border: 1px solid var(--pb-border); 
            border-radius: 1.25rem; /* 더 둥글고 고급스러운 라운딩 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2); /* 은은한 그림자 */
        }
        
        .input-field { 
            background-color: var(--pb-bg-main); 
            border: 1px solid var(--pb-border); 
            color: var(--pb-text-main); 
            width: 100%; 
            padding: 0.85rem; 
            border-radius: 0.75rem; 
            outline: none; 
            transition: all 0.2s; 
        }
        .input-field:focus { 
            border-color: var(--pb-point-gold); 
            box-shadow: 0 0 0 2px rgba(205, 160, 94, 0.2); 
        }
        
        .table-container { overflow-x: auto; }
        
        table { 
            width: 100%; 
            text-align: center; 
            border-collapse: separate; /* 행 간격을 위해 separate 사용 */
            border-spacing: 0; 
            white-space: nowrap; 
        }
        
        /* 폰트 1포인트 키움 유지 & PB 스타일 적용 */
        th, td { 
            padding: 1rem 0.6rem; /* 행 간격을 미세하게 늘려 여백미 확보 */
            border-bottom: 1px solid var(--pb-border); 
            font-size: 1rem; 
        }
        
        th { 
            background-color: var(--pb-bg-card); 
            color: var(--pb-text-muted); 
            font-weight: 600; 
            text-align: center; 
            text-transform: uppercase; /* 헤더 소문자->대문자 변경으로 점잖음 강조 */
            letter-spacing: 0.05em; 
            font-size: 0.85rem; /* 헤더는 약간 작게 */
        }
        
        /* 상승/하락 컬러 PB 스타일로 변경 */
        .text-up { color: var(--pb-up); } 
        .text-down { color: var(--pb-down); }
        
        /* PB 골드 버튼 스타일 */
        .btn-pb { 
            background-color: var(--pb-point-gold); 
            color: #111827; 
            font-weight: 700; 
            transition: all 0.2s; 
        }
        .btn-pb:hover { 
            background-color: #b58d52; 
            transform: translateY(-1px); 
        }
        
        /* 수정/삭제 버튼 초소형화 유지 & PB 스타일 */
        .btn-sm-pb { 
            padding: 4px 10px; 
            font-size: 11px; 
            border-radius: 6px; 
            font-weight: 600; 
            transition: opacity 0.2s; 
        }
        .btn-sm-pb:hover { opacity: 0.8; }
        
        /* 스크롤바 커스텀 (세련되게) */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--pb-bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--pb-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--pb-text-muted); }
    </style>
</head>
<body class="p-4 md:p-10"> /* 패딩 살짝 늘림 */
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 pb-6 border-b border-gray-800">
            <div class="flex items-center space-x-5 mb-4 md:mb-0">
                <h1 class="text-3xl font-extrabold tracking-tighter text-white">📊 장투리밸런싱 시스템</h1>
                <span id="fx-rate" class="text-sm font-bold text-gray-400 bg-gray-900 px-4 py-1.5 rounded-full border border-gray-800">💵 환율 로딩중...</span>
            </div>
            <nav class="flex space-x-6 text-sm font-semibold text-gray-400">
                <a href="https://trillionly.github.io/great/index.html" class="hover:text-pb-point-gold transition-colors">그리드매매 시스템</a>
                <a href="https://trillionly.github.io/great/trade.html" class="hover:text-pb-point-gold transition-colors">떨사오팔 센터</a>
            </nav>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 mb-8"> /* 간격 살짝 늘림 */
            <div class="lg:col-span-3 card p-8 shadow-2xl table-container flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-bold mb-6 flex items-center justify-between text-white">
                        <div class="flex items-center">
                            <span class="w-2.5 h-2.5 rounded-full bg-pb-point-gold mr-3 inline-block"></span> 자산 현황
                            <span id="price-status" class="text-xs text-gray-500 ml-4 mt-1 font-medium">대기중...</span>
                        </div>
                        <div class="text-sm font-semibold text-gray-300 bg-gray-900 px-4 py-2 rounded-xl border border-gray-800">
                            총자산(₩): <span id="total-krw" class="text-green-400 font-bold ml-1.5 text-base">₩0</span>
                        </div>
                    </h2>
                    <table>
                        <thead>
                            <tr>
                                <th>종목</th><th>현재가</th><th>수량</th><th>평단가</th><th>매입 금액</th><th>평가 금액</th><th>평가 손익</th><th>수익률</th><th>비중</th>
                                <th class="leading-tight">적정수량<br><span class="text-xs font-normal text-gray-600">(4:6)</span></th>
                                <th class="leading-tight">리밸런싱<br><span class="text-xs font-normal text-gray-600">가이드</span></th>
                            </tr>
                        </thead>
                        <tbody id="asset-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="lg:col-span-1 card p-8 shadow-2xl">
                <h2 id="form-title" class="text-xl font-bold mb-6 flex items-center text-white">
                    <span class="w-2.5 h-2.5 rounded-full bg-down mr-3 inline-block"></span> 거래 기록
                </h2>
                <div class="space-y-5">
                    <input type="hidden" id="edit-id">
                    <select id="ticker" class="input-field text-sm font-semibold"><option value="QLD">QLD</option><option value="SCHD">SCHD</option></select>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="tradeType" class="input-field text-sm font-semibold"><option value="매수">매수</option><option value="매도">매도</option></select>
                        <input type="number" id="quantity" class="input-field text-sm" placeholder="수량">
                    </div>
                    <input type="number" id="price" step="0.01" class="input-field text-sm" placeholder="단가 ($)">
                    <button onclick="saveData()" id="save-btn" class="w-full btn-pb font-bold py-3.5 rounded-xl shadow-lg transition-all text-base">기록 저장</button>
                    <button onclick="resetForm()" id="cancel-btn" class="w-full bg-gray-700 hidden text-white font-semibold py-2.5 rounded-xl text-sm mt-3">수정 취소</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="card p-8 shadow-2xl table-container">
                <h2 class="text-xl font-bold mb-6 flex items-center text-white">
                    <span class="w-2.5 h-2.5 rounded-full bg-up mr-3 inline-block"></span> 매매 기록
                </h2>
                <table class="w-full text-center text-sm">
                    <thead>
                        <tr>
                            <th class="text-center">날짜</th><th class="text-center">종목</th><th class="text-center">구분</th><th class="text-center">수량</th><th class="text-center">단가</th>
                            <th class="text-center">수익금</th><th class="text-center">수익률</th>
                            <th class="text-center w-1 whitespace-nowrap px-1">관리</th>
                        </tr>
                    </thead>
                    <tbody id="trade-history-body"></tbody>
                </table>
            </div>
            <div class="card p-8 shadow-2xl flex flex-col items-center">
                <h2 class="text-xl font-bold mb-6 text-center text-white w-full text-left">포트폴리오 비중</h2>
                <div class="h-64 w-full flex justify-center"><canvas id="weightChart"></canvas></div>
            </div>
        </div>

        <div class="card p-8 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 flex items-center text-white">
                <span class="w-2.5 h-2.5 rounded-full bg-green-500 mr-3 inline-block"></span> 자산 성장 추이
            </h2>
            <div class="relative h-96 w-full"><canvas id="growthChart"></canvas></div>
        </div>
    </div>

    <script>
    const SUPABASE_URL = 'https://qutualbddxsyrhwzaosf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dHVhbGJkZHhzeXJod3phb3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODA1MTEsImV4cCI6MjA4NzE1NjUxMX0.iDcwZg9bGFnbl0DJfU0ks4DZtdVJ24Rh_e2ooDP-dts';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const FINNHUB_API_KEY = 'd6om8dpr01qi5kh3g1cgd6om8dpr01qi5kh3g1d0'; 

    let weightChartInstance = null;
    let growthChartInstance = null;
    let usdToKrw = 1350; 

    const fmt = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
    const fmtKrw = (n) => new Intl.NumberFormat('ko-KR').format(Math.round(n));
    const formatShortDate = (dateStr) => {
        const match = dateStr.match(/(\d{4})[^\d]+(\d{1,2})[^\d]+(\d{1,2})/);
        if(match) return `${match[1].slice(-2)}/${match[2]}/${match[3]}`;
        return dateStr;
    };

    async function init() {
        try {
            const fxRes = await fetch('https://open.er-api.com/v6/latest/USD').then(r => r.json());
            usdToKrw = fxRes.rates.KRW;
            document.getElementById('fx-rate').innerText = `💵 ₩${usdToKrw.toFixed(2)}`;
        } catch(e) {}
        await runAutomation();
        await loadTradeHistory();
    }

    async function runAutomation() {
        const { data: trades } = await db.from('long_term_trade').select('*');
        let assets = { SCHD: { qty:0, cost:0 }, QLD: { qty:0, cost:0 } };
        
        trades?.forEach(t => {
            let target = assets[t.ticker];
            if(t.trade_type === '매수') { 
                target.qty += t.quantity; target.cost += t.total_amount; 
            } else { 
                let avg = target.qty > 0 ? target.cost / target.qty : 0;
                target.qty -= t.quantity; target.cost -= avg * t.quantity; 
            }
        });

        let prices = { SCHD: 30.9, QLD: 67.91 };
        try {
            const [s, q] = await Promise.all([
                fetch(`https://finnhub.io/api/v1/quote?symbol=SCHD&token=${FINNHUB_API_KEY}`).then(r=>r.json()),
                fetch(`https://finnhub.io/api/v1/quote?symbol=QLD&token=${FINNHUB_API_KEY}`).then(r=>r.json())
            ]);
            if(s.c) prices.SCHD = s.c; if(q.c) prices.QLD = q.c;
            document.getElementById('price-status').innerText = '🟢 실시간 연동됨';
        } catch(e) { document.getElementById('price-status').innerText = '🟠 백업가 사용'; }

        const schdVal = assets.SCHD.qty * prices.SCHD;
        const qldVal = assets.QLD.qty * prices.QLD;
        const totalUsd = schdVal + qldVal;
        const totalInvested = assets.SCHD.cost + assets.QLD.cost;
        const totalPl = totalUsd - totalInvested;
        const totalRt = totalInvested > 0 ? (totalPl / totalInvested) * 100 : 0; 

        const tbody = document.getElementById('asset-table-body');
        tbody.innerHTML = '';
        
        [
            { id: 'SCHD', color: 'text-ticker-schd', target: 0.4 },
            { id: 'QLD', color: 'text-ticker-qld', target: 0.6 }
        ].forEach(item => {
            const val = item.id === 'SCHD' ? schdVal : qldVal;
            const data = assets[item.id];
            const price = prices[item.id];
            
            const pl = val - data.cost;
            const profitRate = data.cost > 0 ? (pl / data.cost) * 100 : 0;
            const ratio = totalUsd > 0 ? (val / totalUsd) * 100 : 0;
            const avg = data.qty > 0 ? data.cost / data.qty : 0;

            const targetVal = totalUsd * item.target;
            const diffQty = Math.round((targetVal - val) / price);
            
            const guide = diffQty > 0 ? `<span class="text-up font-bold">+${diffQty}주</span>` : 
                          (diffQty < 0 ? `<span class="text-down font-bold">${diffQty}주</span>` : '<span class="text-gray-600">-</span>');

            tbody.innerHTML += `
                <tr class="hover:bg-gray-800/40 border-b border-gray-800 transition-colors">
                    <td class="font-bold text-left ${item.color}">${item.id}</td>
                    <td class="font-medium text-white">${fmt(price)}</td>
                    <td class="font-medium">${data.qty.toLocaleString()}</td>
                    <td class="text-gray-400">${fmt(avg)}</td>
                    <td class="font-medium">${fmt(data.cost)}</td>
                    <td class="font-bold text-white">${fmt(val)}</td>
                    <td class="${pl >= 0 ? 'text-up' : 'text-down'} font-bold">${pl >= 0 ? '+' : ''}${fmt(pl)}</td>
                    <td class="${profitRate >= 0 ? 'text-up' : 'text-down'} font-bold">${profitRate >= 0 ? '+' : ''}${profitRate.toFixed(2)}%</td>
                    <td class="font-extrabold text-white text-lg">${ratio.toFixed(1)}%</td>
                    <td class="text-gray-400 font-medium">${diffQty === 0 ? '-' : Math.round(targetVal/price).toLocaleString()}</td>
                    <td class="bg-gray-900/40 font-semibold">${guide}</td>
                </tr>
            `;
        });

        // 총계 줄 PB 스타일 적용
        tbody.innerHTML += `
            <tr class="bg-gray-900 font-bold border-t-2 border-gray-700">
                <td class="text-left text-white font-extrabold">총계</td>
                <td>-</td>
                <td>-</td>
                <td>-</td>
                <td class="text-gray-300 font-medium">${fmt(totalInvested)}</td>
                <td class="text-green-400 font-extrabold text-lg">${fmt(totalUsd)}</td>
                <td class="${totalPl >= 0 ? 'text-up' : 'text-down'} font-extrabold text-lg">${totalPl >= 0 ? '+' : ''}${fmt(totalPl)}</td>
                <td class="${totalRt >= 0 ? 'text-up' : 'text-down'} font-extrabold text-lg">${totalRt >= 0 ? '+' : ''}${totalRt.toFixed(2)}%</td>
                <td class="font-extrabold text-white text-lg">100.0%</td>
                <td class="text-gray-400">-</td>
                <td class="bg-gray-900/40">-</td>
            </tr>
        `;

        document.getElementById('total-krw').innerText = '₩' + fmtKrw(totalUsd * usdToKrw);

        const schdRatio = totalUsd > 0 ? (schdVal / totalUsd) * 100 : 0;
        const qldRatio = totalUsd > 0 ? (qldVal / totalUsd) * 100 : 0;
        
        const ctxWeight = document.getElementById('weightChart').getContext('2d');
        if(weightChartInstance) weightChartInstance.destroy();
        // 💡 비중 도넛 차트 리디자인 (테두리 제거, 색상 명확화)
        weightChartInstance = new Chart(ctxWeight, {
            type: 'doughnut',
            data: {
                labels: [`SCHD (${schdRatio.toFixed(1)}%)`, `QLD (${qldRatio.toFixed(1)}%)`],
                datasets: [{ data: [schdRatio, qldRatio], backgroundColor: ['#facc15', '#60a5fa'], borderColor: '#111827', borderWidth: 0 }]
            },
            options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { color: '#cbd5e1', font: { weight: '600', size: 13 } } } } }
        });

        await drawGrowthChart(totalUsd, totalInvested);
    }

    async function drawGrowthChart(currentTotal, currentPrincipal) {
        const { data } = await db.from('daily_snapshot').select('*');
        let chartData = data || [];
        
        const d = new Date();
        const todayStr = `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}`;
        
        if(currentTotal > 0 && !chartData.find(r => r.record_date === todayStr)) {
            await db.from('daily_snapshot').insert([{ record_date: todayStr, total_asset: currentTotal, principal: currentPrincipal }]);
            chartData.push({ record_date: todayStr, total_asset: currentTotal, principal: currentPrincipal });
        }

        chartData.sort((a, b) => new Date(a.record_date.replace(/\.\s/g, '-')) - new Date(b.record_date.replace(/\.\s/g, '-')));
        
        const labels = chartData.map(row => formatShortDate(row.record_date));
        const totalAssets = chartData.map(row => row.total_asset);
        const principals = chartData.map(row => row.principal);

        if(growthChartInstance) growthChartInstance.destroy();
        // 💡 자산 성장 차트 가독성 극대화 (선 굵기, 포인트 크기, 그라데이션)
        const ctxGrowth = document.getElementById('growthChart').getContext('2d');
        const gradientTotal = ctxGrowth.createLinearGradient(0, 0, 0, 400);
        gradientTotal.addColorStop(0, 'rgba(56, 189, 248, 0.25)');
        gradientTotal.addColorStop(1, 'rgba(56, 189, 248, 0)');

        growthChartInstance = new Chart(ctxGrowth, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '총 자산', data: totalAssets, borderColor: '#38bdf8', backgroundColor: gradientTotal, borderWidth: 3.5, fill: true, tension: 0.35, pointRadius: 4.5, pointBackgroundColor: '#38bdf8', pointBorderColor: '#0b1120', pointBorderWidth: 2, pointHoverRadius: 7, pointHoverBorderWidth: 3 },
                    { label: '투자 원금', data: principals, borderColor: '#94a3b8', borderDash: [7, 7], borderWidth: 2, fill: false, tension: 0, pointRadius: 0 }
                ]
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                interaction: { mode: 'index', intersect: false },
                plugins: { 
                    legend: { labels: { color: '#cbd5e1', font: { weight: '600', size: 13 } } },
                    tooltip: { 
                        backgroundColor: '#1f2937', titleColor: '#f8fafc', titleFont: {weight: '700'}, bodyColor: '#f8fafc', bodyFont: {weight: '600'}, borderColor: '#374151', borderWidth: 1, padding: 14, cornerRadius: 10,
                        callbacks: { label: (ctx) => `${ctx.dataset.label}: $${(ctx.raw/1000).toFixed(1)}K` } 
                    }
                }, 
                scales: { 
                    x: { ticks: { color: '#94a3b8', maxTicksLimit: 12, font: { weight: '500', size: 12 } }, grid: { display: false } }, 
                    y: { ticks: { color: '#94a3b8', font: { weight: '500', size: 12 }, callback: (val) => '$' + (val/1000).toFixed(0) + 'K' }, grid: { color: '#1f2937' } } 
                } 
            }
        });
    }

    // 매도 시 수익 계산 및 버튼 PB 스타일 적용
    async function loadTradeHistory() {
        const { data } = await db.from('long_term_trade').select('*').order('created_at', { ascending: true });
        
        let avgCost = { SCHD: { qty: 0, cost: 0 }, QLD: { qty: 0, cost: 0 } };
        let profitInfo = {}; 

        if (data) {
            data.forEach(t => {
                let target = avgCost[t.ticker];
                if (t.trade_type === '매수') {
                    target.qty += t.quantity; target.cost += t.total_amount;
                } else if (t.trade_type === '매도') {
                    let avg = target.qty > 0 ? target.cost / target.qty : 0;
                    let pnl = (t.price - avg) * t.quantity;
                    let pnlRate = avg > 0 ? ((t.price - avg) / avg) * 100 : 0;
                    profitInfo[t.id] = { pnl, pnlRate };
                    target.qty -= t.quantity; target.cost -= avg * t.quantity;
                }
            });
        }

        const tbody = document.getElementById('trade-history-body');
        tbody.innerHTML = '';
        
        const recentData = data ? data.reverse().slice(0, 6) : [];

        recentData.forEach(t => {
            const dateShort = formatShortDate(t.created_at.split('T')[0]);
            const typeColor = t.trade_type === '매수' ? 'text-up font-bold' : 'text-down font-bold';
            
            let pnlText = '<span class="text-gray-600">-</span>';
            let pnlRateText = '<span class="text-gray-600">-</span>';
            
            if (t.trade_type === '매도' && profitInfo[t.id]) {
                pnlText = `<span class="text-down font-bold">$${profitInfo[t.id].pnl.toFixed(2)}</span>`;
                pnlRateText = `<span class="text-down font-bold">${profitInfo[t.id].pnlRate.toFixed(2)}%</span>`;
            }

            tbody.innerHTML += `
                <tr class="hover:bg-gray-800/40 border-b border-gray-800 transition-colors">
                    <td class="text-gray-300 font-medium">${dateShort}</td><td class="font-bold text-white">${t.ticker}</td><td class="${typeColor}">${t.trade_type}</td>
                    <td class="font-medium">${t.quantity.toLocaleString()}</td><td class="font-medium">${fmt(t.price)}</td>
                    <td>${pnlText}</td><td>${pnlRateText}</td>
                    <td class="w-1 whitespace-nowrap px-1">
                        <button onclick="editTrade('${t.id}', '${t.ticker}', '${t.trade_type}', ${t.quantity}, ${t.price})" class="bg-gray-700 hover:bg-gray-600 text-white btn-sm-pb mr-1">수정</button>
                        <button onclick="deleteTrade('${t.id}')" class="bg-pb-up hover:opacity-80 text-white btn-sm-pb">삭제</button>
                    </td>
                </tr>
            `;
        });
    }

    async function saveData() {
        const id = document.getElementById('edit-id').value;
        const payload = {
            ticker: document.getElementById('ticker').value,
            trade_type: document.getElementById('tradeType').value,
            quantity: parseInt(document.getElementById('quantity').value),
            price: parseFloat(document.getElementById('price').value),
            total_amount: parseInt(document.getElementById('quantity').value) * parseFloat(document.getElementById('price').value)
        };
        if(!payload.quantity || !payload.price) return alert("수량과 단가를 입력하세요.");
        
        let res = id ? await db.from('long_term_trade').update(payload).eq('id', id) : await db.from('long_term_trade').insert([payload]);
        if(res.error) alert("에러: " + res.error.message); else location.reload();
    }

    async function deleteTrade(id) {
        if(confirm("정말 삭제하시겠습니까?")) { await db.from('long_term_trade').delete().eq('id', id); location.reload(); }
    }

    function editTrade(id, ticker, type, qty, price) {
        document.getElementById('edit-id').value = id;
        document.getElementById('ticker').value = ticker;
        document.getElementById('tradeType').value = type;
        document.getElementById('quantity').value = qty;
        document.getElementById('price').value = price;
        document.getElementById('save-btn').innerText = "내용 수정하기";
        document.getElementById('save-btn').classList.remove('btn-pb');
        document.getElementById('save-btn').classList.add('bg-gray-600', 'hover:bg-gray-500');
        document.getElementById('cancel-btn').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() { location.reload(); }
    
    window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장투리밸런싱 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
        .input-field { background-color: #0f172a; border: 1px solid #334155; color: white; width: 100%; padding: 0.75rem; border-radius: 0.5rem; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 pb-5 border-b border-slate-700">
            <h1 class="text-2xl font-bold tracking-tight mb-4 md:mb-0">📊 장투리밸런싱 시스템</h1>
            <nav class="flex space-x-5 text-sm font-medium text-slate-400">
                <a href="https://trillionly.github.io/great/index.html" class="hover:text-white transition-colors">그리드매매 시스템</a>
                <a href="https://trillionly.github.io/great/trade.html" class="hover:text-white transition-colors">떨사오팔 시스템</a>
            </nav>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="col-span-1">
                <div class="card p-6 shadow-lg">
                    <h2 class="text-lg font-semibold mb-5 flex items-center">
                        <span class="w-2 h-2 rounded-full bg-blue-500 mr-2"></span> 데이터 즉시 입력
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1 font-medium">종목 선택</label>
                            <select id="ticker" class="input-field">
                                <option value="QLD">QLD (나스닥 2배 레버리지)</option>
                                <option value="SCHD">SCHD (배당성장 ETF)</option>
                            </select>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1 font-medium">구분</label>
                                <select id="tradeType" class="input-field">
                                    <option value="매수">매수 (Buy)</option>
                                    <option value="매도">매도 (Sell)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1 font-medium">수량 (주)</label>
                                <input type="number" id="quantity" class="input-field" placeholder="0">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs text-slate-400 mb-1 font-medium">체결 단가 ($)</label>
                            <input type="number" id="price" step="0.01" class="input-field" placeholder="0.00">
                        </div>

                        <button onclick="saveData()" class="w-full mt-2 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-md transition-colors">
                            기록 저장 및 업데이트
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-span-1 md:col-span-2">
                <div class="card p-6 shadow-lg h-full flex items-center justify-center text-slate-500">
                    <p>데이터베이스 연결이 완료되면 여기에 자산 지표가 표시됩니다.</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ⚠️ 소장님의 실제 Supabase URL과 Key를 여기에 넣어야 합니다.
        const SUPABASE_URL = '여기에_URL_입력';
        const SUPABASE_KEY = '여기에_KEY_입력';
        
        // 데이터베이스 연결이 안 되어 있으므로 버튼 클릭 시 알림만 띄웁니다.
        function saveData() {
            alert('데이터베이스 연결 전입니다! URL과 Key를 먼저 세팅해야 합니다.');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장투리밸런싱 시스템 v3.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
        .input-field { background-color: #0f172a; border: 1px solid #334155; color: white; width: 100%; padding: 0.75rem; border-radius: 0.5rem; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #3b82f6; }
        .table-container { overflow-x: auto; }
        table { width: 100%; text-align: center; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 0.75rem 0.5rem; border-bottom: 1px solid #334155; font-size: 1rem; }
        th { background-color: #0f172a; color: #94a3b8; font-weight: 600; text-align: center; }
        .text-up { color: #ef4444; } 
        .text-down { color: #3b82f6; }
        .btn-sm { padding: 4px 8px; font-size: 12px; border-radius: 4px; transition: opacity 0.2s; }
        .btn-sm:hover { opacity: 0.8; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 pb-4 border-b border-slate-700">
            <div class="flex items-center space-x-4 mb-4 md:mb-0">
                <h1 class="text-2xl font-bold tracking-tight">📊 장투리밸런싱 시스템</h1>
                <span id="fx-rate" class="text-xs font-bold text-slate-400 bg-slate-800 px-3 py-1 rounded-full">💵 환율 로딩중...</span>
            </div>
            <nav class="flex space-x-5 text-sm font-medium text-slate-400">
                <a href="https://trillionly.github.io/great/index.html" class="hover:text-white transition-colors">그리드매매 시스템</a>
                <a href="https://trillionly.github.io/great/trade.html" class="hover:text-white transition-colors">떨사오팔 센터</a>
            </nav>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-6">
            <div class="lg:col-span-3 card p-6 shadow-lg table-container flex flex-col justify-between">
                <div>
                    <h2 class="text-lg font-semibold mb-4 flex items-center justify-between">
                        <div class="flex items-center">
                            <span class="w-2 h-2 rounded-full bg-indigo-500 mr-2 inline-block"></span> 자산 현황
                            <span id="price-status" class="text-xs text-slate-500 ml-3 mt-1">대기중...</span>
                        </div>
                        <div class="text-sm font-medium text-slate-300 bg-slate-800 px-3 py-1 rounded-lg">
                            총자산(₩): <span id="total-krw" class="text-green-400 font-bold ml-1">₩0</span>
                        </div>
                    </h2>
                    <table>
                        <thead>
                            <tr>
                                <th>종목</th><th>현재가</th><th>수량</th><th>평단가</th><th>매입 금액</th><th>평가 금액</th><th>평가 손익</th><th>수익률</th><th>비중</th>
                                <th>전일비</th><th>전월비</th><th>전년비</th>
                                <th class="leading-tight">적정수량<br><span class="text-xs font-normal text-slate-500">(4:6)</span></th>
                                <th class="leading-tight">리밸런싱<br><span class="text-xs font-normal text-slate-500">가이드</span></th>
                            </tr>
                        </thead>
                        <tbody id="asset-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="lg:col-span-1 card p-6 shadow-lg">
                <h2 id="form-title" class="text-lg font-semibold mb-5 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-blue-500 mr-2 inline-block"></span> 거래 기록
                </h2>
                <div class="space-y-4">
                    <input type="hidden" id="edit-id">
                    <select id="ticker" class="input-field text-sm"><option value="QLD">QLD</option><option value="SCHD">SCHD</option></select>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="tradeType" class="input-field text-sm"><option value="매수">매수</option><option value="매도">매도</option></select>
                        <input type="number" id="quantity" class="input-field text-sm" placeholder="수량">
                    </div>
                    <input type="number" id="price" step="0.01" class="input-field text-sm" placeholder="단가 ($)">
                    <button onclick="saveData()" id="save-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-md transition-all">기록 저장</button>
                    <button onclick="resetForm()" id="cancel-btn" class="w-full bg-slate-600 hidden text-white font-bold py-2 rounded-lg">수정 취소</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="card p-6 shadow-lg">
                <h2 class="text-lg font-semibold mb-4 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-red-500 mr-2 inline-block"></span> 매매 기록 (수정/삭제)
                </h2>
                <div class="overflow-y-auto max-h-52 pr-2">
                    <table class="w-full text-center text-sm relative">
                        <thead class="sticky top-0 z-10">
                            <tr>
                                <th class="text-center py-2">날짜</th><th class="text-center py-2">종목</th><th class="text-center py-2">구분</th>
                                <th class="text-center py-2">수량</th><th class="text-center py-2">단가</th>
                                <th class="text-center w-1 whitespace-nowrap px-1 py-2">관리</th>
                            </tr>
                        </thead>
                        <tbody id="trade-history-body"></tbody>
                    </table>
                </div>
            </div>
            <div class="card p-6 shadow-lg">
                <h2 class="text-lg font-semibold mb-4 text-center">포트폴리오 비중</h2>
                <div class="h-64 w-full flex justify-center"><canvas id="weightChart"></canvas></div>
            </div>
        </div>

        <div class="card p-6 shadow-lg">
            <h2 class="text-lg font-semibold mb-4 flex items-center">
                <span class="w-2 h-2 rounded-full bg-green-500 mr-2 inline-block"></span> 자산 성장 추이
            </h2>
            <div class="relative h-80 w-full"><canvas id="growthChart"></canvas></div>
        </div>
    </div>

    <script>
    const SUPABASE_URL = 'https://qutualbddxsyrhwzaosf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dHVhbGJkZHhzeXJod3phb3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODA1MTEsImV4cCI6MjA4NzE1NjUxMX0.iDcwZg9bGFnbl0DJfU0ks4DZtdVJ24Rh_e2ooDP-dts';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const FINNHUB_API_KEY = 'd6om8dpr01qi5kh3g1cgd6om8dpr01qi5kh3g1d0'; 

    let weightChartInstance = null;
    let growthChartInstance = null;
    let usdToKrw = 1350; 

    const fmt = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
    const fmtKrw = (n) => new Intl.NumberFormat('ko-KR').format(Math.round(n));
    const formatShortDate = (dateStr) => {
        const match = dateStr.match(/(\d{4})[^\d]+(\d{1,2})[^\d]+(\d{1,2})/);
        if(match) return `${match[1].slice(-2)}/${match[2]}/${match[3]}`;
        return dateStr;
    };

    // 🚀 개별 종목 과거 주가 불러오기 함수 (Finnhub Candle API 활용)
    async function fetchPastPrice(symbol, targetTimestamp) {
        try {
            // 오차를 줄이기 위해 타겟 날짜 기준 과거 7일치 데이터를 불러와 가장 최근 종가를 씁니다.
            const from = targetTimestamp - (7 * 86400); 
            const to = targetTimestamp;
            const res = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${symbol}&resolution=D&from=${from}&to=${to}&token=${FINNHUB_API_KEY}`);
            const data = await res.json();
            if (data.s === 'ok' && data.c && data.c.length > 0) {
                return data.c[data.c.length - 1]; // 가장 마지막(타겟과 가까운) 종가 리턴
            }
        } catch(e) { console.error('과거 주가 로드 실패'); }
        return null;
    }

    async function init() {
        try {
            const fxRes = await fetch('https://open.er-api.com/v6/latest/USD').then(r => r.json());
            usdToKrw = fxRes.rates.KRW;
            document.getElementById('fx-rate').innerText = `💵 ₩${usdToKrw.toFixed(2)}`;
        } catch(e) {}
        await runAutomation();
        await loadTradeHistory();
    }

    async function runAutomation() {
        document.getElementById('price-status').innerText = '데이터 집계 중...';
        
        const { data: trades } = await db.from('long_term_trade').select('*');
        let assets = { SCHD: { qty:0, cost:0 }, QLD: { qty:0, cost:0 } };
        
        trades?.forEach(t => {
            let target = assets[t.ticker];
            if(t.trade_type === '매수') { 
                target.qty += t.quantity; target.cost += t.total_amount; 
            } else { 
                let avg = target.qty > 0 ? target.cost / target.qty : 0;
                target.qty -= t.quantity; target.cost -= avg * t.quantity; 
            }
        });

        // 현재 주가 및 전일비
        let prices = { SCHD: 30.9, QLD: 67.91 };
        let dailyChange = { SCHD: 0, QLD: 0 };
        // 과거 주가 변수 세팅
        let pastPrices = { SCHD: { mo: null, yr: null }, QLD: { mo: null, yr: null } };

        const nowSec = Math.floor(Date.now() / 1000);
        const sec1Mo = nowSec - (30 * 86400); // 30일 전
        const sec1Yr = nowSec - (365 * 86400); // 365일 전

        try {
            // 현재가 로드
            const [s, q] = await Promise.all([
                fetch(`https://finnhub.io/api/v1/quote?symbol=SCHD&token=${FINNHUB_API_KEY}`).then(r=>r.json()),
                fetch(`https://finnhub.io/api/v1/quote?symbol=QLD&token=${FINNHUB_API_KEY}`).then(r=>r.json())
            ]);
            if(s.c) { prices.SCHD = s.c; dailyChange.SCHD = s.dp; }
            if(q.c) { prices.QLD = q.c; dailyChange.QLD = q.dp; }

            // 🚀 개별 종목 과거 주가 동시 로드
            const [s1Mo, s1Yr, q1Mo, q1Yr] = await Promise.all([
                fetchPastPrice('SCHD', sec1Mo), fetchPastPrice('SCHD', sec1Yr),
                fetchPastPrice('QLD', sec1Mo), fetchPastPrice('QLD', sec1Yr)
            ]);
            
            pastPrices.SCHD.mo = s1Mo; pastPrices.SCHD.yr = s1Yr;
            pastPrices.QLD.mo = q1Mo; pastPrices.QLD.yr = q1Yr;

            document.getElementById('price-status').innerText = '🟢 전체 연동 완료';
            document.getElementById('price-status').classList.add('text-green-500');
        } catch(e) { document.getElementById('price-status').innerText = '🟠 연동 지연 (백업가 사용)'; }

        const schdVal = assets.SCHD.qty * prices.SCHD;
        const qldVal = assets.QLD.qty * prices.QLD;
        const totalUsd = schdVal + qldVal;
        const totalInvested = assets.SCHD.cost + assets.QLD.cost;
        const totalPl = totalUsd - totalInvested;
        const totalRt = totalInvested > 0 ? (totalPl / totalInvested) * 100 : 0; 
        const totalDailyChange = totalUsd > 0 ? ((schdVal * dailyChange.SCHD + qldVal * dailyChange.QLD) / totalUsd) : 0;

        // 총계 자산용 과거 스냅샷 역추적
        const { data: snapData } = await db.from('daily_snapshot').select('*');
        let chartData = snapData || [];
        const d = new Date();
        const todayStr = `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}`;
        if(totalUsd > 0 && !chartData.find(r => r.record_date === todayStr)) {
            await db.from('daily_snapshot').insert([{ record_date: todayStr, total_asset: totalUsd, principal: totalInvested }]);
            chartData.push({ record_date: todayStr, total_asset: totalUsd, principal: totalInvested });
        }
        chartData.sort((a, b) => new Date(a.record_date.replace(/\.\s/g, '-')) - new Date(b.record_date.replace(/\.\s/g, '-')));
        const oneMonthAgo = new Date(d.getFullYear(), d.getMonth() - 1, d.getDate());
        const oneYearAgo = new Date(d.getFullYear() - 1, d.getMonth(), d.getDate());

        function getPastAsset(targetDate) {
            let closest = null, minDiff = Infinity;
            for (let row of chartData) {
                let rowDate = new Date(row.record_date.replace(/\.\s/g, '-'));
                let diff = Math.abs(targetDate - rowDate);
                if (diff < 15 * 24 * 60 * 60 * 1000 && diff < minDiff) { minDiff = diff; closest = row.total_asset; }
            }
            return closest;
        }

        const asset1Mo = getPastAsset(oneMonthAgo);
        const asset1Yr = getPastAsset(oneYearAgo);
        const momRt = asset1Mo ? ((totalUsd - asset1Mo) / asset1Mo) * 100 : null;
        const yoyRt = asset1Yr ? ((totalUsd - asset1Yr) / asset1Yr) * 100 : null;

        const tbody = document.getElementById('asset-table-body');
        tbody.innerHTML = '';
        
        [
            { id: 'SCHD', color: 'text-yellow-400', target: 0.4 },
            { id: 'QLD', color: 'text-blue-400', target: 0.6 }
        ].forEach(item => {
            const val = item.id === 'SCHD' ? schdVal : qldVal;
            const data = assets[item.id];
            const price = prices[item.id];
            const d_change = dailyChange[item.id] || 0;
            
            // 개별 종목 전월비/전년비 계산
            const p1Mo = pastPrices[item.id].mo;
            const p1Yr = pastPrices[item.id].yr;
            const moRt = p1Mo ? ((price - p1Mo) / p1Mo) * 100 : null;
            const yrRt = p1Yr ? ((price - p1Yr) / p1Yr) * 100 : null;
            
            const pl = val - data.cost;
            const profitRate = data.cost > 0 ? (pl / data.cost) * 100 : 0;
            const ratio = totalUsd > 0 ? (val / totalUsd) * 100 : 0;
            const avg = data.qty > 0 ? data.cost / data.qty : 0;

            const targetVal = totalUsd * item.target;
            const diffQty = Math.round((targetVal - val) / price);
            
            const guide = diffQty > 0 ? `<span class="text-up font-bold">+${diffQty}주</span>` : 
                          (diffQty < 0 ? `<span class="text-down font-bold">${diffQty}주</span>` : '<span class="text-slate-400">-</span>');

            tbody.innerHTML += `
                <tr class="hover:bg-slate-800 border-b border-slate-700">
                    <td class="font-bold text-left ${item.color}">${item.id}</td>
                    <td>${fmt(price)}</td>
                    <td>${data.qty.toLocaleString()}</td>
                    <td class="text-slate-400">${fmt(avg)}</td>
                    <td>${fmt(data.cost)}</td>
                    <td class="font-bold">${fmt(val)}</td>
                    <td class="${pl >= 0 ? 'text-up' : 'text-down'} font-bold">${pl >= 0 ? '+' : ''}${fmt(pl)}</td>
                    <td class="${profitRate >= 0 ? 'text-up' : 'text-down'} font-bold">${profitRate >= 0 ? '+' : ''}${profitRate.toFixed(2)}%</td>
                    <td class="font-bold">${ratio.toFixed(1)}%</td>
                    
                    <td class="${d_change >= 0 ? 'text-up' : 'text-down'} font-bold">${d_change >= 0 ? '+' : ''}${d_change.toFixed(2)}%</td>
                    <td class="${moRt !== null ? (moRt >= 0 ? 'text-up' : 'text-down') : 'text-slate-400'} font-bold">${moRt !== null ? (moRt >= 0 ? '+' : '') + moRt.toFixed(2) + '%' : '-'}</td>
                    <td class="${yrRt !== null ? (yrRt >= 0 ? 'text-up' : 'text-down') : 'text-slate-400'} font-bold">${yrRt !== null ? (yrRt >= 0 ? '+' : '') + yrRt.toFixed(2) + '%' : '-'}</td>

                    <td class="text-slate-400">${diffQty === 0 ? '-' : Math.round(targetVal/price).toLocaleString()}</td>
                    <td class="bg-slate-800/50">${guide}</td>
                </tr>
            `;
        });

        tbody.innerHTML += `
            <tr class="bg-slate-800 font-bold border-t-2 border-slate-600">
                <td class="text-left text-white">총계</td>
                <td>-</td><td>-</td><td>-</td>
                <td class="text-slate-300">${fmt(totalInvested)}</td>
                <td class="text-green-400">${fmt(totalUsd)}</td>
                <td class="${totalPl >= 0 ? 'text-up' : 'text-down'}">${totalPl >= 0 ? '+' : ''}${fmt(totalPl)}</td>
                <td class="${totalRt >= 0 ? 'text-up' : 'text-down'}">${totalRt >= 0 ? '+' : ''}${totalRt.toFixed(2)}%</td>
                <td>100.0%</td>
                
                <td class="${totalDailyChange >= 0 ? 'text-up' : 'text-down'}">${totalDailyChange >= 0 ? '+' : ''}${totalDailyChange.toFixed(2)}%</td>
                <td class="${momRt !== null ? (momRt >= 0 ? 'text-up' : 'text-down') : 'text-slate-400'}">${momRt !== null ? (momRt >= 0 ? '+' : '') + momRt.toFixed(2) + '%' : '데이터없음'}</td>
                <td class="${yoyRt !== null ? (yoyRt >= 0 ? 'text-up' : 'text-down') : 'text-slate-400'}">${yoyRt !== null ? (yoyRt >= 0 ? '+' : '') + yoyRt.toFixed(2) + '%' : '데이터없음'}</td>

                <td class="text-slate-400">-</td>
                <td class="bg-slate-800/50">-</td>
            </tr>
        `;

        document.getElementById('total-krw').innerText = '₩' + fmtKrw(totalUsd * usdToKrw);

        const schdRatio = totalUsd > 0 ? (schdVal / totalUsd) * 100 : 0;
        const qldRatio = totalUsd > 0 ? (qldVal / totalUsd) * 100 : 0;
        
        const ctxWeight = document.getElementById('weightChart').getContext('2d');
        if(weightChartInstance) weightChartInstance.destroy();
        weightChartInstance = new Chart(ctxWeight, {
            type: 'doughnut',
            data: {
                labels: [`SCHD (${schdRatio.toFixed(1)}%)`, `QLD (${qldRatio.toFixed(1)}%)`],
                datasets: [{ data: [schdRatio, qldRatio], backgroundColor: ['#facc15', '#60a5fa'], borderColor: '#1e293b', borderWidth: 3 }]
            },
            options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: '#cbd5e1' } } } }
        });

        drawGrowthChart(chartData);
    }

    function drawGrowthChart(chartData) {
        const labels = chartData.map(row => formatShortDate(row.record_date));
        const totalAssets = chartData.map(row => row.total_asset);
        const principals = chartData.map(row => row.principal);

        if(growthChartInstance) growthChartInstance.destroy();
        growthChartInstance = new Chart(document.getElementById('growthChart').getContext('2d'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '총 자산', data: totalAssets, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 2, fill: true, tension: 0.1 },
                    { label: '투자 원금', data: principals, borderColor: '#94a3b8', borderDash: [5, 5], borderWidth: 2, fill: false, tension: 0.1 }
                ]
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { 
                    legend: { labels: { color: '#cbd5e1' } },
                    tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: $${(ctx.raw/1000).toFixed(1)}K` } }
                }, 
                scales: { 
                    x: { ticks: { color: '#94a3b8', maxTicksLimit: 12 }, grid: { display: false } }, 
                    y: { ticks: { color: '#94a3b8', callback: (val) => '$' + (val/1000).toFixed(0) + 'K' }, grid: { color: '#334155' } } 
                } 
            }
        });
    }

    async function loadTradeHistory() {
        const { data } = await db.from('long_term_trade').select('*').order('created_at', { ascending: false }).limit(30);
        const tbody = document.getElementById('trade-history-body');
        tbody.innerHTML = '';
        if (data) {
            data.forEach(t => {
                const dateShort = formatShortDate(t.created_at.split('T')[0]);
                const typeColor = t.trade_type === '매수' ? 'text-up font-bold' : 'text-down font-bold';
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800 border-b border-slate-700">
                        <td class="py-2">${dateShort}</td><td class="font-bold py-2">${t.ticker}</td><td class="${typeColor} py-2">${t.trade_type}</td>
                        <td class="py-2">${t.quantity.toLocaleString()}</td><td class="py-2">$${t.price}</td>
                        <td class="w-1 whitespace-nowrap px-1 py-2">
                            <button onclick="editTrade('${t.id}', '${t.ticker}', '${t.trade_type}', ${t.quantity}, ${t.price})" class="bg-blue-600 hover:bg-blue-500 text-white px-2 py-0.5 rounded text-[10px] mr-1">수정</button>
                            <button onclick="deleteTrade('${t.id}')" class="bg-red-600 hover:bg-red-500 text-white px-2 py-0.5 rounded text-[10px]">삭제</button>
                        </td>
                    </tr>
                `;
            });
        }
    }

    async function saveData() {
        const id = document.getElementById('edit-id').value;
        const payload = {
            ticker: document.getElementById('ticker').value,
            trade_type: document.getElementById('tradeType').value,
            quantity: parseInt(document.getElementById('quantity').value),
            price: parseFloat(document.getElementById('price').value),
            total_amount: parseInt(document.getElementById('quantity').value) * parseFloat(document.getElementById('price').value)
        };
        if(!payload.quantity || !payload.price) return alert("수량과 단가를 입력하세요.");
        
        let res = id ? await db.from('long_term_trade').update(payload).eq('id', id) : await db.from('long_term_trade').insert([payload]);
        if(res.error) alert("에러: " + res.error.message); else location.reload();
    }

    async function deleteTrade(id) {
        if(confirm("정말 삭제하시겠습니까?")) { await db.from('long_term_trade').delete().eq('id', id); location.reload(); }
    }

    function editTrade(id, ticker, type, qty, price) {
        document.getElementById('edit-id').value = id;
        document.getElementById('ticker').value = ticker;
        document.getElementById('tradeType').value = type;
        document.getElementById('quantity').value = qty;
        document.getElementById('price').value = price;
        document.getElementById('save-btn').innerText = "내용 수정하기";
        document.getElementById('save-btn').classList.replace('bg-blue-600', 'bg-yellow-600');
        document.getElementById('cancel-btn').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() { location.reload(); }
    
    window.onload = init;
    </script>
</body>
</html>

<script>
    // --- 1. Supabase 연동 및 열쇠 세팅 ---
    const SUPABASE_URL = 'https://qutualbddxsyrhwzaosf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dHVhbGJkZHhzeXJod3phb3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODA1MTEsImV4cCI6MjA4NzE1NjUxMX0.iDcwZg9bGFnbl0DJfU0ks4DZtdVJ24Rh_e2ooDP-dts';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- 2. 매수/매도 기록 저장 함수 ---
    async function saveData() {
        const ticker = document.getElementById('ticker').value;
        const tradeType = document.getElementById('tradeType').value;
        const quantity = parseInt(document.getElementById('quantity').value);
        const price = parseFloat(document.getElementById('price').value);

        if(!quantity || !price) return alert('수량과 체결 단가를 입력해 주십시오.');

        const totalAmount = quantity * price;

        const { data, error } = await db
            .from('long_term_trade')
            .insert([{ ticker, trade_type: tradeType, price, quantity, total_amount: totalAmount }]);

        if (error) alert('❌ 저장 실패: ' + error.message);
        else {
            alert('✅ 데이터가 저장되었습니다! 🫡');
            document.getElementById('quantity').value = '';
            document.getElementById('price').value = '';
        }
    }

    // --- 3. [핵심] DB에서 백데이터 불러와서 차트 그리기 ---
    async function drawDashboard() {
        // 스냅샷 테이블에서 데이터 싹 가져오기
        const { data, error } = await db.from('daily_snapshot').select('*');
        
        if (error) {
            console.error('데이터 로드 실패:', error);
            return;
        }

        // 날짜순으로 예쁘게 정렬
        data.sort((a, b) => new Date(a.record_date) - new Date(b.record_date));

        // 차트에 넣을 항목만 쏙쏙 뽑아내기
        const labels = data.map(row => row.record_date);
        const totalAssets = data.map(row => row.total_asset);
        const principals = data.map(row => row.principal);

        // 자산 성장 라인 차트 렌더링
        const ctxGrowth = document.getElementById('growthChart').getContext('2d');
        new Chart(ctxGrowth, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '총 자산 ($)',
                        data: totalAssets,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.1 // 주가 흐름처럼 팩트 있는 꺾은선 표현
                    },
                    {
                        label: '투자 원금 ($)',
                        data: principals,
                        borderColor: '#94a3b8',
                        borderDash: [5, 5],
                        borderWidth: 2,
                        fill: false,
                        tension: 0.1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#cbd5e1' } } },
                scales: {
                    x: { ticks: { color: '#94a3b8', maxTicksLimit: 10 }, grid: { display: false } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                }
            }
        });

        // 비중 도넛 차트 (일단 기존 고정값 유지)
        const ctxWeight = document.getElementById('weightChart').getContext('2d');
        new Chart(ctxWeight, {
            type: 'doughnut',
            data: {
                labels: ['SCHD (43.4%)', 'QLD (56.6%)'],
                datasets: [{
                    data: [43.4, 56.6],
                    backgroundColor: ['#eab308', '#ef4444'],
                    borderColor: '#1e293b',
                    borderWidth: 2,
                    hoverOffset: 4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { color: '#cbd5e1', padding: 20 } } } }
        });
    }

    // 화면이 켜지면 자동으로 차트 그리기 엔진 가동!
    window.onload = drawDashboard;
    </script>

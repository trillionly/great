<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Investment Logbook</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 18px; background:#f6f8fa; }
    h1 { margin: 0 0 6px; }
    .sub { color:#666; margin: 0 0 12px; }
    .pill { display:inline-block; padding:2px 10px; border-radius:999px; background:#eef2ff; font-size:12px; }
    .err { background:#fee2e2; color:#991b1b; }
    .wrap { overflow:auto; border:1px solid #e5e7eb; border-radius:12px; background:#fff; }
    table { border-collapse: collapse; width: 1200px; min-width: 100%; }
    th, td { border-bottom: 1px solid #eee; padding: 8px 8px; vertical-align: middle; }
    th { background:#fafafa; text-align:left; position: sticky; top: 0; z-index: 1; }
    .right { text-align:right; }
    .center { text-align:center; }
    .muted { color:#666; }
    .neg { color:#b00020; font-weight:600; }
    .pos { color:#0b6b3a; font-weight:600; }
    .head2 { background:#fff7e6; font-weight:700; }
    .tot { background:#f2f7ff; font-weight:700; }
    .small { font-size: 12px; color:#555; }
    select { padding:9px 10px; border:1px solid #ddd; border-radius:10px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin: 10px 0 12px; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:10px 12px; box-shadow:0 1px 2px rgba(0,0,0,.04); }
    .k { font-size:12px; color:#666; }
    .v { font-size:18px; font-weight:700; margin-top:4px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
  </style>
</head>
<body>
  <h1>Investment Logbook</h1>
  <div class="sub">raw(합본) 메시지 → (S횟수/누계/일수익/티어(현재/총)) 자동 계산 → 월별 표</div>

  <div class="row">
    <div class="card">
      <div class="k">상태</div>
      <div class="v"><span id="status" class="pill">로딩 중…</span></div>
    </div>
    <div class="card">
      <div class="k">레코드 수</div>
      <div class="v" id="count">-</div>
    </div>
    <div class="card">
      <div class="k">최근 일자</div>
      <div class="v" id="latest">-</div>
    </div>

    <div style="flex:1"></div>

    <label class="small">월 선택</label>
    <select id="monthSel"></select>

    <label class="small">표시 종목</label>
    <select id="symbolsSel">
      <option value="TQQQ,ETHU,TSLL" selected>3종목(TQQQ/ETHU/TSLL)</option>
      <option value="TQQQ">TQQQ만</option>
      <option value="ETHU">ETHU만</option>
      <option value="TSLL">TSLL만</option>
    </select>
  </div>

  <div class="wrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot"></tfoot>
    </table>
  </div>

  <details style="margin-top:12px">
    <summary class="small">디버그 보기(최근 6개 블록 파싱)</summary>
    <pre class="mono" id="debug" style="white-space:pre-wrap"></pre>
  </details>

<script>
  // ---------- helpers
  const esc = (s) => (s ?? "").toString().replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
  const num = (s) => {
    if (s == null) return null;
    const x = (s+"").replace(/[,원$주\s]/g, "");
    const n = Number(x);
    return Number.isFinite(n) ? n : null;
  };
  const fmtInt = (n) => n == null ? "" : new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(n);
  const clsPN = (n) => (n == null) ? "" : (n < 0 ? "neg" : (n > 0 ? "pos" : ""));
  const sumOrNull = (arr) => {
    const nums = arr.filter(v => typeof v === "number" && Number.isFinite(v));
    if (!nums.length) return null;
    return nums.reduce((a,b)=>a+b,0);
  };

  // ---------- Grid tier parsing
  // 라인 형식: "71) 34.64 29 35.68 0"  => idx) buyPrice buyQty sellPrice sellQty
  function parseGridTier(gridText) {
    if (!gridText) return { tierNow: null, tierMax: null };

    const lines = gridText.split("\n");
    const rows = [];
    const re = /^\s*(\d+)\)\s+([\d.]+)\s+(\d+)\s+([\d.]+)\s+(\d+)\s*$/;

    for (const line of lines) {
      const m = line.match(re);
      if (!m) continue;
      rows.push({
        idx: Number(m[1]),
        buyQty: Number(m[3]),
        sellQty: Number(m[5]),
      });
    }

    if (!rows.length) return { tierNow: null, tierMax: null };

    rows.sort((a,b)=>a.idx-b.idx);
    const tierMax = rows[rows.length - 1].idx;

    // 전환점 기반 현재티어 추정:
    // 앞부분: buyQty=0 / sellQty>0 형태가 많고,
    // 어느 지점부터 buyQty>0 / sellQty=0 형태로 바뀌는 경우가 일반적.
    const pattern = (r) => `${r.buyQty === 0 ? "B0" : "B+"}-${r.sellQty === 0 ? "S0" : "S+"}`;
    let tierNow = rows[0].idx;
    for (let i = 1; i < rows.length; i++) {
      if (pattern(rows[i]) !== pattern(rows[i-1])) {
        tierNow = rows[i].idx; // 바뀐 첫 행
        break;
      }
    }

    return { tierNow, tierMax };
  }

  // ---------- 1) 합본 raw_message를 블록으로 분리 (예: "03/04일 07:21")
  function splitBlocks(raw) {
    const t = (raw || "").replace(/\r/g, "");
    const re = /(^|\n)(\d{2})\/(\d{2})일\s+(\d{2}:\d{2})/g;
    const starts = [];
    let m;
    while ((m = re.exec(t)) !== null) {
      const startAt = m.index + (m[1] ? 1 : 0); // digit 위치
      starts.push(startAt);
    }
    if (!starts.length) return [];
    const blocks = [];
    for (let i=0;i<starts.length;i++) {
      const s = starts[i];
      const e = (i+1 < starts.length) ? starts[i+1] : t.length;
      blocks.push(t.slice(s, e).trim());
    }
    return blocks;
  }

  // ---------- 2) 블록 1개 파싱
  function parseBlock(blockText) {
    const t = blockText || "";

    const dt = t.match(/(\d{2})\/(\d{2})일\s+(\d{2}:\d{2})/);
    const mm = dt ? dt[1] : null;
    const dd = dt ? dt[2] : null;
    const time = dt ? dt[3] : null;
    const mmdd = (mm && dd) ? `${mm}/${dd}` : null;

    // symbol
    let symbol = null;
    const s1 = t.match(/(?:^|\n)([A-Z]{2,6})최대필요\s*:/);
    if (s1) symbol = s1[1];
    if (!symbol) {
      const s2 = t.match(/(?:^|\n)\d+([A-Z]{2,6})평가금액\s*:/);
      if (s2) symbol = s2[1];
    }

    // cum = 주문가능-최대필요
    const cumM = t.match(/주문가능-최대필요\s*:\s*([-\d,]+(?:\.\d+)?)/);
    const cum = cumM ? num(cumM[1]) : null;

    // sell count = S n회
    const sCnt = t.match(/S\s*(\d+)회/);
    const sellCount = sCnt ? num(sCnt[1]) : null;

    // Grid 텍스트 추출: "GridX SYMBOL" 다음 줄부터 "테이블 총재고" 이전까지
    let gridText = "";
    const gridHeader = t.match(/Grid\d+\s+[A-Z]{2,6}\s*\n/i);
    if (gridHeader) {
      const startIdx = t.indexOf(gridHeader[0]) + gridHeader[0].length;
      const endIdx = t.indexOf("테이블 총재고");
      gridText = (endIdx > startIdx) ? t.slice(startIdx, endIdx) : t.slice(startIdx);
    }
    const { tierNow, tierMax } = parseGridTier(gridText);

    return { mmdd, time, symbol, cum, sellCount, tierNow, tierMax, raw: t };
  }

  // ---------- 3) report rows -> parsed blocks
  function rowsToBlocks(reportRows) {
    const out = [];
    for (const r of reportRows) {
      const raw = r.raw_message || "";
      const blocks = splitBlocks(raw);
      for (const b of blocks) out.push(parseBlock(b));
    }
    return out.filter(x => x.mmdd && x.symbol);
  }

  // ---------- 4) 월/일자별 daily table
  function buildDaily(blocks, monthStr, symbols) {
    const byKey = new Map(); // `${mmdd}|${sym}` -> latest rec by time
    for (const r of blocks) {
      if (!r.mmdd || !r.symbol) continue;
      if (!r.mmdd.startsWith(monthStr + "/")) continue;
      if (!symbols.includes(r.symbol)) continue;

      const key = `${r.mmdd}|${r.symbol}`;
      const prev = byKey.get(key);
      if (!prev) byKey.set(key, r);
      else if ((r.time || "") > (prev.time || "")) byKey.set(key, r);
    }

    const dates = [...new Set([...byKey.keys()].map(k => k.split("|")[0]))]
      .sort((a,b) => (Number(a.split("/")[0])*100 + Number(a.split("/")[1])) - (Number(b.split("/")[0])*100 + Number(b.split("/")[1])));

    const table = dates.map(mmdd => {
      const row = { mmdd };
      for (const sym of symbols) {
        const rec = byKey.get(`${mmdd}|${sym}`) || null;
        row[sym] = rec
          ? { sell: rec.sellCount, cum: rec.cum, tierNow: rec.tierNow, tierMax: rec.tierMax }
          : { sell:null, cum:null, tierNow:null, tierMax:null };
      }
      return row;
    });

    // profit = cum delta
    const prevCum = Object.fromEntries(symbols.map(s => [s, null]));
    for (const r of table) {
      for (const sym of symbols) {
        const cum = r[sym].cum;
        if (cum == null) r[sym].profit = null;
        else if (prevCum[sym] == null) r[sym].profit = null; // 첫날은 비움
        else r[sym].profit = cum - prevCum[sym];
        if (cum != null) prevCum[sym] = cum;
      }
    }

    return table;
  }

  function render(daily, symbols) {
    const thead = document.getElementById("thead");
    const tbody = document.getElementById("tbody");
    const tfoot = document.getElementById("tfoot");

    thead.innerHTML = `
      <tr class="head2">
        <th rowspan="2" style="width:70px">날짜</th>
        ${symbols.map(sym => `<th class="center" colspan="3">${sym}<div class="small muted" id="tier_${sym}"></div></th>`).join("")}
        <th rowspan="2" class="center" style="width:90px">총 매도</th>
        <th rowspan="2" class="right" style="width:110px">수익</th>
      </tr>
      <tr>
        ${symbols.map(_ => `
          <th class="center" style="width:70px">매도</th>
          <th class="right" style="width:95px">수익</th>
          <th class="right" style="width:95px">누계</th>
        `).join("")}
      </tr>
    `;

    // 헤더에 "현재/총 티어" 표시
    for (const sym of symbols) {
      let lastNow = null, lastMax = null;
      for (let i = daily.length-1; i>=0; i--) {
        const cell = daily[i][sym];
        if (cell.tierNow != null && cell.tierMax != null) { lastNow = cell.tierNow; lastMax = cell.tierMax; break; }
      }
      const el = document.getElementById(`tier_${sym}`);
      if (el) el.textContent = (lastNow != null) ? `티어: ${lastNow}/${lastMax}` : "";
    }

    tbody.innerHTML = daily.map(r => {
      const totalSell = (sumOrNull(symbols.map(s => r[s].sell)) ?? 0);
      const totalProfit = sumOrNull(symbols.map(s => r[s].profit));
      return `
        <tr>
          <td class="center">${esc(r.mmdd)}</td>
          ${symbols.map(sym => `
            <td class="center">${r[sym].sell ?? ""}</td>
            <td class="right ${clsPN(r[sym].profit)}">${r[sym].profit == null ? "" : "$" + fmtInt(r[sym].profit)}</td>
            <td class="right">${r[sym].cum == null ? "" : "$" + fmtInt(r[sym].cum)}</td>
          `).join("")}
          <td class="center">${fmtInt(totalSell)}</td>
          <td class="right ${clsPN(totalProfit)}">${totalProfit == null ? "" : "$" + fmtInt(totalProfit)}</td>
        </tr>
      `;
    }).join("") || `<tr><td colspan="${1 + symbols.length*3 + 2}" class="muted">데이터 없음</td></tr>`;

    // footer
    const sumSellBySym = Object.fromEntries(symbols.map(s => [s, sumOrNull(daily.map(r => r[s].sell))]));
    const sumProfitBySym = Object.fromEntries(symbols.map(s => [s, sumOrNull(daily.map(r => r[s].profit))]));
    const lastCumBySym = Object.fromEntries(symbols.map(s => {
      let v = null;
      for (let i = daily.length-1; i>=0; i--) { if (daily[i][s].cum != null) { v = daily[i][s].cum; break; } }
      return [s, v];
    }));

    const totalSellAll = (sumOrNull(Object.values(sumSellBySym)) ?? 0);
    const totalProfitAll = sumOrNull(Object.values(sumProfitBySym));
    const dayCount = daily.length || 1;

    tfoot.innerHTML = `
      <tr class="tot">
        <td class="center">합계</td>
        ${symbols.map(sym => `
          <td class="center">${sumSellBySym[sym] ?? ""}</td>
          <td class="right ${clsPN(sumProfitBySym[sym])}">${sumProfitBySym[sym] == null ? "" : "$" + fmtInt(sumProfitBySym[sym])}</td>
          <td class="right">${lastCumBySym[sym] == null ? "" : "$" + fmtInt(lastCumBySym[sym])}</td>
        `).join("")}
        <td class="center">${fmtInt(totalSellAll)}</td>
        <td class="right ${clsPN(totalProfitAll)}">${totalProfitAll == null ? "" : "$" + fmtInt(totalProfitAll)}</td>
      </tr>
      <tr class="tot">
        <td class="center">일평균</td>
        ${symbols.map(_ => `<td></td><td></td><td></td>`).join("")}
        <td class="center">${(totalSellAll / dayCount).toFixed(1)}</td>
        <td class="right">$${((totalProfitAll ?? 0) / dayCount).toFixed(2)}</td>
      </tr>
    `;
  }

  async function main() {
    const status = document.getElementById("status");
    const count = document.getElementById("count");
    const latest = document.getElementById("latest");
    const monthSel = document.getElementById("monthSel");
    const symbolsSel = document.getElementById("symbolsSel");
    const debug = document.getElementById("debug");

    try {
      const res = await fetch("./data/report.json?t=" + Date.now(), { cache: "no-store" });
      const j = await res.json();
      const reportRows = j.rows || [];

      count.textContent = String(reportRows.length);
      latest.textContent = reportRows[0]?.date || "-";

      const blocks = rowsToBlocks(reportRows);
      debug.textContent = JSON.stringify(blocks.slice(0, 6), null, 2);

      const months = [...new Set(blocks.map(b => b.mmdd.split("/")[0]))].sort((a,b)=>Number(a)-Number(b));
      if (!months.length) {
        status.textContent = "파싱 실패";
        status.classList.add("err");
        document.getElementById("tbody").innerHTML =
          `<tr><td colspan="12" class="muted">"03/04일 07:21" 패턴 블록을 찾지 못했어요. 텔레그램에 줄바꿈 포함 그대로 보내야 합니다.</td></tr>`;
        return;
      }

      monthSel.innerHTML = months.map(m => `<option value="${m}">${Number(m)}월</option>`).join("");
      monthSel.value = months[months.length - 1];

      function rerender() {
        const m = monthSel.value;
        const symbols = symbolsSel.value.split(",").map(s => s.trim()).filter(Boolean);
        const daily = buildDaily(blocks, m, symbols);
        render(daily, symbols);
        status.textContent = "정상";
        status.classList.remove("err");
      }

      monthSel.addEventListener("change", rerender);
      symbolsSel.addEventListener("change", rerender);

      rerender();
    } catch (e) {
      status.textContent = "스크립트 에러";
      status.classList.add("err");
      document.getElementById("tbody").innerHTML =
        `<tr><td colspan="12" class="muted">에러: <span class="mono">${esc(String(e))}</span></td></tr>`;
      console.error(e);
    }
  }

  main();
</script>
</body>
</html>

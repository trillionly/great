<script>
  const SEEDS = { TQQQ: 140000, ETHU: 40000, TSLL: 32000 };
  const MAX_TIERS = { TQQQ: 140, ETHU: 100, TSLL: 90 };

  const esc = (s) => (s ?? "").toString().replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const num = (s) => {
    if (s == null) return null;
    const x = (s+"").replace(/[,????s]/g, "");
    const n = Number(x);
    return Number.isFinite(n) ? n : null;
  };
  const fmtInt = (n) => n == null ? "" : new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(n);
  const fmtFloat1 = (n) => n == null ? "" : Number(n).toFixed(1);
  const fmtPct1 = (x) => (x == null || !Number.isFinite(x)) ? "" : (x * 100).toFixed(1) + "%";
  const clsPN = (n) => (n == null) ? "" : (n < 0 ? "neg" : (n > 0 ? "pos" : ""));
  const fmtKrw = (n) => n == null ? "" : new Intl.NumberFormat("ko-KR", { maximumFractionDigits: 0 }).format(n);
  const sumOrNull = (arr) => {
    const nums = arr.filter(v => typeof v === "number" && Number.isFinite(v));
    if (!nums.length) return null;
    return nums.reduce((a,b)=>a+b,0);
  };
  const DEFAULT_KRW_RATE = 1300;
  let usdToKrwRate = null;
  let usdToKrwPrevRate = null;
  let usdToKrwDelta = null;
  let usdToKrwTrend = "same";
  let exchangeRateStatus = "loading";

  function getTodayDateKey() {
    const parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: "Asia/Seoul",
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    }).formatToParts(new Date());
    const map = {};
    parts.forEach(part => {
      if (part.type !== "literal") map[part.type] = part.value;
    });
    return `${map.year}-${map.month}-${map.day}`;
  }

  async function loadUsdKrwExchangeRate() {
    if (exchangeRateStatus === "ready" && Number.isFinite(usdToKrwRate)) return usdToKrwRate;

    const today = getTodayDateKey();
    const cachedDate = localStorage.getItem("exchange_rate_date");
    const cachedRate = Number(localStorage.getItem("exchange_rate"));
    const cachedPrevRate = Number(localStorage.getItem("exchange_rate_prev"));

    const detectExchangeRateTrend = (current, previous) => {
      if (!Number.isFinite(current) || !Number.isFinite(previous)) return "same";
      if (current > previous) return "up";
      if (current < previous) return "down";
      return "same";
    };
    const calculateExchangeRateDelta = (current, previous) => {
      if (!Number.isFinite(current) || !Number.isFinite(previous)) return null;
      return current - previous;
    };

    if (cachedDate === today && Number.isFinite(cachedRate) && cachedRate > 0) {
      usdToKrwRate = cachedRate;
      usdToKrwPrevRate = Number.isFinite(cachedPrevRate) && cachedPrevRate > 0 ? cachedPrevRate : null;
      usdToKrwDelta = calculateExchangeRateDelta(usdToKrwRate, usdToKrwPrevRate);
      usdToKrwTrend = detectExchangeRateTrend(usdToKrwRate, usdToKrwPrevRate);
      exchangeRateStatus = "ready";
      return usdToKrwRate;
    }

    exchangeRateStatus = "loading";
    try {
      const res = await fetch("https://open.er-api.com/v6/latest/USD", { cache: "no-store" });
      if (!res.ok) throw new Error(`exchange rate fetch failed: ${res.status}`);
      const data = await res.json();
      const rate = Number(data?.rates?.KRW);
      if (!Number.isFinite(rate) || rate <= 0) throw new Error("invalid KRW rate");

      const previousRate = Number.isFinite(cachedRate) && cachedRate > 0 ? cachedRate : null;
      if (previousRate != null) {
        localStorage.setItem("exchange_rate_prev", String(previousRate));
      }

      usdToKrwRate = rate;
      usdToKrwPrevRate = previousRate;
      usdToKrwDelta = calculateExchangeRateDelta(usdToKrwRate, usdToKrwPrevRate);
      usdToKrwTrend = detectExchangeRateTrend(usdToKrwRate, usdToKrwPrevRate);
      exchangeRateStatus = "ready";
      localStorage.setItem("exchange_rate", String(rate));
      localStorage.setItem("exchange_rate_date", today);
      return usdToKrwRate;
    } catch (error) {
      console.warn("exchange rate fallback applied:", error);
      const previousRate = Number.isFinite(cachedRate) && cachedRate > 0 ? cachedRate : null;
      if (previousRate != null) {
        localStorage.setItem("exchange_rate_prev", String(previousRate));
      }
      usdToKrwRate = DEFAULT_KRW_RATE;
      usdToKrwPrevRate = previousRate;
      usdToKrwDelta = calculateExchangeRateDelta(usdToKrwRate, usdToKrwPrevRate);
      usdToKrwTrend = detectExchangeRateTrend(usdToKrwRate, usdToKrwPrevRate);
      exchangeRateStatus = "ready";
      localStorage.setItem("exchange_rate", String(DEFAULT_KRW_RATE));
      localStorage.setItem("exchange_rate_date", today);
      return usdToKrwRate;
    } finally {
      if (window.__comboChart) window.__comboChart.update();

    let left = rect.left + (rect.width / 2) - (tooltipRect.width / 2);

  function parseGridTier(fullText) {
    if (!fullText) return { tierNow: null, tierMax: null };
    const rows = [];
    const re = /(?:^|\n)[^\d\n]*(\d+)\)\s*([-\d.,]+)\s+([-\d.,]+)\s+([-\d.,]+)\s+([-\d.,]+)/g;
    let m;
    while ((m = re.exec(fullText)) !== null) {
      rows.push({
        idx: Number(m[1]),
        sellQty: Number(m[5].replace(/,/g, ''))
      });
    }
    if (!rows.length) return { tierNow: null, tierMax: null };
    
    rows.sort((a,b)=>a.idx-b.idx);
    const tierMax = rows[rows.length - 1].idx;
    
    let tierNow = null;
    for (let i = rows.length - 1; i >= 0; i--) {
      if (rows[i].sellQty > 0) {
        tierNow = rows[i].idx;
        break;
      }
    }
    if (tierNow == null) tierNow = rows[0].idx; 
    return { tierNow, tierMax };
  }

        yearHtml += allYears.map(y => `<option value="${y}">${y}??/option>`).join("");
        yearSel.innerHTML = yearHtml;
        if (preferredYear && allYears.includes(preferredYear)) yearSel.value = preferredYear;
        else yearSel.value = allYears.length ? allYears[allYears.length - 1] : "ALL_YEARS";
      }

      function updateMonthDropdown(preferredMonth = null) {
        const y = yearSel.value;
        if (y === "ALL_YEARS") {
            monthSel.innerHTML = `<option value="YEARLY_AGG">???ㅻ쿋筌앷염????釉먯뒠???怨뚮옖??逾?/option>`;
            monthSel.disabled = true;
            return;
        }
        
        monthSel.disabled = false;
        const monthSet = new Set(baseValidBlocks.filter(b => b.year === y).map(b => b.month));
        archiveMonthIndex
          .filter(key => key.startsWith(`${y}-`))
          .forEach(key => monthSet.add(key.slice(5, 7)));
        const months = Array.from(monthSet).sort();

        let optionsHtml = `<option value="ALL">???ㅼ뒩????釉먯뒠??(???ャ뀕?????ㅻ쿋筌???ш끽維??</option>`;
        if (months.length > 1) {
          optionsHtml += `<option value="ALL_PREV">???ㅼ뒩????釉먯뒠??(癲ル슣?????癲ル슢??猿눫???ш낄猷??</option>`;
        }
        optionsHtml += months.map(m => `<option value="${m}">${Number(m)}??/option>`).join("");
        monthSel.innerHTML = optionsHtml;
        if (preferredMonth && Array.from(monthSel.options).some(option => option.value === preferredMonth)) monthSel.value = preferredMonth;
        else if (months.length > 0) monthSel.value = months[months.length - 1];
      }

      async function getSelectionData() {
        const y = yearSel.value;
        const m = monthSel.value;
        if (y === "ALL_YEARS") {
          const archives = await Promise.all(archiveMonthIndex.map(async (monthKey) => {
            const [rows, blocks] = await Promise.all([loadArchiveRows(monthKey), loadArchiveBlocks(monthKey)]);
            return { rows, blocks };
          }));
          return {
            rows: dedupeRows(baseReportRows.concat(archives.flatMap(item => Array.isArray(item.rows) ? item.rows : []))),
            blocks: dedupeBlocks(baseBlocks.concat(archives.flatMap(item => Array.isArray(item.blocks) ? item.blocks : []))),
            stateMessage: ""
          };
        }
        const hasBaseMonth = baseValidBlocks.some(b => b.year === y && b.month === m);
        let archiveKeys = [];
        if (m === "ALL" || m === "ALL_PREV") {
          archiveKeys = archiveMonthIndex.filter(key => key.startsWith(`${y}-`));
        } else {
          const selectedKey = getMonthKey(y, m);
          if (archiveMonthIndex.includes(selectedKey)) archiveKeys = [selectedKey];
        }

        const archives = await Promise.all(archiveKeys.map(async (monthKey) => {
          const [rows, blocks] = await Promise.all([loadArchiveRows(monthKey), loadArchiveBlocks(monthKey)]);
          return { rows, blocks };
        }));
        const archiveRows = archives.flatMap(item => Array.isArray(item.rows) ? item.rows : []);
        const archiveBlocks = archives.flatMap(item => Array.isArray(item.blocks) ? item.blocks : []);

        let stateMessage = "";
        if (/^\d{2}$/.test(m)) {
          if (!hasBaseMonth && !archiveRows.length) stateMessage = "???????釉먯뒭甕??怨뚮옖?? ???Β????? ???⑤８?????덊렡.";
        }

        return {
          rows: dedupeRows(baseReportRows.concat(archiveRows)),
          blocks: dedupeBlocks(baseBlocks.concat(archiveBlocks)),
          stateMessage
        };
      }

      async function rerender(stateOverride = "") {
        const y = yearSel.value;
        const m = monthSel.value;
        const symbols = symbolsSel.value.split(",").map(s => s.trim()).filter(Boolean);
        const { rows: activeRows, blocks: activeBlocks, stateMessage } = await getSelectionData();

        count.textContent = String(activeRows.length);
        latest.textContent = getLatestRowDate(activeRows) || "-";

        debug.textContent = JSON.stringify(activeBlocks.slice(0, 3), null, 2);

        const { errorBlocks, validBlocks } = splitBlocksByValidity(activeBlocks);

        if (errorBlocks.length > 0) {
            status.textContent = "데이터 수정 요청";
            status.className = "pill err-pill";
            errorBanner.style.display = "block";
            errorBanner.innerHTML = "<strong>??????Β???????쒓낯????釉먯뒜??(??嚥?????됰씭????롫윦???좊즴?? - ???????繹먮냱寃???ш끽維??????녿ぅ??熬곣뫀肄?癲ル슓堉곁땟????</strong>" + 
                                    errorBlocks.map(b => b.errorMsg).join("<br>");
        } else {
            status.textContent = "정상";
            status.className = "pill";
            errorBanner.style.display = "none";
        }

        const allDaily = buildAllDaily(validBlocks, symbols);
        let viewData = [];
        let viewMode = 'DAILY'; 

        if (y === "ALL_YEARS") {
          viewMode = 'YEARLY';
          const yearsMap = new Map();
          for(const r of allDaily) {
            const yy = r.year;
            if(!yearsMap.has(yy)) {
              yearsMap.set(yy, { groupKey: yy, totalDailyProfit: 0 });
              for(const s of symbols) yearsMap.get(yy)[s] = { profit: 0, sell: 0, tierMax: null };
            }
            const row = yearsMap.get(yy);
            for(const s of symbols) {
              row[s].profit += r[s].profit || 0;
              row[s].sell += r[s].sell || 0;
              if(r[s].tierMax != null) row[s].tierMax = Math.max(row[s].tierMax || 0, r[s].tierMax);
            }
            row.totalDailyProfit += r.totalDailyProfit || 0;
          }

          let aggData = Array.from(yearsMap.values()).sort((a,b)=>Number(a.groupKey)-Number(b.groupKey));
          let rollingCum = Object.fromEntries(symbols.map(s => [s, 0]));
          
          viewData = aggData.map(r => {
             const out = { dateLabel: r.groupKey + "??, totalDailyProfit: r.totalDailyProfit };
             let rTotalCum = 0;
             for(const s of symbols) {
                rollingCum[s] += (r[s].profit || 0);
                out[s] = { profit: r[s].profit, sell: r[s].sell, cum: rollingCum[s], tierMax: r[s].tierMax };
                rTotalCum += rollingCum[s];
             }
             out.totalCum = rTotalCum;
             return out;
          });
        } else {
          const yearDaily = allDaily.filter(r => r.year === y);

          if (m === "ALL" || m === "ALL_PREV") {
            viewMode = 'MONTHLY';
            let filteredDaily = yearDaily;
            if (m === "ALL_PREV") {
               const latestM = [...new Set(yearDaily.map(r=>r.month))].sort().pop();
               filteredDaily = yearDaily.filter(r => r.month !== latestM);
            }

            const monthsMap = new Map();
            for(const r of filteredDaily) {
              const mm = r.month;
              if(!monthsMap.has(mm)) {
                monthsMap.set(mm, { groupKey: mm, totalDailyProfit: 0 });
                for(const s of symbols) monthsMap.get(mm)[s] = { profit: 0, sell: 0, tierMax: null };
              }
              const row = monthsMap.get(mm);
              for(const s of symbols) {
                row[s].profit += r[s].profit || 0;
                row[s].sell += r[s].sell || 0;
                if(r[s].tierMax != null) row[s].tierMax = Math.max(row[s].tierMax || 0, r[s].tierMax);
              }
              row.totalDailyProfit += r.totalDailyProfit || 0;
            }

            let aggData = Array.from(monthsMap.values()).sort((a,b)=>Number(a.groupKey)-Number(b.groupKey));
            let rollingCum = Object.fromEntries(symbols.map(s => [s, 0]));
            
            viewData = aggData.map(r => {
               const out = { dateLabel: r.groupKey + "??, totalDailyProfit: r.totalDailyProfit };
               let rTotalCum = 0;
               for(const s of symbols) {
                  rollingCum[s] += (r[s].profit || 0);
                  out[s] = { profit: r[s].profit, sell: r[s].sell, cum: rollingCum[s], tierMax: r[s].tierMax };
                  rTotalCum += rollingCum[s];
               }
               out.totalCum = rTotalCum;
               return out;
            });
          } else {
            const monthDaily = yearDaily.filter(r => r.month === m);
            let rollingCum = Object.fromEntries(symbols.map(s => [s, 0]));
            
            viewData = monthDaily.map(r => {
               const out = { dateLabel: r.mmdd, totalDailyProfit: r.totalDailyProfit, maxDate: r.yyyymmdd }; 
               let rTotalCum = 0;
               for(const s of symbols) {
                  if (r[s].profit != null) rollingCum[s] += r[s].profit;
                  out[s] = {
                     profit: r[s].profit,
                     sell: r[s].sell,
                     cum: (r[s].profit != null || rollingCum[s] !== 0) ? rollingCum[s] : null,
                     tierNow: r[s].tierNow,
                     tierMax: r[s].tierMax
                  };
                  if (out[s].cum != null) rTotalCum += out[s].cum;
               }
               out.totalCum = rTotalCum === 0 && r.totalDailyProfit == null ? null : rTotalCum;
               return out;
            });
          }
        }

        if (!viewData.length) {
          const emptyMessage = stateOverride || stateMessage || (/^\d{2}$/.test(m) ? "??ш끽維쀧빊????????釉먯뒭甕?癲ル슢??????れ삀??쎈뭄?????⑤８?????덊렡." : "");
          if (emptyMessage) setArchiveNotice(emptyMessage);
          else setArchiveNotice("");
        } else {
          setArchiveNotice("");
        }

        renderView(viewData, symbols, viewMode, allDaily);
      }

      buildYearOptions();
      updateMonthDropdown();

      archiveMonthBtn.addEventListener("click", async () => {
        const confirmed = confirm("?嶺뚮㉡?ｇ빊???癲ル슢??猿눫??癲ル슣???몄춿??筌뚯슜六?濡ろ뜑鴉?????뉖??\n??ш끽維????釉먯뒭甕????Β????? archive?????濚왿몾??????덊렡.");
        if (!confirmed) return;

        const year = yearSel.value;
        const month = monthSel.value;
        if (!/^\d{4}$/.test(year) || !/^\d{2}$/.test(month)) return;
        const archiveMonthKey = getMonthKey(year, month);
        let overwrite = false;
        if (archiveMonthIndex.includes(archiveMonthKey)) {
          overwrite = confirm("\uC774\uBBF8 \uC800\uC7A5\uC774 \uB418\uC5B4\uC788\uC2B5\uB2C8\uB2E4. \uB36E\uC5B4\uC4F8\uAE4C\uC694?");
          if (!overwrite) return;
        }

        try {
          const res = await fetch(getGridApiUrl("/archive-month"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ year, month, overwrite })
          });
          const result = await res.json();
          if (res.status === 409 && result?.exists) {
            const retryOverwrite = confirm("\uC774\uBBF8 \uC800\uC7A5\uC774 \uB418\uC5B4\uC788\uC2B5\uB2C8\uB2E4. \uB36E\uC5B4\uC4F8\uAE4C\uC694?");
            if (!retryOverwrite) return;
            const retryRes = await fetch(getGridApiUrl("/archive-month"), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ year, month, overwrite: true })
            });
            const retryResult = await retryRes.json();
            if (!retryRes.ok || !retryResult?.ok) throw new Error(retryResult?.error || "archive request failed");
          } else if (!res.ok || !result?.ok) {
            throw new Error(result?.error || "archive request failed");
          }

          if (!archiveMonthIndex.includes(archiveMonthKey)) {
            archiveMonthIndex = [...archiveMonthIndex, archiveMonthKey].sort();
          }
          archiveRowsCache.delete(archiveMonthKey);

          const nextSelection = getNextMonthSelection(year, month);
          if (nextSelection) {
            buildYearOptions(nextSelection.year);
            updateMonthDropdown(nextSelection.month);
            await rerender("??ш끽維쀧빊????????釉먯뒭甕?癲ル슢??????れ삀??쎈뭄?????⑤８?????덊렡.");
          } else {
            await rerender();
          }
          alert("\uC6D4 \uB9C8\uAC10\uC774 \uC131\uACF5\uC801\uC73C\uB85C \uC644\uB8CC\uB418\uC5C8\uC2B5\uB2C8\uB2E4.");
        } catch (error) {
          alert("??癲ル슢??猿눫??????됰꽡???怨?????덊렡.");
          console.error(error);
        }
      });

      yearSel.addEventListener("change", async () => { updateMonthDropdown(); await rerender(); });
      monthSel.addEventListener("change", async () => { await rerender(); });
      symbolsSel.addEventListener("change", async () => { await rerender(); });
      await rerender();
    } catch (e) {
      status.textContent = "로딩 실패";
      status.classList.add("err-pill");
      console.error(e);
    }
  }

  main();
</script>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Investment Logbook</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 18px; background:#f6f8fa; }
    h1 { margin: 0 0 6px; }
    .sub { color:#666; margin: 0 0 12px; }
    .pill { display:inline-block; padding:2px 10px; border-radius:999px; background:#eef2ff; font-size:12px; }
    .err { background:#fee2e2; color:#991b1b; }

    .wrap { overflow-x: auto; border:1px solid #e5e7eb; border-radius:12px; background:#fff; margin-bottom: 20px; }
    table { border-collapse: collapse; width: 100%; min-width: 800px; white-space: nowrap; }

    th, td { border-bottom: 1px solid #eee; padding: 8px 8px; vertical-align: middle; }
    th { background:#fafafa; text-align:left; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

    .right { text-align:right; }
    .center { text-align:center; }
    .muted { color:#666; }
    .neg { color:#b00020; font-weight:600; }
    .pos { color:#0b6b3a; font-weight:600; }
    .head2 { background:#fff7e6; font-weight:700; }
    .tot { background:#f2f7ff; font-weight:700; }
    .avg { background:#fcfdfa; font-weight:600; }

    .small { font-size: 12px; color:#555; }
    select { padding:9px 10px; border:1px solid #ddd; border-radius:10px; }
    
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin: 10px 0 12px; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:10px 12px; box-shadow:0 1px 2px rgba(0,0,0,.04); flex: 1 1 150px; min-width: 140px; }
    
    .k { font-size:12px; color:#666; }
    .v { font-size:18px; font-weight:700; margin-top:4px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .wide { min-width: 100%; }
  </style>
</head>
<body>
  <h1>Investment Logbook</h1>
  <div class="sub">텔레그램 봇 연동 자동화 대시보드 (TQQQ/ETHU/TSLL)</div>

  <div class="row">
    <div class="card" style="flex:0 1 auto;">
      <div class="k">상태</div>
      <div class="v"><span id="status" class="pill">로딩 중…</span></div>
    </div>
    <div class="card" style="flex:0 1 auto;">
      <div class="k">레코드 / 일자</div>
      <div class="v"><span id="count">-</span>건 <span class="small muted" id="latest" style="font-weight:normal;">-</span></div>
    </div>

    <div class="card">
      <div class="k">월 누적 수익(합계)</div>
      <div class="v" id="monthProfitAll">-</div>
      <div class="small muted" id="monthRoiAll">-</div>
    </div>

    <div class="card">
      <div class="k">TQQQ 월 누적</div>
      <div class="v" id="monthProfitTQQQ">-</div>
      <div class="small muted" id="monthRoiTQQQ">-</div>
    </div>
    <div class="card">
      <div class="k">ETHU 월 누적</div>
      <div class="v" id="monthProfitETHU">-</div>
      <div class="small muted" id="monthRoiETHU">-</div>
    </div>
    <div class="card">
      <div class="k">TSLL 월 누적</div>
      <div class="v" id="monthProfitTSLL">-</div>
      <div class="small muted" id="monthRoiTSLL">-</div>
    </div>

    <div style="flex:100%; height:0; margin:0;"></div>

    <div style="margin-left:auto;">
      <div class="small">월 선택</div>
      <select id="monthSel"></select>
    </div>

    <div>
      <div class="small">표시 종목</div>
      <select id="symbolsSel">
        <option value="TQQQ,ETHU,TSLL" selected>3종목 전체</option>
        <option value="TQQQ">TQQQ만</option>
        <option value="ETHU">ETHU만</option>
        <option value="TSLL">TSLL만</option>
      </select>
    </div>
  </div>

  <div class="wrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot"></tfoot>
    </table>
  </div>

  <div class="row" style="margin-top:0">
    <div class="card wide">
      <div class="k">월 수익 콤보 그래프 (막대=일 수익 / 선=월 누적)</div>
      <div style="position: relative; height: 250px; width: 100%;">
        <canvas id="comboChart"></canvas>
      </div>
    </div>
  </div>

  <details style="margin-top:12px">
    <summary class="small">디버그 보기(최근 블록 파싱)</summary>
    <pre class="mono" id="debug" style="white-space:pre-wrap; font-size:11px;"></pre>
  </details>

<script>
  const SEEDS = { TQQQ: 140000, ETHU: 40000, TSLL: 32000 };

  const esc = (s) => (s ?? "").toString().replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const num = (s) => {
    if (s == null) return null;
    const x = (s+"").replace(/[,원$주\s]/g, "");
    const n = Number(x);
    return Number.isFinite(n) ? n : null;
  };
  const fmtInt = (n) => n == null ? "" : new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(n);
  const fmtFloat1 = (n) => n == null ? "" : Number(n).toFixed(1);
  const fmtPct1 = (x) => (x == null || !Number.isFinite(x)) ? "" : (x * 100).toFixed(1) + "%";
  const clsPN = (n) => (n == null) ? "" : (n < 0 ? "neg" : (n > 0 ? "pos" : ""));
  const sumOrNull = (arr) => {
    const nums = arr.filter(v => typeof v === "number" && Number.isFinite(v));
    if (!nums.length) return null;
    return nums.reduce((a,b)=>a+b,0);
  };

  function parseGridTier(gridText) {
    if (!gridText) return { tierNow: null, tierMax: null };
    const lines = gridText.split("\n");
    const rows = [];
    const re = /^\s*(\d+)\)\s+([\d.]+)\s+(\d+)\s+([\d.]+)\s+(\d+)\s*$/;
    for (const line of lines) {
      const m = line.match(re);
      if (!m) continue;
      rows.push({ idx: Number(m[1]), buyQty: Number(m[3]), sellQty: Number(m[5]) });
    }
    if (!rows.length) return { tierNow: null, tierMax: null };
    rows.sort((a,b)=>a.idx-b.idx);
    const tierMax = rows[rows.length - 1].idx;
    let tierNow = null;
    for (const r of rows) {
      if (r.buyQty > 0) { tierNow = r.idx; break; }
    }
    if (tierNow == null) tierNow = rows[0].idx;
    return { tierNow, tierMax };
  }

  function splitBlocks(raw) {
    const t = (raw || "").replace(/\r/g, "");
    const re = /(^|\n)(\d{2})\/(\d{2})일\s+(\d{2}:\d{2})/g;
    const starts = [];
    let m;
    while ((m = re.exec(t)) !== null) {
      const startAt = m.index + (m[1] ? 1 : 0);
      starts.push(startAt);
    }
    if (!starts.length) return [];
    const blocks = [];
    for (let i=0;i<starts.length;i++) {
      const s = starts[i];
      const e = (i+1 < starts.length) ? starts[i+1] : t.length;
      blocks.push(t.slice(s, e).trim());
    }
    return blocks;
  }

  function parseBlock(blockText) {
    const t = blockText || "";
    const dt = t.match(/(\d{2})\/(\d{2})일\s+(\d{2}:\d{2})/);
    const mmdd = dt ? `${dt[1]}/${dt[2]}` : null;
    const time = dt ? dt[3] : null;

    let symbol = null;
    const s1 = t.match(/(?:^|\n)([A-Z]{2,6})최대필요\s*:/);
    if (s1) symbol = s1[1];
    if (!symbol) {
      const s2 = t.match(/(?:^|\n)\d+([A-Z]{2,6})평가금액\s*:/);
      if (s2) symbol = s2[1];
    }

    const cumM = t.match(/주문가능-최대필요\s*:\s*([-\d,]+(?:\.\d+)?)/);
    const cum = cumM ? num(cumM[1]) : null;

    const sCnt = t.match(/S\s*(\d+)회/);
    const sellCount = sCnt ? num(sCnt[1]) : null;

    let gridText = "";
    const gridHeader = t.match(/Grid\d+\s+[A-Z]{2,6}\s*\n/i);
    if (gridHeader) {
      const startIdx = t.indexOf(gridHeader[0]) + gridHeader[0].length;
      const endIdx = t.indexOf("테이블 총재고");
      gridText = (endIdx > startIdx) ? t.slice(startIdx, endIdx) : t.slice(startIdx);
    }
    const { tierNow, tierMax } = parseGridTier(gridText);

    return { mmdd, time, symbol, cum, sellCount, tierNow, tierMax, raw: t };
  }

  function rowsToBlocks(reportRows) {
    const chronos = [...reportRows].reverse();
    const fullText = chronos.map(r => r.raw_message || "").join("\n\n");
    const blocks = splitBlocks(fullText);
    const out = [];
    for (const b of blocks) out.push(parseBlock(b));
    return out.filter(x => x.mmdd && x.symbol);
  }

  function buildDaily(blocks, monthStr, symbols) {
    const byKey = new Map();
    for (const r of blocks) {
      if (!r.mmdd || !r.symbol || !symbols.includes(r.symbol)) continue;
      if (!r.mmdd.startsWith(monthStr + "/")) continue;
      const key = `${r.mmdd}|${r.symbol}`;
      const prev = byKey.get(key);
      if (!prev || (r.time || "") > (prev.time || "")) byKey.set(key, r);
    }

    const dates = [...new Set([...byKey.keys()].map(k => k.split("|")[0]))].sort();

    const table = dates.map(mmdd => {
      const row = { mmdd };
      for (const sym of symbols) {
        const rec = byKey.get(`${mmdd}|${sym}`) || null;
        row[sym] = rec
          ? { sell: rec.sellCount, cum: rec.cum, tierNow: rec.tierNow, tierMax: rec.tierMax }
          : { sell:null, cum:null, tierNow:null, tierMax:null };
      }
      return row;
    });

    const prevCum = Object.fromEntries(symbols.map(s => [s, null]));
    for (const r of table) {
      for (const sym of symbols) {
        const cum = r[sym].cum;
        r[sym].profit = (cum != null && prevCum[sym] != null) ? cum - prevCum[sym] : null;
        if (cum != null) prevCum[sym] = cum;
      }
      r.totalDailyProfit = sumOrNull(symbols.map(s => r[s].profit));
      r.totalCum = sumOrNull(symbols.map(s => r[s].cum));
    }
    return table;
  }

  function calcMonthTotals(daily, symbols) {
    const bySym = {};
    for (const sym of symbols) {
      bySym[sym] = {
        profit: sumOrNull(daily.map(r => r[sym].profit)) ?? 0,
        lastCum: (() => {
          for (let i=daily.length-1; i>=0; i--) if (daily[i][sym].cum != null) return daily[i][sym].cum;
          return null;
        })()
      };
    }
    const allProfit = Object.values(bySym).reduce((a,b)=>a + (b.profit ?? 0), 0);
    const roiBySym = {};
    for (const sym of symbols) roiBySym[sym] = SEEDS[sym] ? (bySym[sym].profit / SEEDS[sym]) : null;
    const seedAll = symbols.reduce((a,s)=>a + (SEEDS[s] || 0), 0);
    const roiAll = seedAll ? (allProfit / seedAll) : null;
    return { bySym, allProfit, roiBySym, roiAll, seedAll };
  }

  function render(daily, symbols) {
    const thead = document.getElementById("thead");
    const tbody = document.getElementById("tbody");
    const tfoot = document.getElementById("tfoot");

    const symLabel = (sym) => `${sym} (${fmtInt(SEEDS[sym])})`;

    thead.innerHTML = `
      <tr class="head2">
        <th rowspan="2" style="width:70px">날짜</th>
        ${symbols.map(sym => `<th class="center" colspan="3">${esc(symLabel(sym))}<div class="small muted" id="tier_${sym}"></div></th>`).join("")}
        <th rowspan="2" class="center" style="width:80px">총 매도</th>
        <th rowspan="2" class="right" style="width:120px">총합 수익</th>
      </tr>
      <tr>
        ${symbols.map(_ => `
          <th class="center" style="width:50px">매도</th>
          <th class="right" style="width:70px">수익</th>
          <th class="right" style="width:80px">누적자산</th>
        `).join("")}
      </tr>
    `;

    for (const sym of symbols) {
      let lastNow = null, lastMax = null;
      for (let i = daily.length-1; i>=0; i--) {
        const cell = daily[i][sym];
        if (cell.tierNow != null && cell.tierMax != null) { lastNow = cell.tierNow; lastMax = cell.tierMax; break; }
      }
      const el = document.getElementById(`tier_${sym}`);
      if (el) el.textContent = (lastNow != null) ? `티어: ${lastNow}/${lastMax}` : "";
    }

    tbody.innerHTML = daily.map(r => {
      const totalSell = (sumOrNull(symbols.map(s => r[s].sell)) ?? 0);
      const rowDaily = r.totalDailyProfit;
      const rowCum = r.totalCum;

      return `
        <tr>
          <td class="center">${esc(r.mmdd)}</td>
          ${symbols.map(sym => {
            return `
              <td class="center">${r[sym].sell ?? ""}</td>
              <td class="right ${clsPN(r[sym].profit)}">${r[sym].profit == null ? "" : "$" + fmtInt(r[sym].profit)}</td>
              <td class="right">${r[sym].cum == null ? "" : "$" + fmtInt(r[sym].cum)}</td>
            `;
          }).join("")}
          <td class="center">${fmtInt(totalSell)}</td>
          <td class="right">
            <div class="${clsPN(rowDaily)}">${rowDaily == null ? "" : "$" + fmtInt(rowDaily)}</div>
            <div class="muted">${rowCum == null ? "" : "$" + fmtInt(rowCum)}</div>
          </td>
        </tr>
      `;
    }).join("") || `<tr><td colspan="${2 + symbols.length*3}" class="muted">데이터 없음</td></tr>`;

    const monthTotals = calcMonthTotals(daily, symbols);
    const sumSellBySym = Object.fromEntries(symbols.map(s => [s, sumOrNull(daily.map(r => r[s].sell))]));
    const sumProfitBySym = Object.fromEntries(symbols.map(s => [s, sumOrNull(daily.map(r => r[s].profit))]));
    const lastCumBySym = Object.fromEntries(symbols.map(s => {
      let v = null;
      for (let i = daily.length-1; i>=0; i--) { if (daily[i][s].cum != null) { v = daily[i][s].cum; break; } }
      return [s, v];
    }));

    const totalSellAll = (sumOrNull(Object.values(sumSellBySym)) ?? 0);
    const totalProfitAll = sumOrNull(Object.values(sumProfitBySym));
    const lastCumAll = sumOrNull(Object.values(lastCumBySym));
    
    const daysCount = daily.length || 1;
    const avgSellBySym = Object.fromEntries(symbols.map(s => [s, (sumSellBySym[s] || 0) / daysCount]));
    const avgProfitBySym = Object.fromEntries(symbols.map(s => [s, (sumProfitBySym[s] || 0) / daysCount]));
    const avgTotalSellAll = totalSellAll / daysCount;
    const avgTotalProfitAll = totalProfitAll / daysCount;

    tfoot.innerHTML = `
      <tr class="avg">
        <td class="center">일평균</td>
        ${symbols.map(sym => `
          <td class="center">${fmtFloat1(avgSellBySym[sym])}</td>
          <td class="right ${clsPN(avgProfitBySym[sym])}">$${fmtInt(avgProfitBySym[sym])}</td>
          <td class="right">-</td>
        `).join("")}
        <td class="center">${fmtFloat1(avgTotalSellAll)}</td>
        <td class="right">
          <div class="${clsPN(avgTotalProfitAll)}">$${fmtInt(avgTotalProfitAll)}</div>
          <div class="muted">-</div>
        </td>
      </tr>
      <tr class="tot">
        <td class="center">합계</td>
        ${symbols.map(sym => {
          const seed = SEEDS[sym] || null;
          const roiCum = (seed && lastCumBySym[sym] != null) ? (lastCumBySym[sym] / seed) : null;
          return `
            <td class="center">${sumSellBySym[sym] ?? ""}</td>
            <td class="right">-</td>
            <td class="right">
              <div>$${fmtInt(lastCumBySym[sym])}</div>
              <div style="font-weight:normal; font-size:12px; color:#666;">(${fmtPct1(roiCum)})</div>
            </td>
          `;
        }).join("")}
        <td class="center">${fmtInt(totalSellAll)}</td>
        <td class="right">
          <div class="${clsPN(totalProfitAll)}">${totalProfitAll == null ? "" : "$" + fmtInt(totalProfitAll)}</div>
          <div>
            ${lastCumAll == null ? "" : "<span class='muted'>$" + fmtInt(lastCumAll) + "</span>"}
            ${monthTotals.seedAll ? ` <span style="color:#2563eb; font-size:14px; font-weight:700;">(${fmtPct1(lastCumAll / monthTotals.seedAll)})</span>` : ""}
          </div>
        </td>
      </tr>
    `;

    const setCard = (idV, idR, profit, roi) => {
      const v = document.getElementById(idV);
      const r = document.getElementById(idR);
      v.textContent = "$" + fmtInt(profit);
      v.className = "v " + clsPN(profit);
      r.textContent = (roi == null) ? "" : `수익률 ${fmtPct1(roi)}`;
    };

    setCard("monthProfitAll", "monthRoiAll", monthTotals.allProfit, monthTotals.roiAll);
    for (const sym of ["TQQQ","ETHU","TSLL"]) {
      const profit = (monthTotals.bySym[sym]?.profit ?? 0);
      const roi = monthTotals.roiBySym[sym] ?? null;
      setCard("monthProfit"+sym, "monthRoi"+sym, profit, roi);
    }

    const labels = daily.map(r => r.mmdd);
    const dailyProfit = daily.map(r => r.totalDailyProfit ?? 0);
    let acc = 0;
    const cumulative = dailyProfit.map(v => (acc += v));

    const canvas = document.getElementById("comboChart");
    if (canvas) {
      if (window.__comboChart) window.__comboChart.destroy();
      window.__comboChart = new Chart(canvas, {
        data: {
          labels,
          datasets: [
            { type: "bar", label: "일 수익 ($)", data: dailyProfit, backgroundColor: 'rgba(54, 162, 235, 0.5)', borderColor: 'rgb(54, 162, 235)', borderWidth: 1, yAxisID: "y" },
            { type: "line", label: "월 누적 수익 ($)", data: cumulative, borderColor: 'rgb(255, 99, 132)', tension: 0.2, borderWidth: 2, fill: false, yAxisID: "y1" }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: { legend: { position: "top" } },
          scales: {
            y: { type: "linear", position: "left", ticks: { callback: v => "$" + v } },
            y1: { type: "linear", position: "right", grid: { drawOnChartArea: false }, ticks: { callback: v => "$" + v } }
          }
        }
      });
    }
  }

  async function main() {
    const status = document.getElementById("status");
    const count = document.getElementById("count");
    const latest = document.getElementById("latest");
    const monthSel = document.getElementById("monthSel");
    const symbolsSel = document.getElementById("symbolsSel");
    const debug = document.getElementById("debug");

    try {
      const res = await fetch("./data/report.json?t=" + Date.now(), { cache: "no-store" });
      const j = await res.json();
      const reportRows = j.rows || [];

      count.textContent = String(reportRows.length);
      latest.textContent = reportRows[0]?.date || "-";

      const blocks = rowsToBlocks(reportRows);
      debug.textContent = JSON.stringify(blocks.slice(0, 3), null, 2);

      const months = [...new Set(blocks.map(b => b.mmdd.split("/")[0]))].sort((a,b)=>Number(a)-Number(b));
      if (!months.length) {
        status.textContent = "파싱 대기 중";
        return;
      }

      monthSel.innerHTML = months.map(m => `<option value="${m}">${Number(m)}월</option>`).join("");
      monthSel.value = months[months.length - 1];

      function rerender() {
        const m = monthSel.value;
        const symbols = symbolsSel.value.split(",").map(s => s.trim()).filter(Boolean);
        const daily = buildDaily(blocks, m, symbols);
        render(daily, symbols);
        status.textContent = "정상 작동 중";
        status.classList.remove("err");
      }

      monthSel.addEventListener("change", rerender);
      symbolsSel.addEventListener("change", rerender);
      rerender();
    } catch (e) {
      status.textContent = "연결/데이터 에러";
      status.classList.add("err");
      console.error(e);
    }
  }

  main();
</script>
</body>
</html>

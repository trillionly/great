<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Investment Logbook</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 18px; background:#f6f8fa; }
    h1 { margin: 0 0 6px; }
    .sub { color:#666; margin: 0 0 12px; }
    .pill { display:inline-block; padding:2px 10px; border-radius:999px; background:#eef2ff; font-size:12px; }
    .err { background:#fee2e2; color:#991b1b; }

    .wrap { overflow-x: auto; border:1px solid #e5e7eb; border-radius:12px; background:#fff; margin-bottom: 20px; }
    table { border-collapse: collapse; width: 100%; min-width: 800px; white-space: nowrap; }

    th, td { border-bottom: 1px solid #eee; padding: 8px 8px; vertical-align: middle; }
    th { background:#fafafa; text-align:left; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    
    th:first-child, td:first-child { position: sticky; left: 0; z-index: 11; border-right: 2px solid #e5e7eb; }
    th:first-child { z-index: 12; background: #fafafa; }

    tbody tr:nth-child(even) { background-color: #f8fafc; }
    tbody tr:nth-child(even) td:first-child { background-color: #f8fafc; }
    tbody tr:nth-child(odd) { background-color: #ffffff; }
    tbody tr:nth-child(odd) td:first-child { background-color: #ffffff; }
    tbody tr:hover { background-color: #f1f5f9; }
    tbody tr:hover td:first-child { background-color: #f1f5f9; }

    .br { border-right: 1px solid #eee; }
    .right { text-align:right; font-variant-numeric: tabular-nums; }
    .center { text-align:center; font-variant-numeric: tabular-nums; }
    
    .muted { color:#666; }
    .neg { color:#b00020; font-weight:600; }
    .pos { color:#0b6b3a; font-weight:600; }
    .head2 { background:#fff7e6; font-weight:700; }
    .tot { background:#f2f7ff; font-weight:700; }
    .avg { background:#fcfdfa; font-weight:600; }

    tfoot tr.avg td:first-child { background-color: #fcfdfa; }
    tfoot tr.tot td:first-child { background-color: #f2f7ff; }

    .small { font-size: 12px; color:#555; }
    select { padding:9px 10px; border:1px solid #ddd; border-radius:10px; }
    
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    .card { 
      background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:10px 12px; 
      box-shadow:0 1px 2px rgba(0,0,0,.04); 
      display: flex; flex-direction: column; height: 100%; box-sizing: border-box; min-width: 0;
    }
    
    .k { font-size:12px; color:#666; line-height: 1.2; }
    .v { font-size:18px; font-weight:700; margin-top:auto; padding-top: 6px; }
    
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .wide { min-width: 100%; margin-top: 15px; }

    .controls { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 15px; }
  </style>
</head>
<body>
  <h1>Investment Logbook</h1>
  <div class="sub">텔레그램 봇 연동 자동화 대시보드 (TQQQ/ETHU/TSLL)</div>

  <div class="summary-grid">
    <div class="card">
      <div class="k">상태</div>
      <div class="v"><span id="status" class="pill">로딩 중…</span></div>
    </div>
    <div class="card">
      <div class="k">레코드 / 일자</div>
      <div class="v"><span id="count">-</span>건 <span class="small muted" id="latest" style="font-weight:normal;">-</span></div>
    </div>
    <div class="card">
      <div class="k">누적 수익(합계)</div>
      <div class="v" id="monthProfitAll">-</div>
      <div class="small muted" id="monthRoiAll" style="margin-bottom: 4px;">-</div>
      <div id="progAll" style="width:100%; margin-top:auto;"></div>
    </div>

    <div class="card">
      <div class="k">TQQQ 누적 수익</div>
      <div class="v" id="monthProfitTQQQ">-</div>
      <div class="small muted" id="monthRoiTQQQ" style="margin-bottom: 4px;">-</div>
      <div id="progTQQQ" style="width:100%; margin-top:auto;"></div>
    </div>
    <div class="card">
      <div class="k">ETHU 누적 수익</div>
      <div class="v" id="monthProfitETHU">-</div>
      <div class="small muted" id="monthRoiETHU" style="margin-bottom: 4px;">-</div>
      <div id="progETHU" style="width:100%; margin-top:auto;"></div>
    </div>
    <div class="card">
      <div class="k">TSLL 누적 수익</div>
      <div class="v" id="monthProfitTSLL">-</div>
      <div class="small muted" id="monthRoiTSLL" style="margin-bottom: 4px;">-</div>
      <div id="progTSLL" style="width:100%; margin-top:auto;"></div>
    </div>
  </div>

  <div class="controls">
    <div>
      <div class="small">조회 기간</div>
      <select id="monthSel"></select>
    </div>
    <div>
      <div class="small">표시 종목</div>
      <select id="symbolsSel">
        <option value="TQQQ,ETHU,TSLL" selected>3종목 전체</option>
        <option value="TQQQ">TQQQ만</option>
        <option value="ETHU">ETHU만</option>
        <option value="TSLL">TSLL만</option>
      </select>
    </div>
  </div>

  <div class="wrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot"></tfoot>
    </table>
  </div>

  <div class="card wide">
    <div class="k">수익 콤보 차트 (막대=종목별 수익 합산 / 선=누적 / 점선=1.5% 목표)</div>
    <div style="position: relative; height: 300px; width: 100%;">
      <canvas id="comboChart"></canvas>
    </div>
  </div>

  <details style="margin-top:12px">
    <summary class="small">디버그 보기(최근 블록 파싱)</summary>
    <pre class="mono" id="debug" style="white-space:pre-wrap; font-size:11px;"></pre>
  </details>

<script>
  const SEEDS = { TQQQ: 140000, ETHU: 40000, TSLL: 32000 };

  const esc = (s) => (s ?? "").toString().replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const num = (s) => {
    if (s == null) return null;
    const x = (s+"").replace(/[,원$주\s]/g, "");
    const n = Number(x);
    return Number.isFinite(n) ? n : null;
  };
  const fmtInt = (n) => n == null ? "" : new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(n);
  const fmtFloat1 = (n) => n == null ? "" : Number(n).toFixed(1);
  const fmtPct1 = (x) => (x == null || !Number.isFinite(x)) ? "" : (x * 100).toFixed(1) + "%";
  const clsPN = (n) => (n == null) ? "" : (n < 0 ? "neg" : (n > 0 ? "pos" : ""));
  const sumOrNull = (arr) => {
    const nums = arr.filter(v => typeof v === "number" && Number.isFinite(v));
    if (!nums.length) return null;
    return nums.reduce((a,b)=>a+b,0);
  };

  function parseGridTier(gridText) {
    if (!gridText) return { tierNow: null, tierMax: null };
    const lines = gridText.split("\n");
    const rows = [];
    const re = /^\s*(\d+)\)\s+([\d.]+)\s+(\d+)\s+([\d.]+)\s+(\d+)\s*$/;
    for (const line of lines) {
      const m = line.match(re);
      if (!m) continue;
      rows.push({ idx: Number(m[1]), buyQty: Number(m[3]), sellQty: Number(m[5]) });
    }
    if (!rows.length) return { tierNow: null, tierMax: null };
    rows.sort((a,b)=>a.idx-b.idx);
    const tierMax = rows[rows.length - 1].idx;
    
    let tierNow = 0;
    for (let i = rows.length - 1; i >= 0; i--) {
      if (rows[i].sellQty > 0) {
        tierNow = rows[i].idx;
        break;
      }
    }
    return { tierNow, tierMax };
  }

  function splitBlocks(raw) {
    const t = (raw || "").replace(/\r/g, "");
    const re = /(^|\n)(\d{2})\/(\d{2})일\s+(\d{2}:\d{2})/g;
    const starts = [];
    let m;
    while ((m = re.exec(t)) !== null) {
      const startAt = m.index + (m[1] ? 1 : 0);
      starts.push(startAt);
    }
    if (!starts.length) return [];
    const blocks = [];
    for (let i=0;i<starts.length;i++) {
      const s = starts[i];
      const e = (i+1 < starts.length) ? starts[i+1] : t.length;
      blocks.push(t.slice(s, e).trim());
    }
    return blocks;
  }

  function parseBlock(blockText) {
    const t = blockText || "";
    const dt = t.match(/(\d{2})\/(\d{2})일\s+(\d{2}:\d{2})/);
    const mmdd = dt ? `${dt[1]}/${dt[2]}` : null;
    const time = dt ? dt[3] : null;

    let symbol = null;
    const s1 = t.match(/(?:^|\n)([A-Z]{2,6})최대필요\s*:/);
    if (s1) symbol = s1[1];
    if (!symbol) {
      const s2 = t.match(/(?:^|\n)\d+([A-Z]{2,6})평가금액\s*:/);
      if (s2) symbol = s2[1];
    }

    const cumM = t.match(/주문가능-최대필요\s*:\s*([-\d,]+(?:\.\d+)?)/);
    const cum = cumM ? num(cumM[1]) : null;
    const sCnt = t.match(/S\s*(\d+)회/);
    const sellCount = sCnt ? num(sCnt[1]) : null;

    let gridText = "";
    const gridHeader = t.match(/Grid\d+\s+[A-Z]{2,6}\s*\n/i);
    if (gridHeader) {
      const startIdx = t.indexOf(gridHeader[0]) + gridHeader[0].length;
      const endIdx = t.indexOf("테이블 총재고");
      gridText = (endIdx > startIdx) ? t.slice(startIdx, endIdx) : t.slice(startIdx);
    }
    const { tierNow, tierMax } = parseGridTier(gridText);

    return { mmdd, time, symbol, cum, sellCount, tierNow, tierMax, raw: t };
  }

  function rowsToBlocks(reportRows) {
    const chronos = [...reportRows].reverse();
    const fullText = chronos.map(r => r.raw_message || "").join("\n\n");
    const blocks = splitBlocks(fullText);
    const out = [];
    
    for (const b of blocks) {
      const parsed = parseBlock(b);
      if (parsed.mmdd === "03/04" && parsed.symbol === "TSLL" && parsed.cum === 2066) {
        parsed.cum = 66;
      }
      out.push(parsed);
    }
    return out.filter(x => x.mmdd && x.symbol);
  }

  // 🔥 스마트 리셋 및 이어달리기(True Cum)가 적용된 데이터 정리 함수
  function buildAllDaily(blocks, symbols) {
    const byKey = new Map();
    for (const r of blocks) {
      if (!r.mmdd || !r.symbol || !symbols.includes(r.symbol)) continue;
      const key = `${r.mmdd}|${r.symbol}`;
      const prev = byKey.get(key);
      if (!prev || (r.time || "") > (prev.time || "")) byKey.set(key, r);
    }

    const dates = [...new Set([...byKey.keys()].map(k => k.split("|")[0]))].sort();

    const table = dates.map(mmdd => {
      const row = { mmdd };
      for (const sym of symbols) {
        const rec = byKey.get(`${mmdd}|${sym}`) || null;
        row[sym] = rec
          ? { sell: rec.sellCount, rawCum: rec.cum, tierNow: rec.tierNow, tierMax: rec.tierMax }
          : { sell:null, rawCum:null, tierNow:null, tierMax:null };
      }
      return row;
    });

    const prevRawCum = Object.fromEntries(symbols.map(s => [s, null]));
    const trueCum = Object.fromEntries(symbols.map(s => [s, 0]));

    for (const r of table) {
      for (const sym of symbols) {
        const rawCum = r[sym].rawCum;
        let profit = null;

        if (rawCum != null) {
          if (prevRawCum[sym] != null) {
            let diff = rawCum - prevRawCum[sym];
            // 🔥 스마트 리셋 로직: 누계가 500 이상 폭락하면 봇 초기화로 간주하고 0원에서 새로 센다
            if (diff < -500) {
              profit = rawCum;
            } else {
              profit = diff;
            }
          } else {
            profit = null;
          }
          prevRawCum[sym] = rawCum;
        }
        r[sym].profit = profit;

        // 🔥 그래프 왜곡을 막기 위해 '실제 발생한 일 수익'만 계속 이어 붙여서 진정한 누적액을 만듦
        if (profit != null) {
          trueCum[sym] += profit;
        } else if (rawCum != null && trueCum[sym] === 0) {
          trueCum[sym] = rawCum;
        }
        
        // 화면과 계산에는 보정된 진정 누적액(trueCum)을 사용
        r[sym].cum = (rawCum != null || profit != null) ? trueCum[sym] : null;
      }
      r.totalDailyProfit = sumOrNull(symbols.map(s => r[s].profit));
      r.totalCum = sumOrNull(symbols.map(s => r[s].cum));
    }
    return table;
  }

  function buildMonthlyAgg(allDaily, symbols) {
    const monthsMap = new Map();
    for(const r of allDaily) {
      const m = r.mmdd.split("/")[0];
      if(!monthsMap.has(m)) {
        monthsMap.set(m, { month: m, totalDailyProfit: 0, totalCum: null, totalSell: 0 });
        for(const s of symbols) monthsMap.get(m)[s] = { profit: 0, sell: 0, cum: null, tierNow: null, tierMax: null };
      }
      const row = monthsMap.get(m);
      for(const s of symbols) {
        row[s].profit += r[s].profit || 0;
        row[s].sell += r[s].sell || 0;
        if(r[s].cum != null) row[s].cum = r[s].cum;
        if(r[s].tierNow != null) {
          row[s].tierNow = r[s].tierNow;
          row[s].tierMax = r[s].tierMax;
        }
      }
      row.totalDailyProfit += r.totalDailyProfit || 0;
      if(r.totalCum != null) row.totalCum = r.totalCum;
    }
    return Array.from(monthsMap.values()).sort((a,b)=>Number(a.month)-Number(b.month));
  }

  function renderView(viewData, symbols, isMonthly) {
    const thead = document.getElementById("thead");
    const tbody = document.getElementById("tbody");
    const tfoot = document.getElementById("tfoot");

    const symLabel = (sym) => `${sym} (${fmtInt(SEEDS[sym])})`;
    const currentSeedTotal = symbols.reduce((a,s) => a + (SEEDS[s] || 0), 0);
    const dateColName = isMonthly ? "월 (Month)" : "날짜";
    const avgLabel = isMonthly ? "월평균" : "일평균";

    thead.innerHTML = `
      <tr class="head2">
        <th rowspan="2" class="center br" style="width:70px">${dateColName}</th>
        ${symbols.map(sym => `<th class="center br" colspan="3">${esc(symLabel(sym))}<div class="small muted" id="tier_${sym}"></div></th>`).join("")}
        <th rowspan="2" class="center br" style="width:80px">총 매도</th>
        <th colspan="2" class="center" style="width:160px">
          총합 수익
          <div class="small muted" style="font-weight:normal;">(${fmtInt(currentSeedTotal)})</div>
        </th>
      </tr>
      <tr>
        ${symbols.map(_ => `
          <th class="center" style="width:50px">매도</th>
          <th class="right" style="width:70px">수익</th>
          <th class="right br" style="width:80px">누적수익</th>
        `).join("")}
        <th class="center" style="width:80px">${isMonthly ? "월합계" : "일"}</th>
        <th class="center" style="width:80px">누계</th>
      </tr>
    `;

    for (const sym of symbols) {
      let lastNow = null, lastMax = null, prevNow = null;
      for (let i = viewData.length-1; i>=0; i--) {
        const cell = viewData[i][sym];
        if (cell.tierNow != null && cell.tierMax != null) {
          if (lastNow == null) {
            lastNow = cell.tierNow;
            lastMax = cell.tierMax;
          } else if (prevNow == null) {
            prevNow = cell.tierNow;
            break; 
          }
        }
      }
      const el = document.getElementById(`tier_${sym}`);
      if (el) {
        if (lastNow != null) {
          const diff = prevNow != null ? (lastNow - prevNow) : 0;
          const diffStr = diff >= 0 ? `+${diff}` : `${diff}`;
          el.textContent = `${lastNow}/${lastMax} ${diffStr}`;
        } else {
          el.textContent = "";
        }
      }
    }

    tbody.innerHTML = viewData.map(r => {
      const totalSell = (sumOrNull(symbols.map(s => r[s].sell)) ?? 0);
      const rowDaily = r.totalDailyProfit;
      const rowCum = r.totalCum;

      return `
        <tr>
          <td class="center br" style="font-weight:600;">${esc(r.dateLabel)}</td>
          ${symbols.map(sym => {
            return `
              <td class="center">${r[sym].sell || r[sym].sell === 0 ? r[sym].sell : ""}</td>
              <td class="right ${clsPN(r[sym].profit)}">${r[sym].profit == null ? "" : "$" + fmtInt(r[sym].profit)}</td>
              <td class="right br">${r[sym].cum == null ? "" : "$" + fmtInt(r[sym].cum)}</td>
            `;
          }).join("")}
          <td class="center br">${fmtInt(totalSell)}</td>
          <td class="right ${clsPN(rowDaily)}">${rowDaily == null ? "" : "$" + fmtInt(rowDaily)}</td>
          <td class="right">${rowCum == null ? "" : "$" + fmtInt(rowCum)}</td>
        </tr>
      `;
    }).join("") || `<tr><td colspan="${4 + symbols.length*3}" class="muted">데이터 없음</td></tr>`;

    const sumSellBySym = Object.fromEntries(symbols.map(s => [s, sumOrNull(viewData.map(r => r[s].sell))]));
    const sumProfitBySym = Object.fromEntries(symbols.map(s => [s, sumOrNull(viewData.map(r => r[s].profit))]));
    const lastCumBySym = Object.fromEntries(symbols.map(s => {
      let v = null;
      for (let i = viewData.length-1; i>=0; i--) { if (viewData[i][s].cum != null) { v = viewData[i][s].cum; break; } }
      return [s, v];
    }));

    const totalSellAll = (sumOrNull(Object.values(sumSellBySym)) ?? 0);
    const lastCumAll = sumOrNull(Object.values(lastCumBySym));
    
    const countDivisor = viewData.length || 1;
    const avgSellBySym = Object.fromEntries(symbols.map(s => [s, (sumSellBySym[s] || 0) / countDivisor]));
    const avgProfitBySym = Object.fromEntries(symbols.map(s => [s, (sumProfitBySym[s] || 0) / countDivisor]));
    const avgTotalSellAll = totalSellAll / countDivisor;
    const avgTotalProfitAll = sumOrNull(Object.values(sumProfitBySym)) / countDivisor;

    tfoot.innerHTML = `
      <tr class="avg">
        <td class="center br">${avgLabel}</td>
        ${symbols.map(sym => `
          <td class="center">${fmtFloat1(avgSellBySym[sym])}</td>
          <td class="right ${clsPN(avgProfitBySym[sym])}">$${fmtInt(avgProfitBySym[sym])}</td>
          <td class="right br">-</td>
        `).join("")}
        <td class="center br">${fmtFloat1(avgTotalSellAll)}</td>
        <td class="right ${clsPN(avgTotalProfitAll)}">$${fmtInt(avgTotalProfitAll)}</td>
        <td class="right">-</td>
      </tr>
      <tr class="tot">
        <td class="center br">합계</td>
        ${symbols.map(sym => {
          const seed = SEEDS[sym] || null;
          const roiCum = (seed && lastCumBySym[sym] != null) ? (lastCumBySym[sym] / seed) : null;
          return `
            <td class="center">${sumSellBySym[sym] ?? ""}</td>
            <td class="right">-</td>
            <td class="right br">
              <div>$${fmtInt(lastCumBySym[sym])}</div>
              ${roiCum != null ? `<div style="color:#2563eb; font-size:14px; font-weight:700;">(${fmtPct1(roiCum)})</div>` : ""}
            </td>
          `;
        }).join("")}
        <td class="center br">${fmtInt(totalSellAll)}</td>
        <td class="right">-</td>
        <td class="right">
          <div>${lastCumAll == null ? "" : "$" + fmtInt(lastCumAll)}</div>
          ${currentSeedTotal > 0 ? `<div style="color:#2563eb; font-size:14px; font-weight:700;">(${fmtPct1(lastCumAll / currentSeedTotal)})</div>` : ""}
        </td>
      </tr>
    `;

    const setCard = (idV, idR, idProg, profit, roi, targetAmt) => {
      const v = document.getElementById(idV);
      const r = document.getElementById(idR);
      const p = document.getElementById(idProg);
      
      v.textContent = "$" + fmtInt(profit);
      v.className = "v " + clsPN(profit);
      r.textContent = (roi == null) ? "" : `수익률 ${fmtPct1(roi)}`;
      
      if (p && targetAmt > 0) {
        const pct = Math.max(0, (profit / targetAmt) * 100);
        const isDone = pct >= 100;
        const color = isDone ? '#16a34a' : '#3b82f6';
        
        p.innerHTML = `
          <div style="display:flex; justify-content:space-between; font-size:11px; color:#666; margin-bottom:4px;">
            <span>목표 $${fmtInt(targetAmt)}</span>
            <span style="font-weight:700; color:${color}">${fmtFloat1(pct)}%</span>
          </div>
          <div style="background:#e5e7eb; border-radius:999px; height:6px; width:100%; overflow:hidden;">
            <div style="background:${color}; height:100%; width:${Math.min(100, pct)}%; transition:width 0.5s;"></div>
          </div>
        `;
      } else if (p) {
        p.innerHTML = "";
      }
    };

    const totalTarget = currentSeedTotal * 0.015;
    setCard("monthProfitAll", "monthRoiAll", "progAll", lastCumAll, currentSeedTotal ? (lastCumAll / currentSeedTotal) : null, totalTarget);

    for (const sym of ["TQQQ","ETHU","TSLL"]) {
      const cumVal = lastCumBySym[sym] ?? 0;
      const roi = SEEDS[sym] ? (cumVal / SEEDS[sym]) : null;
      const targetAmt = SEEDS[sym] ? SEEDS[sym] * 0.015 : 0;
      setCard("monthProfit"+sym, "monthRoi"+sym, "prog"+sym, cumVal, roi, targetAmt);
    }

    const labels = viewData.map(r => r.dateLabel);
    const bgColors = {
      TQQQ: 'rgba(54, 162, 235, 0.7)',
      ETHU: 'rgba(255, 159, 64, 0.7)',
      TSLL: 'rgba(153, 102, 255, 0.7)'
    };
    const borderColors = {
      TQQQ: 'rgb(54, 162, 235)',
      ETHU: 'rgb(255, 159, 64)',
      TSLL: 'rgb(153, 102, 255)'
    };

    const datasets = symbols.map(sym => ({
      type: "bar",
      label: `${sym} 수익 ($)`,
      data: viewData.map(r => r[sym].profit),
      backgroundColor: bgColors[sym],
      borderColor: borderColors[sym],
      borderWidth: 1,
      stack: 'Stack 0',
      yAxisID: "y"
    }));

    datasets.push({
      type: "line", label: "총 누적 수익 ($)", data: viewData.map(r => r.totalCum),
      borderColor: 'rgb(255, 99, 132)', tension: 0.2, borderWidth: 2, fill: false, spanGaps: true, yAxisID: "y1"
    });

    datasets.push({
      type: "line", label: "월 목표 (1.5%)", data: viewData.map(() => totalTarget),
      borderColor: 'rgba(34, 197, 94, 0.8)', borderDash: [5, 5], borderWidth: 2, pointRadius: 0, fill: false, yAxisID: "y1"
    });

    const canvas = document.getElementById("comboChart");
    if (canvas) {
      if (window.__comboChart) window.__comboChart.destroy();
      window.__comboChart = new Chart(canvas, {
        data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: { legend: { position: "top" } },
          scales: {
            x: { stacked: true },
            y: { type: "linear", position: "left", stacked: true, ticks: { callback: v => "$" + v } },
            y1: { type: "linear", position: "right", stacked: false, grid: { drawOnChartArea: false }, ticks: { callback: v => "$" + v } }
          }
        }
      });
    }
  }

  async function main() {
    const status = document.getElementById("status");
    const count = document.getElementById("count");
    const latest = document.getElementById("latest");
    const monthSel = document.getElementById("monthSel");
    const symbolsSel = document.getElementById("symbolsSel");
    const debug = document.getElementById("debug");

    try {
      let reportRows = [];
      
      try {
        const resHist = await fetch("./data/history.json?t=" + Date.now(), { cache: "no-store" });
        if(resHist.ok) {
          const jHist = await resHist.json();
          reportRows = reportRows.concat(jHist.rows || []);
        }
      } catch(e) {}

      try {
        const resRep = await fetch("./data/report.json?t=" + Date.now(), { cache: "no-store" });
        if(resRep.ok) {
          const jRep = await resRep.json();
          reportRows = reportRows.concat(jRep.rows || []);
        }
      } catch(e) {}

      count.textContent = String(reportRows.length);
      latest.textContent = reportRows[reportRows.length-1]?.date || "-";

      const blocks = rowsToBlocks(reportRows);
      debug.textContent = JSON.stringify(blocks.slice(0, 3), null, 2);

      const months = [...new Set(blocks.map(b => b.mmdd.split("/")[0]))].sort((a,b)=>Number(a)-Number(b));
      if (!months.length) {
        status.textContent = "파싱 대기 중";
        return;
      }

      monthSel.innerHTML = `<option value="ALL">연간 요약 (전체)</option>` + 
                           months.map(m => `<option value="${m}">${Number(m)}월</option>`).join("");
      monthSel.value = months[months.length - 1];

      function rerender() {
        const m = monthSel.value;
        const symbols = symbolsSel.value.split(",").map(s => s.trim()).filter(Boolean);
        const allDaily = buildAllDaily(blocks, symbols);
        
        let viewData = [];
        let isMonthly = false;

        if (m === "ALL") {
          isMonthly = true;
          viewData = buildMonthlyAgg(allDaily, symbols).map(r => ({ ...r, dateLabel: r.month + "월" }));
        } else {
          viewData = allDaily.filter(r => r.mmdd.startsWith(m + "/")).map(r => ({ ...r, dateLabel: r.mmdd }));
        }

        renderView(viewData, symbols, isMonthly);
        status.textContent = "정상 작동 중";
        status.classList.remove("err");
      }

      monthSel.addEventListener("change", rerender);
      symbolsSel.addEventListener("change", rerender);
      rerender();
    } catch (e) {
      status.textContent = "연결/데이터 에러";
      status.classList.add("err");
      console.error(e);
    }
  }

  main();
</script>
</body>
</html>

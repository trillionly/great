<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>떨사오팔 매매기록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light">
    <div class="container mt-4" style="max-width: 500px;">
        <h3 class="text-center mb-4 fw-bold">📝 매매 기록하기</h3>
        
        <div class="card shadow-sm border-0 p-3">
            <div class="mb-3">
                <label class="form-label fw-bold">날짜</label>
                <input type="date" id="dateInput" class="form-control form-control-lg">
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">호기</label>
                <select id="hogiInput" class="form-select form-select-lg">
                    <option value="1호기">1호기</option>
                    <option value="2호기">2호기</option>
                    <option value="3호기">3호기</option>
                    <option value="4호기">4호기</option>
                    <option value="5호기">5호기</option>
                    <option value="6호기">6호기</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">매매</label>
                <select id="typeInput" class="form-select form-select-lg">
                    <option value="매수">🔴 매수</option>
                    <option value="매도">🔵 매도</option>
                </select>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label class="form-label fw-bold">수량</label>
                    <input type="number" id="qtyInput" class="form-control form-control-lg" placeholder="예: 10">
                </div>
                <div class="col-6">
                    <label class="form-label fw-bold">단가</label>
                    <input type="number" id="priceInput" class="form-control form-control-lg" placeholder="예: 54.80" step="0.01">
                </div>
            </div>

            <button onclick="saveData()" class="btn btn-dark btn-lg w-100 fw-bold mt-2">저장하기</button>
        </div>
    </div>

    <script>
        // ★여기에 주소와 키를 다시 넣어주세요!★
        const SUPABASE_URL = 'https://qutualbddxsyrhwzaosf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dHVhbGJkZHhzeXJod3phb3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODA1MTEsImV4cCI6MjA4NzE1NjUxMX0.iDcwZg9bGFnbl0DJfU0ks4DZtdVJ24Rh_e2ooDP-dts';
        
        // 오류 수정: 이름을 supabase 가 아닌 client 로 변경!
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('dateInput').valueAsDate = new Date();

        async function saveData() {
            const date = document.getElementById('dateInput').value;
            const hogi = document.getElementById('hogiInput').value;
            const trade_type = document.getElementById('typeInput').value;
            const quantity = document.getElementById('qtyInput').value;
            const price = document.getElementById('priceInput').value;

            if(!quantity || !price) {
                alert("수량과 단가를 모두 입력해 주세요!");
                return;
            }

            // ★여기에 테이블 이름을 다시 넣어주세요!★
            // 오류 수정: supabase.from 대신 client.from 사용!
            const { data, error } = await client
                .from('0458 table')
                .insert([
                    { date: date, hogi: hogi, trade_type: trade_type, quantity: quantity, price: price }
                ]);

            if (error) {
                alert("저장 실패: " + error.message);
            } else {
                alert("성공적으로 저장되었습니다!");
                document.getElementById('qtyInput').value = '';
                document.getElementById('priceInput').value = '';
            }
        }
    </script>
</body>
</html>
